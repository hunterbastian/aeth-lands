// ── ANIMATION LOOP ──────────────────────────────
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const dt = elapsed - lastTime;
  lastTime = elapsed;

  // ── WIND UPDATE ──
  updateWind(elapsed);

  // ── DAY/NIGHT CYCLE UPDATE ──
  dayTime = (dayTime + CYCLE_SPEED * dt) % 1;
  const tod = getTOD(dayTime);
  updateDayNight(tod);

  // night factor (0 = day, 1 = full night)
  const t = dayTime % 1;
  const nightFactor = t > 0.72 && t < 0.95 ? 1 : (t >= 0.63 && t <= 0.72 ? (t - 0.63) / 0.09 : (t >= 0.95 || t < 0.12 ? (t >= 0.95 ? 1 - (t - 0.95) / 0.05 : 1 - t / 0.12) : 0));

  // stars visibility
  starGroup.traverse(child => {
    if (child.userData.isStars && child.material) {
      child.material.opacity = nightFactor * 0.8;
      child.rotation.y = elapsed * 0.003;
    }
  });

  // fireflies — glow and drift at night
  fireflyGroup.traverse(child => {
    if (child.userData.isFirefly) {
      const p = child.userData.phase;
      const spd = child.userData.speed;
      child.position.x = child.userData.baseX + Math.sin(elapsed * spd * 0.7 + p) * child.userData.radius;
      child.position.y = child.userData.baseY + Math.sin(elapsed * spd * 1.2 + p) * 0.15;
      child.position.z = child.userData.baseZ + Math.cos(elapsed * spd * 0.5 + p * 1.3) * child.userData.radius;
      // blink
      const blink = Math.sin(elapsed * 2.5 + p) * 0.5 + 0.5;
      child.material.opacity = nightFactor * blink * 0.9;
      const s = 1 + blink * 0.4;
      child.scale.setScalar(s);
    }
  });

  // gentle breathing
  if (!transitioning) {
    islandGroup.position.y = Math.sin(elapsed * 0.35) * 0.05;
    islandGroup.rotation.y = Math.sin(elapsed * 0.1) * 0.025;
  }

  // water Gerstner waves + foam + flowers + glow + leaves + lava
  islandGroup.traverse(child => {
    // Gerstner wave animation — vertices move in circular orbits
    if (child.userData.isWaveWater) {
      const pos = child.geometry.attributes.position;
      const origX = child.userData.origX;
      const origY = child.userData.origY;
      const origZ = child.userData.origZ;
      const waves = child.userData.waves;
      const uniforms = child.userData.uniforms;

      // update shader uniforms
      uniforms.uTime.value = elapsed;
      uniforms.uSunDir.value.copy(sunLight.position).normalize();
      uniforms.uSunColor.value.copy(sunLight.color);
      uniforms.uWindDir.value.copy(wind.dir);
      uniforms.uWindStrength.value = wind.strength;

      // wind modulates wave amplitude and speed
      const windAmpMod = 0.7 + wind.strength * 0.5;
      const windSpeedMod = 0.8 + wind.strength * 0.4;

      const jacobian = child.userData.jacobian;

      for (let i = 0; i < pos.count; i++) {
        const ox = origX[i], oz = origZ[i];
        const wd = Math.sqrt(ox * ox + oz * oz) / RADIUS;
        // dampen near island
        const dampen = Math.max(0, Math.min(1, (wd - 0.85) * 4));

        let dx = 0, dy = 0, dz = 0;
        // Jacobian partial derivatives for foam computation
        let ddx_dx = 0, ddz_dz = 0, ddx_dz = 0, ddz_dx = 0;

        // sum Gerstner waves — wind modulates amplitude
        for (const w of waves) {
          // waves aligned with wind get amplitude boost
          const alignment = w.dir[0] * wind.dir.x + w.dir[1] * wind.dir.y;
          const alignBoost = 0.7 + Math.max(0, alignment) * 0.6;
          const amp = w.amp * windAmpMod * alignBoost;
          const spd = w.speed * windSpeedMod;

          const dot = w.dir[0] * ox + w.dir[1] * oz;
          const phase = w.freq * dot - spd * elapsed;
          const s = Math.sin(phase), c = Math.cos(phase);
          dx += w.steep * amp * w.dir[0] * c;
          dz += w.steep * amp * w.dir[1] * c;
          dy += amp * s;

          // Jacobian: J = (1 - d(dx)/d(ox)) * (1 - d(dz)/d(oz)) - d(dx)/d(oz) * d(dz)/d(ox)
          const qfa = w.steep * amp * w.freq;
          ddx_dx -= w.dir[0] * w.dir[0] * qfa * (-s);
          ddz_dz -= w.dir[1] * w.dir[1] * qfa * (-s);
          ddx_dz -= w.dir[0] * w.dir[1] * qfa * (-s);
          ddz_dx -= w.dir[1] * w.dir[0] * qfa * (-s);
        }

        pos.setX(i, ox + dx * dampen);
        pos.setY(i, origY[i] + dy * dampen);
        pos.setZ(i, oz + dz * dampen);

        // Jacobian determinant — < 1 means wave breaking
        const J = (1.0 + ddx_dx) * (1.0 + ddz_dz) - ddx_dz * ddz_dx;
        jacobian[i] = J * dampen + (1.0 - dampen); // relax to 1 near island
      }
      pos.needsUpdate = true;
      child.geometry.attributes.aJacobian.needsUpdate = true;
      child.geometry.computeVertexNormals();
    }
    if (child.userData.isFlower) {
      child.position.y = child.userData.baseY + Math.sin(elapsed * 2 + child.userData.phase) * 0.004;
      // wind bending
      const wf = getWindAt(child.position.x, child.position.z, elapsed);
      const flex = child.userData.windFlex || 0;
      child.rotation.x = (child.userData.baseRotX || 0) + wind.dir.y * wf * flex;
      child.rotation.z = (child.userData.baseRotZ || 0) - wind.dir.x * wf * flex;
    }
    // wind on grass blades
    if (child.userData.isGrass) {
      const wf = getWindAt(child.position.x, child.position.z, elapsed);
      child.rotation.x = child.userData.baseRotX + wind.dir.y * wf * child.userData.windFlex;
      child.rotation.z = child.userData.baseRotZ - wind.dir.x * wf * child.userData.windFlex;
    }
    // wind on trees
    if (child.userData.isTree) {
      const wf = getWindAt(child.position.x, child.position.z, elapsed);
      // trees sway slower, with secondary oscillation
      const sway = wf * child.userData.windFlex;
      const secondary = Math.sin(elapsed * 1.8 + child.userData.windPhase) * 0.008 * wind.strength;
      child.rotation.x = child.userData.baseRotX + wind.dir.y * (sway + secondary);
      child.rotation.z = child.userData.baseRotZ - wind.dir.x * (sway + secondary);
    }
    // wind on bushes
    if (child.userData.isBush) {
      const wf = getWindAt(child.position.x, child.position.z, elapsed);
      child.rotation.x = child.userData.baseRotX + wind.dir.y * wf * child.userData.windFlex;
      child.rotation.z = child.userData.baseRotZ - wind.dir.x * wf * child.userData.windFlex;
    }
    if (child.userData.isGlow && child.material) {
      child.material.opacity = 0.45 + Math.sin(elapsed * 1.6 + child.userData.phase) * 0.3;
      const s = 1 + Math.sin(elapsed * 2 + child.userData.phase) * 0.18;
      child.scale.setScalar(s);
    }
    if (child.userData.isLeaf) {
      // wind carries leaves in its direction
      const windPush = wind.strength * 0.15;
      child.position.y = child.userData.baseY + Math.sin(elapsed * child.userData.speed + child.userData.phase) * 0.12 - elapsed * 0.008;
      child.position.x = child.userData.baseX + Math.sin(elapsed * 0.35 + child.userData.phase) * 0.25 + wind.dir.x * windPush * Math.sin(elapsed * 0.5 + child.userData.phase);
      child.position.z += wind.dir.y * windPush * 0.002;
      child.rotation.x += 0.006 + wind.strength * 0.003;
      child.rotation.z += 0.004 + wind.strength * 0.002;
      if (child.position.y < 0) child.position.y = child.userData.baseY + 2.5;
    }
    if (child.userData.isLava && child.material) {
      child.material.opacity = 0.35 + Math.sin(elapsed * 3.5 + child.userData.phase) * 0.3;
    }
  });

  // butterflies — wind pushes their orbit
  particleGroup.traverse(child => {
    if (child.userData.isButterfly) {
      const t = elapsed * child.userData.speed + child.userData.phase;
      const windDrift = wind.strength * 0.12;
      child.position.x = child.userData.centerX + Math.sin(t * 0.7) * child.userData.radius + wind.dir.x * windDrift * Math.sin(elapsed * 0.3 + child.userData.phase);
      child.position.z = child.userData.centerZ + Math.cos(t * 0.5) * child.userData.radius + wind.dir.y * windDrift * Math.sin(elapsed * 0.4 + child.userData.phase);
      child.position.y = child.userData.baseY + Math.sin(t * 1.5) * 0.2;
      // wing flap
      if (child.children[0]) child.children[0].rotation.y = Math.sin(elapsed * 8 + child.userData.phase) * 0.6;
      if (child.children[1]) child.children[1].rotation.y = -Math.sin(elapsed * 8 + child.userData.phase) * 0.6;
      child.lookAt(
        child.position.x + Math.cos(t * 0.7) * 0.5,
        child.position.y,
        child.position.z - Math.sin(t * 0.5) * 0.5,
      );
    }
  });

  // drift clouds — wind-driven
  cloudGroup.children.forEach(cloud => {
    const cloudSpeed = cloud.userData.speed * (0.6 + wind.strength * 0.8);
    cloud.position.x = cloud.userData.baseX + Math.sin(elapsed * cloud.userData.speed * 0.4) * 1.5 + elapsed * cloudSpeed * wind.dir.x;
    cloud.position.z += wind.dir.y * cloudSpeed * dt * 0.3;
    cloud.position.y += Math.sin(elapsed * 0.25 + cloud.position.z) * 0.00015;
    if (cloud.position.x > 18) cloud.position.x = -18;
    if (cloud.position.x < -18) cloud.position.x = 18;
  });

  // ── ANIME SUN + GOD RAY UPDATE ──
  {
    const sunPos3 = sunLight.position.clone();
    // position sun billboard and face camera
    sunBillboard.position.copy(sunPos3).multiplyScalar(3);
    sunBillboard.quaternion.copy(camera.quaternion); // always face camera

    // project sun to screen space
    const sunNDC = sunPos3.clone().project(camera);
    const sunScreenX = sunNDC.x * 0.5 + 0.5;
    const sunScreenY = sunNDC.y * 0.5 + 0.5;
    godRayPass.uniforms.uSunScreenPos.value.set(sunScreenX, sunScreenY);
    // intensity based on time of day — strongest at dawn and sunset
    const tt = dayTime % 1;
    let godRayIntensity = 0;
    // dawn window
    if (tt > 0.14 && tt < 0.24) {
      const mid = 0.19;
      const w = 0.05;
      godRayIntensity = Math.max(0, 1 - Math.abs(tt - mid) / w);
    }
    // sunset window
    if (tt > 0.56 && tt < 0.70) {
      const mid = 0.63;
      const w = 0.07;
      godRayIntensity = Math.max(godRayIntensity, Math.max(0, 1 - Math.abs(tt - mid) / w));
    }
    // zero if sun is behind camera
    if (sunNDC.z > 1) godRayIntensity = 0;
    // fade when sun is far off screen
    const offScreen = Math.max(Math.abs(sunScreenX - 0.5), Math.abs(sunScreenY - 0.5));
    if (offScreen > 0.6) godRayIntensity *= Math.max(0, 1 - (offScreen - 0.6) / 0.4);
    godRayPass.uniforms.uIntensity.value = godRayIntensity * 0.6;
    godRayPass.uniforms.uSunColor.value.set(sunLight.color.r, sunLight.color.g, sunLight.color.b);

    // sun shader uniforms
    const sunAboveHorizon = sunLight.position.y > 0 ? 1.0 : 0.0;
    sunShaderMat.uniforms.uTime.value = elapsed;
    sunShaderMat.uniforms.uOpacity.value = sunAboveHorizon * (0.7 + godRayIntensity * 0.3);
    sunShaderMat.uniforms.uColor.value.copy(sunLight.color);
    // rim color: warmer/more orange, especially at golden hour
    const rimCol = sunShaderMat.uniforms.uRimColor.value;
    rimCol.copy(sunLight.color);
    rimCol.r = Math.min(1.0, rimCol.r * 1.1);
    rimCol.g *= 0.8;
    rimCol.b *= 0.5;
  }

  // ── CINEMATIC CAMERA UPDATE ──
  if (!transitioning) {
    updateCinematicCamera(elapsed, dt);
  }

  controls.update();
  composer.render();
}

// ── SCREENSHOT ──────────────────────────────────
const screenshotBtn = document.getElementById('screenshot-btn');
const screenshotFlash = document.getElementById('screenshot-flash');
screenshotBtn.addEventListener('click', () => {
  const uiEl = document.getElementById('ui');
  const tourBtn = document.getElementById('tour-btn');
  const cinemInd = document.getElementById('cinematic-indicator');
  // hide UI
  uiEl.style.display = 'none';
  screenshotBtn.style.display = 'none';
  tourBtn.style.display = 'none';
  cinemInd.style.display = 'none';
  // render a clean frame
  composer.render();
  // capture
  const dataURL = renderer.domElement.toDataURL('image/png');
  const biomeName = LANDS[currentLandIndex].name.toLowerCase().replace(/\s+/g, '-');
  const timestamp = Date.now();
  const link = document.createElement('a');
  link.href = dataURL;
  link.download = `aethlands-${biomeName}-${timestamp}.png`;
  link.click();
  // flash
  screenshotFlash.classList.add('active');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      screenshotFlash.classList.remove('active');
    });
  });
  // restore UI
  uiEl.style.display = '';
  screenshotBtn.style.display = '';
  tourBtn.style.display = '';
  cinemInd.style.display = '';
  // success animation
  screenshotBtn.classList.add('success');
  setTimeout(() => screenshotBtn.classList.remove('success'), 1200);
});

// ── CINEMATIC CAMERA ────────────────────────────
let lastInteractionTime = 0;
let cinematicMode = false;
let cinematicBlend = 0; // 0 = user control, 1 = cinematic
let cinematicAngle = 0;
let tourMode = false;
let tourLandIndex = 0;
let tourTimer = 0;
let tourCameraPhase = 0;
const IDLE_TIMEOUT = 15; // seconds
const savedCameraState = { pos: new THREE.Vector3(), target: new THREE.Vector3() };

function resetIdleTimer() {
  lastInteractionTime = clock.getElapsedTime();
  if (cinematicMode && !tourMode) {
    exitCinematicMode();
  }
}

// idle detection events
['mousemove', 'mousedown', 'wheel', 'touchstart', 'touchmove', 'keydown'].forEach(evt => {
  window.addEventListener(evt, resetIdleTimer, { passive: true });
});

function enterCinematicMode() {
  if (cinematicMode) return;
  cinematicMode = true;
  cinematicBlend = 0;
  savedCameraState.pos.copy(camera.position);
  savedCameraState.target.copy(controls.target);
  cinematicAngle = Math.atan2(camera.position.z, camera.position.x);
  controls.enabled = false;
  document.getElementById('cinematic-indicator').classList.add('visible');
}

function exitCinematicMode() {
  if (!cinematicMode) return;
  cinematicMode = false;
  tourMode = false;
  document.getElementById('tour-btn').classList.remove('active');
  controls.enabled = true;
  document.getElementById('cinematic-indicator').classList.remove('visible');
}

// tour button
const tourBtn = document.getElementById('tour-btn');
tourBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (tourMode) {
    exitCinematicMode();
  } else {
    tourMode = true;
    tourTimer = 0;
    tourLandIndex = currentLandIndex;
    tourCameraPhase = 0;
    tourBtn.classList.add('active');
    if (!cinematicMode) enterCinematicMode();
    lastInteractionTime = Infinity; // prevent idle exit
  }
});
// prevent tour button from triggering idle exit
tourBtn.addEventListener('mousedown', (e) => e.stopPropagation());

const tourCameraMoves = [
  { dist: 7,  height: 3.5, lookY: 1.0 }, // close mid
  { dist: 10, height: 5,   lookY: 0.8 }, // pull back
  { dist: 6,  height: 1.8, lookY: 1.0 }, // low angle close
  { dist: 9,  height: 6,   lookY: 0.5 }, // slightly high
  { dist: 7.5, height: 2.5, lookY: 1.2 }, // medium
  { dist: 10, height: 4,   lookY: 0.9 }, // wide
  { dist: 6.5, height: 4.5, lookY: 1.0 }, // close high
];

function updateCinematicCamera(elapsed, dt) {
  const timeSinceInteraction = elapsed - lastInteractionTime;

  // auto-enter cinematic after idle timeout
  if (!cinematicMode && timeSinceInteraction > IDLE_TIMEOUT) {
    enterCinematicMode();
  }

  if (!cinematicMode) return;

  // blend in smoothly
  cinematicBlend = Math.min(1, cinematicBlend + dt * 0.5);
  const ease = cinematicBlend * cinematicBlend * (3 - 2 * cinematicBlend);

  // tour mode: auto-cycle biomes
  if (tourMode) {
    tourTimer += dt;
    if (tourTimer > 12) {
      tourTimer = 0;
      tourLandIndex = (tourLandIndex + 1) % LANDS.length;
      tourCameraPhase = (tourCameraPhase + 1) % tourCameraMoves.length;
      switchToLand(tourLandIndex);
    }
  }

  // camera orbit
  cinematicAngle += 0.08 * dt;
  const move = tourMode ? tourCameraMoves[tourCameraPhase] : { dist: 8, height: 4, lookY: 1.0 };
  const targetDist = tourMode ? move.dist : 8 + Math.sin(elapsed * 0.12) * 1.5;
  const targetHeight = tourMode ? move.height : 4 + Math.sin(elapsed * 0.08) * 1.5;
  const lookY = tourMode ? move.lookY : 1.0;

  const targetPos = new THREE.Vector3(
    Math.cos(cinematicAngle) * targetDist,
    targetHeight,
    Math.sin(cinematicAngle) * targetDist,
  );
  const targetLookAt = new THREE.Vector3(0, lookY, 0);

  camera.position.lerp(targetPos, ease * 0.03);
  const currentLookAt = new THREE.Vector3();
  camera.getWorldDirection(currentLookAt);
  const lookTarget = new THREE.Vector3().lerpVectors(
    camera.position.clone().add(currentLookAt),
    targetLookAt,
    ease * 0.03,
  );
  camera.lookAt(targetLookAt.lerp(lookTarget, 1 - ease * 0.03));
  controls.target.lerp(targetLookAt, ease * 0.03);
}

animate();

// ── RESIZE ──────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.resolution.set(window.innerWidth, window.innerHeight);
});

// ── WATER RIPPLE RAYCASTER ─────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let rippleIndex = 0;
let lastRippleTime = 0;

renderer.domElement.addEventListener('pointermove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  const now = clock.getElapsedTime();
  if (now - lastRippleTime < 0.15) return; // throttle

  raycaster.setFromCamera(mouse, camera);
  // find water mesh
  const waterMeshes = [];
  islandGroup.traverse(child => {
    if (child.userData.isWaveWater) waterMeshes.push(child);
  });
  const hits = raycaster.intersectObjects(waterMeshes);
  if (hits.length > 0) {
    const pt = hits[0].point;
    const uniforms = hits[0].object.userData.uniforms;
    if (uniforms && uniforms.uRipples) {
      const rip = uniforms.uRipples.value[rippleIndex % 5];
      rip.x = pt.x;
      rip.y = pt.z;
      rip.z = 0.8;
      rip.w = now;
      rippleIndex++;
      lastRippleTime = now;
    }
  }
});
</script>
