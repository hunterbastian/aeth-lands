<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: #e8e0d4;
  }
  canvas { display: block; }

  #ui {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .land-btn {
    padding: 10px 22px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: #5a4a3a;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    opacity: 0;
    transform: translateY(20px);
    animation: btnEntrance 0.5s ease-out forwards;
    position: relative;
  }
  .land-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }
  .land-btn.active {
    background: rgba(255,255,255,0.35);
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 4px 20px rgba(180,160,120,0.15);
  }
  @keyframes btnEntrance {
    from { opacity: 0; transform: translateY(20px) scale(0.92); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Tooltip */
  .land-tooltip {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(30, 28, 40, 0.88);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    color: #d8d0c4;
    font-size: 12px;
    font-weight: 400;
    line-height: 1.45;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 20;
  }
  .land-tooltip .tooltip-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
    color: #f0e8dc;
  }
  .land-tooltip .tooltip-desc {
    opacity: 0.75;
  }
  .land-tooltip .tooltip-swatch {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .land-btn:hover .land-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Screenshot Button */
  #screenshot-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.15);

    background: rgba(255,255,255,0.12);

    z-index: 10;

    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);

  #screenshot-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.15s ease-out;
  }
  #screenshot-flash.active {
    opacity: 0.7;
    transition: none;
  }

  /* Cinematic Tour Button */
  #tour-btn {
    position: fixed;
    top: 20px;
    right: 74px;
    width: 44px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.15);

    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);

  }

    z-index: 10;

  }

// ── THREE.JS SETUP ──────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 250);
camera.position.set(8, 6, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance', preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── POST-PROCESSING ────────────────────────────
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

// Bloom — makes specular, glow spots, lava, and fireflies pop
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.35,  // strength — subtle, not overwhelming
  0.6,   // radius — how far bloom spreads
  0.85,  // threshold — only bright areas bloom
);
composer.addPass(bloomPass);

// ── GOD RAYS (volumetric light scattering) ──────
const godRayShader = {
  uniforms: {
    tDiffuse: { value: null },
    uSunScreenPos: { value: new THREE.Vector2(0.5, 0.5) },
    uIntensity: { value: 0.0 },
    uSunColor: { value: new THREE.Vector3(1.0, 0.9, 0.7) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uSunScreenPos;
    uniform float uIntensity;
    uniform vec3 uSunColor;
    varying vec2 vUv;
    void main() {
      vec4 texColor = texture2D(tDiffuse, vUv);
      if (uIntensity < 0.01) { gl_FragColor = texColor; return; }
      vec2 deltaUV = (vUv - uSunScreenPos);
      float dist = length(deltaUV);
      deltaUV *= 1.0 / 40.0;
      vec2 uv = vUv;
      float illumination = 0.0;
      float decay = 1.0;
      for (int i = 0; i < 40; i++) {
        uv -= deltaUV;
        vec4 s = texture2D(tDiffuse, clamp(uv, 0.0, 1.0));
        float lum = dot(s.rgb, vec3(0.2126, 0.7152, 0.0722));
        lum = lum * lum;
        illumination += lum * decay * 0.025;
        decay *= 0.965;
      }
      float falloff = exp(-dist * dist * 3.0);
      vec3 rayColor = uSunColor * illumination * uIntensity * falloff;
      float haze = smoothstep(0.5, 0.0, dist) * uIntensity * 0.08;
      vec3 hazeColor = mix(vec3(0.7, 0.8, 1.0), uSunColor, 0.3);
      gl_FragColor = vec4(texColor.rgb + rayColor + hazeColor * haze, texColor.a);
    }
  `,
};
const godRayPass = new ShaderPass(godRayShader);
composer.addPass(godRayPass);

// Color grading / vignette / atmospheric pass
const colorGradeShader = {
  uniforms: {
    tDiffuse: { value: null },
    uVignetteStrength: { value: 0.35 },
    uSaturation: { value: 1.08 },
    uContrast: { value: 1.05 },
    uBrightness: { value: 0.0 },
    uTime: { value: 0.0 },
    uTemperature: { value: 0.0 },
    uGrain: { value: 0.03 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uVignetteStrength;
    uniform float uSaturation;
    uniform float uContrast;
    uniform float uBrightness;
    uniform float uTime;
    uniform float uTemperature;
    uniform float uGrain;
    varying vec2 vUv;

    float grainHash(vec2 p) {
      vec3 p3 = fract(vec3(p.xyx) * 0.1031);
      p3 += dot(p3, p3.yzx + 33.33);
      return fract((p3.x + p3.y) * p3.z);
    }

    void main() {
      // ── CHROMATIC ABERRATION — subtle radial color split ──
      vec2 center = vUv - 0.5;
      float dist = length(center);
      float caStrength = dist * dist * 0.003;
      vec2 caOffset = center * caStrength;
      float r = texture2D(tDiffuse, vUv + caOffset).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - caOffset).b;
      vec3 col = vec3(r, g, b);

      // ── TONE CURVE — lift/gamma/gain ──
      col = pow(col, vec3(1.0 / 1.02));
      col = (col - 0.5) * uContrast + 0.5 + uBrightness;

      // ── COLOR TEMPERATURE — warm/cool shift ──
      float temp = uTemperature * 0.08;
      col.r += temp;
      col.b -= temp;
      col.g += temp * 0.3;

      // ── SATURATION ──
      float lum = dot(col, vec3(0.2126, 0.7152, 0.0722));
      col = mix(vec3(lum), col, uSaturation);

      // ── FILM GRAIN — animated noise ──
      float grain = grainHash(vUv * 500.0 + fract(uTime * 7.23) * 100.0) - 0.5;
      col += grain * uGrain;

      // ── VIGNETTE ──
      vec2 uv = vUv * 2.0 - 1.0;
      float vig = 1.0 - dot(uv * 0.5, uv * 0.5);
      vig = smoothstep(0.0, 1.0, vig);
      col *= mix(1.0 - uVignetteStrength, 1.0, vig);

      gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
    }
  `,
};
const colorGradePass = new ShaderPass(colorGradeShader);
composer.addPass(colorGradePass);

const controls = new OrbitControls(camera, renderer.domElement);

// ── TOON GRADIENTS ──────────────────────────────
function createToonGradient(steps, softness = 0.35) {
  const colors = new Uint8Array(steps);
  for (let i = 0; i < steps; i++) {
    colors[i] = Math.floor((i / (steps - 1)) * 255 * (1 - softness) + 255 * softness);
  }
  const tex = new THREE.DataTexture(colors, steps, 1, THREE.RedFormat);
  tex.needsUpdate = true;
  return tex;
}

const toonGrad3 = createToonGradient(3, 0.42);
const toonGrad4 = createToonGradient(4, 0.38);
const toonGrad5 = createToonGradient(5, 0.34);
const toonGrad6 = createToonGradient(6, 0.3);

// ── ANIME SUN (billboard with custom shader) ────
const sunShaderMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  side: THREE.DoubleSide,
  uniforms: {
    uColor: { value: new THREE.Color(0xfffae0) },
    uRimColor: { value: new THREE.Color(0xffcc70) },
    uTime: { value: 0.0 },
    uOpacity: { value: 0.0 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    uniform vec3 uRimColor;
    uniform float uTime;
    uniform float uOpacity;
    varying vec2 vUv;

    void main() {
      vec2 center = vUv - 0.5;
      float dist = length(center);
      float angle = atan(center.y, center.x);

      // ── CORE DISC — crisp anime circle with soft edge ──
      float core = 1.0 - smoothstep(0.08, 0.12, dist);

      // ── INNER GLOW — warm gradient ring ──
      float glow = 1.0 - smoothstep(0.05, 0.28, dist);
      glow = glow * glow; // soften falloff

      // ── RAY SPIKES — animated radiating beams ──
      // primary rays (8 spikes, slow rotation)
      float rays1 = pow(max(0.0, cos(angle * 8.0 + uTime * 0.3)), 12.0);
      // secondary rays (12 spikes, counter-rotation)
      float rays2 = pow(max(0.0, cos(angle * 12.0 - uTime * 0.2 + 0.5)), 16.0);
      // tertiary fine rays (24 spikes, shimmer)
      float rays3 = pow(max(0.0, cos(angle * 24.0 + uTime * 0.5)), 20.0);

      // rays fade with distance from center
      float rayMask = smoothstep(0.4, 0.08, dist);
      float rayGlow = (rays1 * 0.5 + rays2 * 0.25 + rays3 * 0.12) * rayMask;

      // ── OUTER HAZE — very soft atmospheric scatter ──
      float haze = exp(-dist * dist * 8.0) * 0.3;

      // ── BREATHING — subtle pulse ──
      float pulse = 1.0 + sin(uTime * 1.5) * 0.04;

      // combine layers
      float alpha = (core * 0.95 + glow * 0.5 + rayGlow * 0.6 + haze) * pulse * uOpacity;

      // color: bright white core → warm rim color in glow/rays
      vec3 col = mix(uRimColor, uColor, core * 0.7 + 0.3);
      // rays tinted warmer
      col = mix(col, uRimColor, rayGlow * 0.5);

      gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
    }
  `,
});
const sunBillboard = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), sunShaderMat);
