// ── WALK MODE ──────────────────────────────────
let walkMode = false;
const walkPos = new THREE.Vector3(0, 0, 0);
let walkYaw = 0;
let walkPitch = 0;
const walkKeys = { w: false, a: false, s: false, d: false, shift: false };
const WALK_SPEED = 1.2;
const WALK_RUN_MULT = 1.8;
const WALK_EYE_HEIGHT = 0.18;
const WALK_BOB_SPEED = 8;
const WALK_BOB_AMP = 0.006;
let walkBobPhase = 0;
let walkHeadBob = 0;

// evaluate Gerstner water height at a world position (mirrors GPU vertex shader)
function getWaterHeightAt(wx, wz, elapsed) {
  if (!cachedWaterMesh) return tideOffset;
  const waves = cachedWaterMesh.userData.waves;
  if (!waves) return tideOffset;
  const windStr = wind.strength;
  const windAmpMod = 0.85 + windStr * 0.25;
  const windSpeedMod = 0.9 + windStr * 0.15;
  const wdx = wind.dir.x, wdy = wind.dir.y;
  let dy = 0;
  for (let wi = 0; wi < waves.length; wi++) {
    const w = waves[wi];
    const alignment = w.dir[0] * wdx + w.dir[1] * wdy;
    const amp = w.amp * windAmpMod * waveIntensityMul * (0.85 + Math.max(0, alignment) * 0.25);
    const spd = w.speed * windSpeedMod;
    const phase = w.freq * (w.dir[0] * wx + w.dir[1] * wz) - spd * elapsed;
    dy += amp * Math.sin(phase);
  }
  return dy + tideOffset + 0.02; // +0.02 matches water mesh Y offset
}

// reusable scratch objects (avoid per-frame allocations)
const _walkForward = new THREE.Vector3();
const _walkRight = new THREE.Vector3();
const _walkMove = new THREE.Vector3();
const _walkQYaw = new THREE.Quaternion();
const _walkQPitch = new THREE.Quaternion();
const _walkAxisY = new THREE.Vector3(0, 1, 0);
const _walkAxisX = new THREE.Vector3(1, 0, 0);
const _walkLookDir = new THREE.Vector3();

// vegetation parting helper — shared by grass, flowers, bushes
function getVegetationPush(childX, childZ, radius, strength) {
  const dx = childX - walkPos.x;
  const dz = childZ - walkPos.z;
  const dist = Math.sqrt(dx * dx + dz * dz);
  if (dist >= radius) return null;
  const pushStr = (1 - dist / radius) * strength;
  const angle = Math.atan2(dz, dx);
  return { rx: Math.sin(angle) * pushStr, rz: -Math.cos(angle) * pushStr };
}

const walkBtn = document.getElementById('walk-btn');
const walkCrosshair = document.getElementById('walk-crosshair');
const walkHint = document.getElementById('walk-hint');
let walkHintTimer = 0;

function enterWalkMode() {
  if (walkMode) return;
  // exit cinematic if active
  if (cinematicMode) exitCinematicMode();
  walkMode = true;
  controls.enabled = false;
  walkBtn.classList.add('active');
  walkCrosshair.classList.add('visible');
  walkHint.classList.add('visible');
  walkHintTimer = 0;

  // start at a nice position on the island — slightly off center
  const land = LANDS[currentLandIndex];
  walkPos.set(0.5, 0, 0.5);
  const h = getTerrainHeight(walkPos.x, walkPos.z, land);
  walkPos.y = h + WALK_EYE_HEIGHT;

  // face toward center
  walkYaw = Math.atan2(-walkPos.z, -walkPos.x);
  walkPitch = 0;

  // wider FOV for immersion
  camera.fov = 65;
  camera.updateProjectionMatrix();

  // pointer lock for desktop, touch UI for mobile
  if (isTouchDevice) {
    showTouchWalkUI();
  } else {
    renderer.domElement.requestPointerLock();
  }

  unlockAchievement('first_steps');
}

function exitWalkMode() {
  if (!walkMode) return;
  walkMode = false;
  controls.enabled = true;
  walkBtn.classList.remove('active');
  walkCrosshair.classList.remove('visible');
  walkHint.classList.remove('visible');

  // clear underwater state
  isUnderwater = false;
  underwaterDepth = 0;
  underwaterPass.uniforms.uSubmergeDepth.value = 0;
  if (scene.fog) scene.fog.density = 0.015; // restore normal fog

  // restore camera
  camera.fov = 38;
  camera.updateProjectionMatrix();
  camera.position.set(8, 6, 8);
  controls.target.set(0, 0.8, 0);

  // release pointer lock / hide touch UI
  if (document.pointerLockElement) document.exitPointerLock();
  hideTouchWalkUI();

  // reset idle timer
  lastInteractionTime = clock.getElapsedTime();
}

walkBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (walkMode) exitWalkMode();
  else enterWalkMode();
});
walkBtn.addEventListener('mousedown', (e) => e.stopPropagation());

// keyboard input for walk mode
window.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'f' && !e.ctrlKey && !e.metaKey) {
    if (walkMode) exitWalkMode();
    else enterWalkMode();
    return;
  }
  if (!walkMode) return;
  const k = e.key.toLowerCase();
  if (k === 'w') walkKeys.w = true;
  if (k === 'a') walkKeys.a = true;
  if (k === 's') walkKeys.s = true;
  if (k === 'd') walkKeys.d = true;
  if (k === 'shift') walkKeys.shift = true;
  if (k === 'escape') exitWalkMode();
});

window.addEventListener('keyup', (e) => {
  if (!walkMode) return;
  const k = e.key.toLowerCase();
  if (k === 'w') walkKeys.w = false;
  if (k === 'a') walkKeys.a = false;
  if (k === 's') walkKeys.s = false;
  if (k === 'd') walkKeys.d = false;
  if (k === 'shift') walkKeys.shift = false;
});

// mouse look via pointer lock
document.addEventListener('mousemove', (e) => {
  if (!walkMode || !document.pointerLockElement) return;
  walkYaw -= e.movementX * 0.002;
  walkPitch -= e.movementY * 0.002;
  walkPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.5, walkPitch));
});

// re-request pointer lock on click during walk mode
renderer.domElement.addEventListener('click', () => {
  if (walkMode && !document.pointerLockElement) {
    renderer.domElement.requestPointerLock();
  }
});

// re-show hint when pointer lock is released mid-walk
document.addEventListener('pointerlockchange', () => {
  if (walkMode && !document.pointerLockElement) {
    walkHint.textContent = 'Click to re-engage \u00b7 ESC to exit';
    walkHint.classList.add('visible');
    walkHintTimer = 0;
  }
});

// ── MOBILE TOUCH CONTROLS ───────────────────────
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// touch-adaptive welcome text
if (isTouchDevice) {
  const welcomeDismissEl = document.getElementById('welcome-dismiss');
  if (welcomeDismissEl) welcomeDismissEl.textContent = 'tap anywhere to begin';
  // update welcome hints for touch
  const hints = document.querySelectorAll('.welcome-hint-row');
  hints.forEach(row => {
    const key = row.querySelector('.welcome-hint-key');
    if (!key) return;
    const keyText = key.textContent.trim();
    if (keyText === 'Drag') key.textContent = 'Touch';
    else if (keyText === 'Scroll') { key.textContent = 'Pinch'; row.lastChild.textContent = ' Zoom in & out'; }
    else if (keyText === 'F') { key.textContent = 'Tap'; row.lastChild.textContent = ' Walk button to explore'; }
    else if (keyText === 'P') { key.textContent = 'Tap'; row.lastChild.textContent = ' Photo button for controls'; }
  });
}

// virtual joystick
const touchJoystick = document.getElementById('touch-joystick');
const touchJoystickKnob = document.getElementById('touch-joystick-knob');
const touchLookZone = document.getElementById('touch-look-zone');
const touchWalkExit = document.getElementById('touch-walk-exit');

let joystickActive = false;
let joystickTouchId = null;
let joystickCenterX = 0;
let joystickCenterY = 0;
const JOYSTICK_MAX_R = 40; // max knob displacement in px
let touchJoyX = 0; // -1 to 1
let touchJoyY = 0; // -1 to 1

let lookTouchId = null;
let lookLastX = 0;
let lookLastY = 0;

function showTouchWalkUI() {
  if (!isTouchDevice) return;
  touchJoystick.style.display = 'block';
  touchLookZone.style.display = 'block';
  touchWalkExit.style.display = 'block';
  walkCrosshair.classList.remove('visible'); // no crosshair on mobile
  walkHint.classList.remove('visible'); // joystick is self-explanatory
}

function hideTouchWalkUI() {
  touchJoystick.style.display = 'none';
  touchLookZone.style.display = 'none';
  touchWalkExit.style.display = 'none';
  joystickActive = false;
  joystickTouchId = null;
  lookTouchId = null;
  touchJoyX = 0;
  touchJoyY = 0;
  touchJoystickKnob.style.transform = 'translate(-50%, -50%)';
  touchJoystickKnob.classList.remove('active');
}

// joystick touch handlers
touchJoystick.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joystickTouchId = t.identifier;
  joystickActive = true;
  const rect = touchJoystick.getBoundingClientRect();
  joystickCenterX = rect.left + rect.width / 2;
  joystickCenterY = rect.top + rect.height / 2;
  touchJoystickKnob.classList.add('active');
}, { passive: false });

touchJoystick.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier !== joystickTouchId) continue;
    let dx = t.clientX - joystickCenterX;
    let dy = t.clientY - joystickCenterY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > JOYSTICK_MAX_R) {
      dx = (dx / dist) * JOYSTICK_MAX_R;
      dy = (dy / dist) * JOYSTICK_MAX_R;
    }
    touchJoyX = dx / JOYSTICK_MAX_R;
    touchJoyY = dy / JOYSTICK_MAX_R;
    touchJoystickKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  }
}, { passive: false });

function resetJoystick() {
  joystickActive = false;
  joystickTouchId = null;
  touchJoyX = 0;
  touchJoyY = 0;
  touchJoystickKnob.style.transform = 'translate(-50%, -50%)';
  touchJoystickKnob.classList.remove('active');
}
touchJoystick.addEventListener('touchend', resetJoystick);
touchJoystick.addEventListener('touchcancel', resetJoystick);

// look zone touch handlers (right half of screen)
touchLookZone.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  lookTouchId = t.identifier;
  lookLastX = t.clientX;
  lookLastY = t.clientY;
}, { passive: false });

touchLookZone.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier !== lookTouchId) continue;
    const dx = t.clientX - lookLastX;
    const dy = t.clientY - lookLastY;
    walkYaw -= dx * 0.004;
    walkPitch -= dy * 0.004;
    walkPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.5, walkPitch));
    lookLastX = t.clientX;
    lookLastY = t.clientY;
  }
}, { passive: false });

touchLookZone.addEventListener('touchend', () => { lookTouchId = null; });
touchLookZone.addEventListener('touchcancel', () => { lookTouchId = null; });

// exit walk mode on mobile
touchWalkExit.addEventListener('click', (e) => {
  e.stopPropagation();
  exitWalkMode();
});
touchWalkExit.addEventListener('touchstart', (e) => e.stopPropagation());

function updateWalkMode(elapsed, dt) {
  if (!walkMode) return;

  // hide hint after 4 seconds
  walkHintTimer += dt;
  if (walkHintTimer > 4 && walkHint.classList.contains('visible')) {
    walkHint.classList.remove('visible');
  }

  const land = LANDS[currentLandIndex];
  const speed = WALK_SPEED * (walkKeys.shift ? WALK_RUN_MULT : 1.0) * dt;

  // movement direction from yaw (reuse scratch vectors)
  _walkForward.set(-Math.sin(walkYaw), 0, -Math.cos(walkYaw));
  _walkRight.set(Math.cos(walkYaw), 0, -Math.sin(walkYaw));

  let moving = false;
  _walkMove.set(0, 0, 0);
  if (walkKeys.w) { _walkMove.add(_walkForward); moving = true; }
  if (walkKeys.s) { _walkMove.sub(_walkForward); moving = true; }
  if (walkKeys.a) { _walkMove.sub(_walkRight); moving = true; }
  if (walkKeys.d) { _walkMove.add(_walkRight); moving = true; }
  // virtual joystick input (mobile)
  if (joystickActive && (Math.abs(touchJoyX) > 0.1 || Math.abs(touchJoyY) > 0.1)) {
    _walkMove.addScaledVector(_walkForward, -touchJoyY);
    _walkMove.addScaledVector(_walkRight, touchJoyX);
    moving = true;
  }

  if (_walkMove.lengthSq() > 0) {
    _walkMove.normalize().multiplyScalar(speed);
    const newX = walkPos.x + _walkMove.x;
    const newZ = walkPos.z + _walkMove.z;

    // clamp to island surface (stay within RADIUS * 0.92 to avoid cliff edge)
    const dist = Math.sqrt(newX * newX + newZ * newZ);
    const maxR = RADIUS * 0.92;
    if (dist < maxR) {
      walkPos.x = newX;
      walkPos.z = newZ;
    } else {
      // slide along the boundary
      const angle = Math.atan2(newZ, newX);
      walkPos.x = Math.cos(angle) * maxR;
      walkPos.z = Math.sin(angle) * maxR;
    }
  }

  // terrain following with smooth interpolation
  const targetY = getTerrainHeight(walkPos.x, walkPos.z, land) + WALK_EYE_HEIGHT;
  walkPos.y += (targetY - walkPos.y) * Math.min(1, dt * 12); // smooth step up/down

  // head bob when moving
  if (moving) {
    const bobSpeed = walkKeys.shift ? WALK_BOB_SPEED * 1.3 : WALK_BOB_SPEED;
    walkBobPhase += bobSpeed * dt;
    walkHeadBob = Math.sin(walkBobPhase) * WALK_BOB_AMP;
  } else {
    walkHeadBob *= 0.9; // dampen to zero
    walkBobPhase = 0;
  }

  // apply camera position + rotation (reuse scratch quaternions)
  camera.position.set(walkPos.x, walkPos.y + walkHeadBob, walkPos.z);
  _walkQYaw.setFromAxisAngle(_walkAxisY, walkYaw);
  _walkQPitch.setFromAxisAngle(_walkAxisX, walkPitch);
  camera.quaternion.copy(_walkQYaw).multiply(_walkQPitch);

  // ── UNDERWATER DETECTION — check if camera is below water surface ──
  const camY = walkPos.y + walkHeadBob;
  const waterY = getWaterHeightAt(walkPos.x, walkPos.z, elapsed);
  const wasUnderwater = isUnderwater;
  if (camY < waterY) {
    isUnderwater = true;
    // how deep below the surface (0 = at surface, 1 = fully submerged)
    const rawDepth = (waterY - camY) / 0.15; // 0.15 units = fully submerged
    underwaterDepth += (Math.min(rawDepth, 1.0) - underwaterDepth) * Math.min(1, dt * 8);
  } else {
    isUnderwater = false;
    underwaterDepth += (0 - underwaterDepth) * Math.min(1, dt * 8);
  }

  // update underwater post-process
  underwaterPass.uniforms.uSubmergeDepth.value = underwaterDepth;
  underwaterPass.uniforms.uTime.value = elapsed;

  // update water color to match current biome
  if (underwaterDepth > 0.01) {
    const land = LANDS[currentLandIndex];
    underwaterPass.uniforms.uWaterColor.value.set(land.colors.waterDeep);
    underwaterPass.uniforms.uCausticColor.value.set(land.colors.waterShallow);

    // push scene fog denser when submerged for murky depth effect
    if (scene.fog) {
      scene.fog.density = THREE.MathUtils.lerp(0.015, 0.12, underwaterDepth);
      scene.fog.color.lerpColors(
        new THREE.Color(land.colors.water),
        new THREE.Color(land.colors.waterDeep),
        underwaterDepth * 0.7
      );
    }
  }

  // keep controls target in sync (for smooth exit)
  _walkLookDir.set(0, 0, -1).applyQuaternion(camera.quaternion);
  controls.target.copy(camera.position).add(_walkLookDir.multiplyScalar(2));
}

// ── CINEMATIC SHOTS — keyframed camera positions that showcase the island ──
// Each shot: start/end position (polar: angle, dist, height), lookAt Y, duration
// Angles are offsets from cinematicAngle so the orbit progresses naturally
const cinematicShots = [
  // wide establishing orbit — classic overview
  { angleSpan: 0.8, distStart: 9, distEnd: 9, hStart: 4.5, hEnd: 4.5, lookY: 0.9, duration: 8 },
  // slow pull-in — wide to close, gently dropping
  { angleSpan: 0.5, distStart: 11, distEnd: 6, hStart: 5, hEnd: 3, lookY: 1.0, duration: 7 },
  // low water sweep — skimming the ocean surface to show waves and foam
  { angleSpan: 0.7, distStart: 7, distEnd: 7, hStart: 0.6, hEnd: 0.8, lookY: 0.4, duration: 8 },
  // high overhead drift — looking down at the island layout
  { angleSpan: 0.4, distStart: 6, distEnd: 7, hStart: 8, hEnd: 9, lookY: 0.0, duration: 6 },
  // close tree-level pass — intimate with vegetation
  { angleSpan: 0.6, distStart: 4.5, distEnd: 5, hStart: 1.8, hEnd: 2.2, lookY: 1.2, duration: 7 },
  // dramatic low angle — looking up at the island from below
  { angleSpan: 0.5, distStart: 8, distEnd: 7, hStart: 0.3, hEnd: 0.5, lookY: 1.8, duration: 6 },
  // slow wide pullback — retreating to reveal the whole scene
  { angleSpan: 0.6, distStart: 6, distEnd: 12, hStart: 3.5, hEnd: 5.5, lookY: 0.8, duration: 8 },
  // medium orbit with height wave — gentle rise and fall
  { angleSpan: 0.9, distStart: 7.5, distEnd: 7.5, hStart: 2.5, hEnd: 5.5, lookY: 1.0, duration: 9 },
  // cliff-edge flyby — close to the island edge, low
  { angleSpan: 0.8, distStart: 4, distEnd: 4.5, hStart: 1.2, hEnd: 1.5, lookY: 0.8, duration: 7 },
  // cinematic push-in to center — zooming toward the peak
  { angleSpan: 0.3, distStart: 10, distEnd: 5, hStart: 4, hEnd: 3, lookY: 1.4, duration: 7 },
];

let currentShot = 0;
let shotTimer = 0;
let shotBlend = 0; // 0-1 progress through current shot

// reusable scratch objects for cinematic (avoid per-frame allocations)
const _cinTargetPos = new THREE.Vector3();
const _cinTargetLook = new THREE.Vector3();
const _cinCurrentLook = new THREE.Vector3();

// smooth ease-in-out curve for shot transitions
function smootherStep(t) {
  return t * t * t * (t * (t * 6 - 15) + 10);
}

function updateCinematicCamera(elapsed, dt) {
  const timeSinceInteraction = elapsed - lastInteractionTime;

  // auto-enter cinematic after idle timeout (not during walk mode)
  if (!cinematicMode && !walkMode && timeSinceInteraction > IDLE_TIMEOUT) {
    enterCinematicMode();
  }

  if (!cinematicMode) return;

  // blend in smoothly from user camera
  cinematicBlend = Math.min(1, cinematicBlend + dt * 0.4);
  const entryEase = smootherStep(cinematicBlend);

  // tour mode: auto-cycle biomes
  if (tourMode) {
    tourTimer += dt;
    if (tourTimer > 14) {
      tourTimer = 0;
      const prevTourIndex = tourLandIndex;
      tourLandIndex = (tourLandIndex + 1) % LANDS.length;
      switchToLand(tourLandIndex);
      // completed a full tour cycle
      if (tourLandIndex === 0 && prevTourIndex === LANDS.length - 1) unlockAchievement('tour_complete');
    }
  }

  // advance shot timer
  const shot = cinematicShots[currentShot];
  shotTimer += dt;
  shotBlend = Math.min(1, shotTimer / shot.duration);
  const t = smootherStep(shotBlend); // smooth interpolation through the shot

  // transition to next shot when current one ends
  if (shotBlend >= 1) {
    shotTimer = 0;
    shotBlend = 0;
    cinematicAngle += shot.angleSpan; // carry forward the angle progress
    currentShot = (currentShot + 1) % cinematicShots.length;
  }

  // interpolate shot parameters
  const dist = shot.distStart + (shot.distEnd - shot.distStart) * t;
  const height = shot.hStart + (shot.hEnd - shot.hStart) * t;
  const angle = cinematicAngle + shot.angleSpan * t;

  _cinTargetPos.set(
    Math.cos(angle) * dist,
    height,
    Math.sin(angle) * dist,
  );
  _cinTargetLook.set(0, shot.lookY, 0);

  // smooth camera movement — blend between entry lerp and shot position
  const lerpRate = entryEase * 0.06;
  camera.position.lerp(_cinTargetPos, lerpRate);

  // smooth look-at — prevents jarring snaps between shots
  camera.getWorldDirection(_cinCurrentLook);
  const currentLookTarget = _cinCurrentLook.multiplyScalar(5).add(camera.position);
  currentLookTarget.lerp(_cinTargetLook, lerpRate * 1.5);
  camera.lookAt(currentLookTarget);
  controls.target.lerp(_cinTargetLook, lerpRate);
}

animate();

// ── RESIZE ──────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.resolution.set(window.innerWidth, window.innerHeight);
  depthTarget.setSize(window.innerWidth, window.innerHeight);
  ssaoPass.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
  dofPass.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
});

// ── WATER RIPPLE RAYCASTER ─────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let rippleIndex = 0;
let lastRippleTime = 0;

renderer.domElement.addEventListener('pointermove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  const now = clock.getElapsedTime();
  if (now - lastRippleTime < 0.15) return; // throttle

  raycaster.setFromCamera(mouse, camera);
  if (!cachedWaterMesh) return;
  const hits = raycaster.intersectObjects([cachedWaterMesh]);
  if (hits.length > 0) {
    const pt = hits[0].point;
    const uniforms = hits[0].object.userData.uniforms;
    if (uniforms && uniforms.uRipples) {
      const rip = uniforms.uRipples.value[rippleIndex % 5];
      rip.x = pt.x;
      rip.y = pt.z;
      rip.z = 0.8;
      rip.w = now;
      rippleIndex++;
      lastRippleTime = now;
    }
  }
});
</script>
