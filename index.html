    display: flex;
    gap: 10px;
    z-index: 10;
  }

    padding: 10px 22px;

    background: rgba(255,255,255,0.12);

    border-color: rgba(255,255,255,0.4);

function createToonGradient(steps, softness = 0.35) {
  const colors = new Uint8Array(steps);
  for (let i = 0; i < steps; i++) {
    colors[i] = Math.floor((i / (steps - 1)) * 255 * (1 - softness) + 255 * softness);
  }
  const tex = new THREE.DataTexture(colors, steps, 1, THREE.RedFormat);
  tex.needsUpdate = true;
  return tex;
}

// ── NOISE ───────────────────────────────────────
let seed = 42;
function seededRandom() {
  seed = (seed * 16807) % 2147483647;
  return (seed - 1) / 2147483646;
}

function noise2D(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = x - ix, fz = z - iz;
  const sx = fx * fx * (3 - 2 * fx), sz = fz * fz * (3 - 2 * fz);
  const hash = (a, b) => {
    let h = (a * 127 + b * 311 + 7) & 0xffff;
    h = ((h * h * 13) >> 8) & 0xff;
    return h / 255;
  };
  const v00 = hash(ix, iz), v10 = hash(ix + 1, iz);
  const v01 = hash(ix, iz + 1), v11 = hash(ix + 1, iz + 1);
  return (v00 + sx * (v10 - v00)) + sz * ((v01 + sx * (v11 - v01)) - (v00 + sx * (v10 - v00)));
}

function fbm(x, z, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * noise2D(x * freq, z * freq);
    amp *= 0.5;
    freq *= 2.1;
  }
  return val;
}

// ridge noise for mountain drama
function ridgeNoise(x, z) {
  let v = noise2D(x, z);
  v = Math.abs(v * 2 - 1);
  return 1 - v;
}

function ridgeFbm(x, z, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * ridgeNoise(x * freq, z * freq);
    amp *= 0.45;
    freq *= 2.1;
  }
  return val;
}

// ── TERRAIN HEIGHT ──────────────────────────────
const RADIUS = 2.8;

function getTerrainHeight(x, z, land) {
  const dist = Math.sqrt(x * x + z * z) / RADIUS;
  const mh = land.mountainHeight;

  // raised grassy plateau — whole surface is elevated above water
  let h = mh * 0.45;

  // rolling terrain texture across the surface
  h += fbm(x * 0.6 + 5, z * 0.6 + 5, 5) * mh * 0.15;
  h += fbm(x * 1.5 + 20, z * 1.5 + 20, 3) * 0.12;
  h += noise2D(x * 3.5 + 10, z * 3.5 + 10) * 0.05;

  // ── MULTIPLE DISTINCT HILLS ──
  // main hill (tallest, slightly off-center)
  const px1 = x + 0.2, pz1 = z - 0.3;
  const d1 = Math.sqrt(px1 * px1 + pz1 * pz1);
  const hill1 = Math.max(0, 1 - d1 * 0.55);
  h += Math.pow(hill1, 0.7) * mh * 0.55;

  // hill 2 — back-left, second tallest
  const px2 = x - 1.3, pz2 = z + 0.7;
  const d2 = Math.sqrt(px2 * px2 + pz2 * pz2);
  const hill2 = Math.max(0, 1 - d2 * 0.6);
  h += Math.pow(hill2, 0.65) * mh * 0.4;

  // hill 3 — front-right
  const px3 = x + 1.2, pz3 = z - 0.8;
  const d3 = Math.sqrt(px3 * px3 + pz3 * pz3);
  const hill3 = Math.max(0, 1 - d3 * 0.65);
  h += Math.pow(hill3, 0.65) * mh * 0.3;

  // hill 4 — small knoll back-right
  const px4 = x + 0.5, pz4 = z + 1.6;
  const d4 = Math.sqrt(px4 * px4 + pz4 * pz4);
  const hill4 = Math.max(0, 1 - d4 * 0.7);
  h += Math.pow(hill4, 0.7) * mh * 0.2;

  // hill 5 — small knoll front-left
  const px5 = x - 0.9, pz5 = z - 1.3;
  const d5 = Math.sqrt(px5 * px5 + pz5 * pz5);
  const hill5 = Math.max(0, 1 - d5 * 0.8);
  h += Math.pow(hill5, 0.7) * mh * 0.18;

  // gentle ridge connecting main + hill2
  const ridgeLine = Math.abs(z - x * 0.35 - 0.15);
  const ridgeWeight = Math.max(0, 1 - ridgeLine * 2) * Math.max(0, 1 - dist * 1.2);
  h += ridgeWeight * mh * 0.06;

  // ridge surface detail
  h += ridgeFbm(x * 0.9 + 3, z * 0.9 + 3, 3) * mh * 0.06;

  // valleys between hills (saddles between peaks)
  const v1 = Math.abs(x * 0.5 + z * 0.7 + 0.3);
  h -= Math.max(0, 0.25 - v1) * 0.18 * (1 - dist);
  const v2 = Math.abs(x * 0.8 - z * 0.3 - 0.5);
  h -= Math.max(0, 0.2 - v2) * 0.12 * (1 - dist);

  // cliff edge — holds height until very edge, then sharp cliff drop
  if (dist > 0.82) {
    const falloff = Math.pow(Math.max(0, (1 - dist) / 0.18), 2.0);
    h *= falloff;
  }

  return Math.max(0, h);
}

// ── ISLAND CREATION ─────────────────────────────
let islandGroup = new THREE.Group();

function createIsland(land) {
  const group = new THREE.Group();
  seed = 42;

  const SEG = 110;
  const OUTLINE_COL = new THREE.Color(land.outline);

  // ── TERRAIN MESH — subdivided plane displaced as terrain
  const GRID = 80;
  const geometry = new THREE.PlaneGeometry(RADIUS * 2, RADIUS * 2, GRID, GRID);
  geometry.rotateX(-Math.PI / 2);
  const pos = geometry.attributes.position;

  let maxTerrainH = 0;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const dist = Math.sqrt(x * x + z * z) / RADIUS;
    if (dist <= 1.0) {
      const th = getTerrainHeight(x, z, land);
      if (th > maxTerrainH) maxTerrainH = th;
      pos.setY(i, th);
    } else {
      // outside island radius — clamp to edge and hide under water
      const angle = Math.atan2(z, x);
      pos.setX(i, Math.cos(angle) * RADIUS);
      pos.setZ(i, Math.sin(angle) * RADIUS);
      pos.setY(i, 0);
    }
  }
  geometry.computeVertexNormals();

  // rich vertex colors with smooth blending
  const colors = new Float32Array(pos.count * 3);
  const c1 = new THREE.Color(), c2 = new THREE.Color();
  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i), x = pos.getX(i), z = pos.getZ(i);
    const dist = Math.sqrt(x * x + z * z) / RADIUS;
    // use actual terrain height for coloring, not vertex Y (side faces would be wrong)
    const h = getTerrainHeight(x, z, land);
    const n = noise2D(x * 3.5 + 7, z * 3.5 + 7);
    const n2 = noise2D(x * 8 + 15, z * 8 + 15);

    // height bands — grass dominates, only peaks have dirt/rock
    const sandLine = maxTerrainH * 0.01;
    const grassLowLine = maxTerrainH * 0.03;
    const grassHighLine = maxTerrainH * 0.92;
    const dirtLine = maxTerrainH * 0.96;
    const rockLine = maxTerrainH * 0.98;

    let col;
    if (dist > 0.95 || h < 0.01) {
      col = n > 0.5 ? new THREE.Color(land.colors.sandLight) : new THREE.Color(land.colors.sand);
    } else if (h < sandLine) {
      c1.set(land.colors.sand); c2.set(land.colors.grassPale);
      col = c1.clone().lerp(c2, Math.min(1, h / Math.max(0.01, sandLine)));
    } else if (h < grassLowLine) {
      const t = (h - sandLine) / Math.max(0.01, grassLowLine - sandLine);
      c1.set(land.colors.grassPale); c2.set(n2 > 0.5 ? land.colors.grassLight : land.colors.grass);
      col = c1.clone().lerp(c2, t);
    } else if (h < grassHighLine) {
      col = n > 0.65 ? new THREE.Color(land.colors.grassDark)
          : n > 0.3 ? new THREE.Color(land.colors.grass)
          : new THREE.Color(land.colors.grassLight);
      // occasional pale patches
      if (n2 > 0.75) col.lerp(new THREE.Color(land.colors.grassPale), 0.25);
    } else if (h < dirtLine) {
      c1.set(land.colors.dirt); c2.set(land.colors.dirtDark);
      col = c1.clone().lerp(c2, n);
      if (n2 > 0.65) col.lerp(new THREE.Color(land.colors.grassDark), 0.35);
    } else if (h < rockLine) {
      c1.set(land.colors.rock); c2.set(land.colors.rockDark);
      col = c1.clone().lerp(c2, n);
      if (n2 > 0.6) col.lerp(new THREE.Color(land.colors.rockMoss), 0.4);
    } else {
      col = land.hasSnow ? new THREE.Color(land.colors.snow) : new THREE.Color(land.colors.rock);
    }

    colors[i * 3] = col.r;
    colors[i * 3 + 1] = col.g;
    colors[i * 3 + 2] = col.b;
  }
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const terrainMat = new THREE.MeshToonMaterial({ vertexColors: true, gradientMap: toonGrad6 });
  const terrain = new THREE.Mesh(geometry, terrainMat);
  terrain.castShadow = true;
  terrain.receiveShadow = true;
  group.add(terrain);

  // terrain outline
  const outlineMat = new THREE.MeshBasicMaterial({ color: OUTLINE_COL, side: THREE.BackSide });
  const outlineGeo = geometry.clone();
  const oPos = outlineGeo.attributes.position;
  for (let i = 0; i < oPos.count; i++) {
    oPos.setY(i, oPos.getY(i) - 0.03);
  }
  const outline = new THREE.Mesh(outlineGeo, outlineMat);
  outline.scale.set(1.012, 1, 1.012);
  group.add(outline);

  // ── CLIFF BASE (dramatic layered) ────────
  const baseGeo = new THREE.CylinderGeometry(RADIUS * 0.78, RADIUS * 0.3, 2.8, SEG, 10);
  const basePos = baseGeo.attributes.position;
  for (let i = 0; i < basePos.count; i++) {
    const x = basePos.getX(i), y = basePos.getY(i), z = basePos.getZ(i);
    // organic rocky shape
    const n = noise2D(x * 2 + 20, z * 2 + 20) * 0.2;
    const n2 = noise2D(x * 5 + y * 3, z * 5 + y * 3) * 0.06;
    basePos.setX(i, x * (1 + n * 0.15 + n2));
    basePos.setZ(i, z * (1 + n * 0.15 + n2));
    // horizontal striations
    const stria = Math.sin(y * 12) * 0.02;
    basePos.setX(i, basePos.getX(i) + stria);
    basePos.setZ(i, basePos.getZ(i) + stria);
  }
  baseGeo.computeVertexNormals();

  // cliff vertex colors — layered earth with moss
  const baseColors = new Float32Array(basePos.count * 3);
  for (let i = 0; i < basePos.count; i++) {
    const y = basePos.getY(i);
    const x = basePos.getX(i), z = basePos.getZ(i);
    const n = noise2D(x * 4, z * 4);
    const n2 = noise2D(x * 8 + 30, z * 8 + 30);
    let col;
    if (y > 0.5) {
      col = n > 0.5 ? new THREE.Color(land.colors.cliff) : new THREE.Color(land.colors.dirt);
      if (n2 > 0.65) col.lerp(new THREE.Color(land.colors.cliffMoss), 0.5);
    } else if (y > -0.2) {
      col = n > 0.5 ? new THREE.Color(land.colors.cliffDark) : new THREE.Color(land.colors.cliff);
      if (n2 > 0.7) col.lerp(new THREE.Color(land.colors.cliffMoss), 0.3);
    } else {
      col = n > 0.5 ? new THREE.Color(land.colors.rockDark) : new THREE.Color(land.colors.rock);
    }
    baseColors[i * 3] = col.r;
    baseColors[i * 3 + 1] = col.g;
    baseColors[i * 3 + 2] = col.b;
  }
  baseGeo.setAttribute('color', new THREE.BufferAttribute(baseColors, 3));

  const baseMat = new THREE.MeshToonMaterial({ vertexColors: true, gradientMap: toonGrad5 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = -1.55;
  base.castShadow = true;
  group.add(base);

  const baseOutline = new THREE.Mesh(baseGeo.clone(), outlineMat.clone());
  baseOutline.position.y = -1.55;
  baseOutline.scale.multiplyScalar(1.012);
  group.add(baseOutline);

  // ── CLIFF VEGETATION (roots, moss patches) ──
  seed = 900;
  for (let i = 0; i < 18; i++) {
    const angle = seededRandom() * Math.PI * 2;
    const r = RADIUS * (0.72 + seededRandom() * 0.12);
    const rx = Math.cos(angle) * r;
    const rz = Math.sin(angle) * r;
    const ry = -0.2 - seededRandom() * 1.2;

    // hanging root/vine
    const rootH = 0.1 + seededRandom() * 0.25;
    const rootGeo = new THREE.CylinderGeometry(0.006, 0.002, rootH, 3, 4);
    const rootPos = rootGeo.attributes.position;
    for (let j = 0; j < rootPos.count; j++) {
      const y = rootPos.getY(j);
      rootPos.setX(j, rootPos.getX(j) + Math.sin(y * 8) * 0.008);
    }
    rootGeo.computeVertexNormals();
    const rootMat = new THREE.MeshToonMaterial({
      color: new THREE.Color(seededRandom() > 0.4 ? land.colors.cliffMoss : land.colors.trunkDark),
      gradientMap: toonGrad3,
    });
    const root = new THREE.Mesh(rootGeo, rootMat);
    root.position.set(rx, ry, rz);
    root.lookAt(0, ry, 0);
    root.rotateX(Math.PI * 0.4 + seededRandom() * 0.3);
    group.add(root);
  }

  // ── WATER (Gerstner waves + shader) ────────
  const waterR = RADIUS * 1.8;
  const WATER_SEG = 72;
  const waterGeo = new THREE.PlaneGeometry(waterR * 2, waterR * 2, WATER_SEG, WATER_SEG);
  waterGeo.rotateX(-Math.PI / 2);
  const wPos = waterGeo.attributes.position;

  // clip to circle + store rest positions
  const waterOrigX = new Float32Array(wPos.count);
  const waterOrigZ = new Float32Array(wPos.count);
  const waterOrigY = new Float32Array(wPos.count);
  for (let i = 0; i < wPos.count; i++) {
    let wx = wPos.getX(i), wz = wPos.getZ(i);
    const wd = Math.sqrt(wx * wx + wz * wz);
    if (wd > waterR) {
      const a = Math.atan2(wz, wx);
      wx = Math.cos(a) * waterR;
      wz = Math.sin(a) * waterR;
      wPos.setX(i, wx); wPos.setZ(i, wz);
    }
    waterOrigX[i] = wx;
    waterOrigZ[i] = wz;
    waterOrigY[i] = 0;
  }

  // Gerstner wave parameters — 4 overlapping wave sets
  const gerstnerWaves = [
    { dir: [0.6, 0.8],  amp: 0.035, freq: 1.0, speed: 0.9, steep: 0.6 },
    { dir: [-0.4, 0.9], amp: 0.022, freq: 1.6, speed: 1.3, steep: 0.5 },
    { dir: [0.9, -0.3], amp: 0.015, freq: 2.4, speed: 1.8, steep: 0.4 },
    { dir: [-0.7, -0.7],amp: 0.008, freq: 3.8, speed: 2.5, steep: 0.3 },
  ];

  // water shader — fresnel + specular + depth color + foam + ripples
  const waterUniforms = {
    uTime: { value: 0 },
    uShallow: { value: new THREE.Color(land.colors.waterShallow) },
    uMid: { value: new THREE.Color(land.colors.water) },
    uDeep: { value: new THREE.Color(land.colors.waterDeep) },
    uFoamColor: { value: new THREE.Color(land.colors.waterFoam) },
    uSunDir: { value: new THREE.Vector3(0.5, 0.8, 0.3).normalize() },
    uSunColor: { value: new THREE.Color(0xfff4e0) },
    uIslandR: { value: RADIUS },
    uWaterR: { value: waterR },
    uRipples: { value: [
      new THREE.Vector4(0,0,0,-99), new THREE.Vector4(0,0,0,-99),
      new THREE.Vector4(0,0,0,-99), new THREE.Vector4(0,0,0,-99),
      new THREE.Vector4(0,0,0,-99),
    ]},
  };

  const waterMat = new THREE.ShaderMaterial({
    uniforms: waterUniforms,
    transparent: true,
    depthWrite: false,
    vertexShader: `
      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying float vDepth;
      varying float vIslandDist;
      varying float vWaveHeight;
      void main() {
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        vNormal = normalize(normalMatrix * normal);
        vDepth = length(position.xz) / ${waterR.toFixed(1)};
        vIslandDist = length(position.xz) / ${RADIUS.toFixed(1)};
        vWaveHeight = position.y;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      uniform vec3 uShallow;
      uniform vec3 uMid;
      uniform vec3 uDeep;
      uniform vec3 uFoamColor;
      uniform vec3 uSunDir;
      uniform vec3 uSunColor;
      uniform float uIslandR;
      uniform float uWaterR;
      uniform vec4 uRipples[5]; // xy = position, z = strength, w = birth time
      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying float vDepth;
      varying float vIslandDist;
      varying float vWaveHeight;

      void main() {
        // depth-based color
        vec3 waterCol;
        if (vIslandDist < 1.0) {
          waterCol = mix(uFoamColor, uShallow, smoothstep(0.5, 1.0, vIslandDist));
        } else if (vDepth < 0.5) {
          waterCol = mix(uShallow, uMid, vDepth * 2.0);
        } else {
          waterCol = mix(uMid, uDeep, (vDepth - 0.5) * 2.0);
        }

        // fresnel — edges more reflective/lighter
        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        float fresnel = pow(1.0 - max(dot(viewDir, vNormal), 0.0), 3.0);
        waterCol = mix(waterCol, uFoamColor * 0.8, fresnel * 0.35);

        // specular sun reflection
        vec3 halfDir = normalize(uSunDir + viewDir);
        float spec = pow(max(dot(vNormal, halfDir), 0.0), 80.0);
        waterCol += uSunColor * spec * 0.6;

        // foam on wave crests
        float foam = smoothstep(0.018, 0.035, vWaveHeight);
        waterCol = mix(waterCol, uFoamColor, foam * 0.55);

        // shore foam band
        float shoreFoam = 1.0 - smoothstep(0.88, 1.05, vIslandDist);
        // animated shore foam pattern
        float foamPattern = sin(vWorldPos.x * 8.0 + uTime * 1.2) * sin(vWorldPos.z * 8.0 + uTime * 0.9);
        shoreFoam *= smoothstep(-0.2, 0.3, foamPattern);
        waterCol = mix(waterCol, uFoamColor, shoreFoam * 0.6);

        // transparency — more opaque near island, transparent at edges
        float alpha = mix(0.7, 0.35, smoothstep(0.3, 1.0, vDepth));
        // shore is more opaque
        alpha = mix(alpha, 0.75, shoreFoam);

        // subtle caustic sparkle
        float caustic = sin(vWorldPos.x * 15.0 + uTime * 2.0) * sin(vWorldPos.z * 15.0 - uTime * 1.5);
        caustic = pow(max(caustic, 0.0), 3.0);
        waterCol += vec3(caustic * 0.08);

        // mouse ripples — expanding concentric rings
        for (int i = 0; i < 5; i++) {
          vec4 rip = uRipples[i];
          float age = uTime - rip.w;
          if (age < 0.0 || age > 2.5) continue;
          float dist = length(vWorldPos.xz - rip.xy);
          float radius = age * 1.8;
          float ring = exp(-pow((dist - radius) * 6.0, 2.0));
          // second ring, slightly behind
          float ring2 = exp(-pow((dist - radius * 0.7) * 7.0, 2.0));
          float fade = rip.z * (1.0 - age / 2.5);
          float ripple = (ring + ring2 * 0.5) * fade;
          waterCol = mix(waterCol, uFoamColor, ripple * 0.45);
          alpha = min(1.0, alpha + ripple * 0.15);
        }

        gl_FragColor = vec4(waterCol, alpha);
      }
    `,
  });

  const water = new THREE.Mesh(waterGeo, waterMat);
  water.position.y = 0.02;
  water.receiveShadow = true;
  water.userData.isWaveWater = true;
  water.userData.origX = waterOrigX;
  water.userData.origY = waterOrigY;
  water.userData.origZ = waterOrigZ;
  water.userData.waves = gerstnerWaves;
  water.userData.uniforms = waterUniforms;
  group.add(water);

  // ── TREES (varied sizes) ─────────────────
  if (land.hasTrees && land.treeCount > 0) {
    seed = 100;
    for (let i = 0; i < land.treeCount; i++) {
      const angle = seededRandom() * Math.PI * 2;
      const r = 0.3 + seededRandom() * (RADIUS * 0.62);
      const tx = Math.cos(angle) * r;
      const tz = Math.sin(angle) * r;
      const dist = Math.sqrt(tx * tx + tz * tz) / RADIUS;
      const th = getTerrainHeight(tx, tz, land);

      if (th < 0.12 || th > 3.5 || dist > 0.82) continue;

      // varied tree sizes — Ghibli-scale, lush but varied
      const sizeClass = seededRandom();
      let treeH;
      if (sizeClass > 0.8) treeH = 0.8 + seededRandom() * 0.5;         // large
      else if (sizeClass > 0.35) treeH = 0.45 + seededRandom() * 0.4;  // medium
      else treeH = 0.25 + seededRandom() * 0.25;                        // small

      const tree = createVegetation(land, treeH, OUTLINE_COL);
      tree.position.set(tx, th, tz);
      tree.rotation.x = (seededRandom() - 0.5) * 0.06;
      tree.rotation.z = (seededRandom() - 0.5) * 0.06;
      group.add(tree);
    }
  }

  // ── BUSHES / SHRUBS (dense understory) ───
  if (land.hasBushes && land.bushCount > 0) {
    seed = 150;
    for (let i = 0; i < land.bushCount; i++) {
      const angle = seededRandom() * Math.PI * 2;
      const r = 0.35 + seededRandom() * (RADIUS * 0.6);
      const bx = Math.cos(angle) * r;
      const bz = Math.sin(angle) * r;
      const dist = Math.sqrt(bx * bx + bz * bz) / RADIUS;
      const bh = getTerrainHeight(bx, bz, land);
      if (bh < 0.08 || bh > 2.5 || dist > 0.82) continue;

      const bush = createBush(land, OUTLINE_COL);
      bush.position.set(bx, bh, bz);
      group.add(bush);
    }
  }

  // ── ROCK CLUSTERS ────────────────────────
  if (land.hasRocks) {
    seed = 300;
    for (let i = 0; i < 35; i++) {
      const angle = seededRandom() * Math.PI * 2;
      const r = 0.4 + seededRandom() * (RADIUS * 0.55);
      const rx = Math.cos(angle) * r;
      const rz = Math.sin(angle) * r;
      const dist = Math.sqrt(rx * rx + rz * rz) / RADIUS;
      const rh = getTerrainHeight(rx, rz, land);
      if (rh < 0.04 || dist > 0.85) continue;

      // cluster of 2-4 rocks together
      const clusterSize = 1 + Math.floor(seededRandom() * 3);
      for (let j = 0; j < clusterSize; j++) {
        const ox = (seededRandom() - 0.5) * 0.08;
        const oz = (seededRandom() - 0.5) * 0.08;
        const rockSize = 0.035 + seededRandom() * 0.08;
        const rockGeo = new THREE.IcosahedronGeometry(rockSize, 1);
        // deform for organic shape
        const rPos = rockGeo.attributes.position;
        for (let k = 0; k < rPos.count; k++) {
          const n = noise2D(rPos.getX(k) * 15 + i, rPos.getZ(k) * 15) * 0.15 + 0.92;
          rPos.setX(k, rPos.getX(k) * n);
          rPos.setY(k, rPos.getY(k) * n * 0.8); // squat
          rPos.setZ(k, rPos.getZ(k) * n);
        }
        rockGeo.computeVertexNormals();

        // mossy rock coloring
        const n = noise2D(rx * 5 + j, rz * 5 + j);
        const rockCol = n > 0.6 ? land.colors.rockMoss : (n > 0.3 ? land.colors.rock : land.colors.rockDark);
        const rockMat = new THREE.MeshToonMaterial({
          color: new THREE.Color(rockCol),
          gradientMap: toonGrad4,
        });
        const rock = new THREE.Mesh(rockGeo, rockMat);
        rock.position.set(rx + ox, rh + rockSize * 0.2, rz + oz);
        rock.rotation.set(seededRandom() * 2, seededRandom() * 2, seededRandom() * 2);
        rock.castShadow = true;
        group.add(rock);
      }
    }
  }

  // ── FLOWER MEADOW PATCHES ────────────────
  if (land.hasFlowers) {
    seed = 200;
    // flower patches (clustered, not scattered)
    const patchCount = 12 + Math.floor(seededRandom() * 6);
    for (let p = 0; p < patchCount; p++) {
      const pAngle = seededRandom() * Math.PI * 2;
      const pR = 0.5 + seededRandom() * (RADIUS * 0.45);
      const pcx = Math.cos(pAngle) * pR;
      const pcz = Math.sin(pAngle) * pR;
      const pch = getTerrainHeight(pcx, pcz, land);
      if (pch < 0.1 || pch > 2.5) continue;

      const flowersInPatch = 12 + Math.floor(seededRandom() * 14);
      for (let i = 0; i < flowersInPatch; i++) {
        const fx = pcx + (seededRandom() - 0.5) * 0.4;
        const fz = pcz + (seededRandom() - 0.5) * 0.4;
        const dist = Math.sqrt(fx * fx + fz * fz) / RADIUS;
        const fh = getTerrainHeight(fx, fz, land);
        if (fh < 0.08 || dist > 0.8) continue;

        const flowerColors = [land.colors.flowers, land.colors.flowers2, land.colors.flowers3];
        const flowerColor = flowerColors[Math.floor(seededRandom() * 3)];

        // flower = tiny stem + spherical bloom
        const stemH = 0.015 + seededRandom() * 0.02;
        const stemGeo = new THREE.CylinderGeometry(0.002, 0.003, stemH, 3);
        const stemMat = new THREE.MeshToonMaterial({
          color: new THREE.Color(land.colors.grassDark),
          gradientMap: toonGrad3,
        });
        const stem = new THREE.Mesh(stemGeo, stemMat);

        const fSize = 0.012 + seededRandom() * 0.015;
        const bloomGeo = new THREE.IcosahedronGeometry(fSize, 1);
        const bloomMat = new THREE.MeshToonMaterial({
          color: new THREE.Color(flowerColor),
          gradientMap: toonGrad3,
        });
        const bloom = new THREE.Mesh(bloomGeo, bloomMat);
        bloom.position.y = stemH * 0.5;

        const flowerG = new THREE.Group();
        flowerG.add(stem);
        flowerG.add(bloom);
        flowerG.position.set(fx, fh, fz);
        flowerG.userData.isFlower = true;
        flowerG.userData.baseY = fh;
        flowerG.userData.phase = seededRandom() * Math.PI * 2;
        group.add(flowerG);
      }
    }
  }

  // ── DENSE GRASS TUFTS ────────────────────
  seed = 400;
  const grassCount = land.hasBushes ? 150 : 80;
  for (let i = 0; i < grassCount; i++) {
    const angle = seededRandom() * Math.PI * 2;
    const r = 0.3 + seededRandom() * (RADIUS * 0.6);
    const gx = Math.cos(angle) * r;
    const gz = Math.sin(angle) * r;
    const dist = Math.sqrt(gx * gx + gz * gz) / RADIUS;
    const gh = getTerrainHeight(gx, gz, land);
    if (gh < 0.08 || gh > 2.5 || dist > 0.82) continue;

    const bladeCount = 2 + Math.floor(seededRandom() * 3);
    for (let j = 0; j < bladeCount; j++) {
      const ox = (seededRandom() - 0.5) * 0.04;
      const oz = (seededRandom() - 0.5) * 0.04;
      const bladeH = 0.03 + seededRandom() * 0.06;
      const bladeGeo = new THREE.ConeGeometry(0.008, bladeH, 3);
      const bladeMat = new THREE.MeshToonMaterial({
        color: new THREE.Color(seededRandom() > 0.5 ? land.colors.grass : land.colors.grassDark),
        gradientMap: toonGrad3,
      });
      const blade = new THREE.Mesh(bladeGeo, bladeMat);
      blade.position.set(gx + ox, gh + bladeH * 0.5, gz + oz);
      blade.rotation.x = (seededRandom() - 0.5) * 0.35;
      blade.rotation.z = (seededRandom() - 0.5) * 0.35;
      group.add(blade);
    }
  }

  // ── GLOW SPOTS ───────────────────────────
  if (land.hasGlowSpots) {
    seed = 600;
    for (let i = 0; i < 30; i++) {
      const angle = seededRandom() * Math.PI * 2;
      const r = 0.3 + seededRandom() * (RADIUS * 0.6);
      const gx = Math.cos(angle) * r;
      const gz = Math.sin(angle) * r;
      const dist = Math.sqrt(gx * gx + gz * gz) / RADIUS;
      const gh = getTerrainHeight(gx, gz, land);
      if (gh < 0.05 || dist > 0.85) continue;

      const glowSize = 0.012 + seededRandom() * 0.018;
      const glowGeo = new THREE.SphereGeometry(glowSize, 6, 4);
      const glowColor = seededRandom() > 0.5 ? land.colors.flowers : land.colors.flowers2;
      const glowMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(glowColor),
        transparent: true, opacity: 0.75,
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.set(gx, gh + 0.025, gz);
      glow.userData.isGlow = true;
      glow.userData.baseY = gh + 0.025;
      glow.userData.phase = seededRandom() * Math.PI * 2;
      group.add(glow);
    }
  }

  // ── FLOATING LEAVES ──────────────────────
  if (land.hasLeaves) {
    seed = 700;
    for (let i = 0; i < 35; i++) {
      const lx = (seededRandom() - 0.5) * RADIUS * 2;
      const ly = 0.5 + seededRandom() * 3;
      const lz = (seededRandom() - 0.5) * RADIUS * 2;
      const leafSize = 0.012 + seededRandom() * 0.015;
      const leafGeo = new THREE.PlaneGeometry(leafSize, leafSize * 1.5);
      const leafColors = [land.colors.foliage, land.colors.flowers, land.colors.flowers2, land.colors.foliageLight];
      const leafColor = leafColors[Math.floor(seededRandom() * leafColors.length)];
      const leafMat = new THREE.MeshToonMaterial({
        color: new THREE.Color(leafColor),
        gradientMap: toonGrad3,
        side: THREE.DoubleSide,
      });
      const leaf = new THREE.Mesh(leafGeo, leafMat);
      leaf.position.set(lx, ly, lz);
      leaf.rotation.set(seededRandom() * Math.PI, seededRandom() * Math.PI, seededRandom() * Math.PI);
      leaf.userData.isLeaf = true;
      leaf.userData.baseY = ly;
      leaf.userData.baseX = lx;
      leaf.userData.phase = seededRandom() * Math.PI * 2;
      leaf.userData.speed = 0.3 + seededRandom() * 0.5;
      group.add(leaf);
    }
  }

  // ── LAVA GLOW ────────────────────────────
  if (land.hasLavaGlow) {
    seed = 800;
    for (let i = 0; i < 18; i++) {
      const angle = seededRandom() * Math.PI * 2;
      const r = 0.15 + seededRandom() * (RADIUS * 0.45);
      const lx = Math.cos(angle) * r;
      const lz = Math.sin(angle) * r;
      const lh = getTerrainHeight(lx, lz, land);
      if (lh < 0.25) continue;

      const lavaSize = 0.015 + seededRandom() * 0.035;
      const lavaGeo = new THREE.PlaneGeometry(lavaSize, lavaSize * (2 + seededRandom() * 2));
      lavaGeo.rotateX(-Math.PI / 2);
      lavaGeo.rotateY(seededRandom() * Math.PI);
      const lavaMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(seededRandom() > 0.4 ? '#e84818' : '#f88020'),
        transparent: true, opacity: 0.65,
      });
      const lava = new THREE.Mesh(lavaGeo, lavaMat);
      lava.position.set(lx, lh + 0.01, lz);
      lava.userData.isLava = true;
      lava.userData.phase = seededRandom() * Math.PI * 2;
      group.add(lava);
    }
  }

  return group;
}

// ── VEGETATION DISPATCHER ───────────────────────
function createVegetation(land, height, outlineColor) {
  const style = land.treeStyle || 'round';
  if (style === 'mushroom') return createMushroomTree(land, height, outlineColor);
  if (style === 'crystal') return createCrystalSpire(land, height, outlineColor);
  if (style === 'tall') return createTallTree(land, height, outlineColor);
  if (style === 'coral') return createCoralFormation(land, height, outlineColor);
  return createGhibliTree(land, height, outlineColor);
}

// ── BUSH / SHRUB ────────────────────────────────
function createBush(land, outlineColor) {
  const group = new THREE.Group();
  const bushR = 0.05 + seededRandom() * 0.06;
  const puffs = 2 + Math.floor(seededRandom() * 3);

  for (let i = 0; i < puffs; i++) {
    const r = bushR * (0.7 + seededRandom() * 0.5);
    const geo = new THREE.IcosahedronGeometry(r, 1);
    const p = geo.attributes.position;
    for (let j = 0; j < p.count; j++) {
      const n = noise2D(p.getX(j) * 14 + i * 7, p.getZ(j) * 14) * 0.15 + 0.92;
      p.setX(j, p.getX(j) * n);
      p.setY(j, p.getY(j) * n * 0.75);
      p.setZ(j, p.getZ(j) * n);
    }
    geo.computeVertexNormals();

    const mat = new THREE.MeshToonMaterial({
      color: new THREE.Color(seededRandom() > 0.5 ? land.colors.bush : land.colors.bushLight),
      gradientMap: toonGrad4,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (seededRandom() - 0.5) * bushR * 1.5,
      r * 0.4,
      (seededRandom() - 0.5) * bushR * 1.5,
    );
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);

    // outline
    const outMesh = new THREE.Mesh(geo.clone(), new THREE.MeshBasicMaterial({ color: outlineColor, side: THREE.BackSide }));
    outMesh.position.copy(mesh.position);
    outMesh.scale.multiplyScalar(1.06);
    group.add(outMesh);
  }

  return group;
}

// ── MUSHROOM TREE ───────────────────────────────
function createMushroomTree(land, height, outlineColor) {
  const group = new THREE.Group();
  const stemH = height * 0.6;
  const capR = height * 0.55;

  // thick stem with bulge
  const stemGeo = new THREE.CylinderGeometry(0.025, 0.05, stemH, 8, 6);
  const stemPos = stemGeo.attributes.position;
  for (let i = 0; i < stemPos.count; i++) {
    const y = stemPos.getY(i);
    const t = (y / stemH + 0.5);
    const bulge = 1 + Math.sin(t * Math.PI) * 0.35;
    stemPos.setX(i, stemPos.getX(i) * bulge);
    stemPos.setZ(i, stemPos.getZ(i) * bulge);
  }
  stemGeo.computeVertexNormals();
  const stemMat = new THREE.MeshToonMaterial({
    color: new THREE.Color(land.colors.trunk), gradientMap: toonGrad4,
  });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = stemH * 0.5;
  stem.castShadow = true;
  group.add(stem);

  // mushroom cap — cluster of overlapping domes
  const capPuffs = 3 + Math.floor(seededRandom() * 2);
  for (let c = 0; c < capPuffs; c++) {
    const cr = capR * (c === 0 ? 1 : 0.5 + seededRandom() * 0.4);
    const capGeo = new THREE.SphereGeometry(cr, 10, 7, 0, Math.PI * 2, 0, Math.PI * 0.55);
    const capPos = capGeo.attributes.position;
    for (let i = 0; i < capPos.count; i++) {
      const y = capPos.getY(i);
      if (y < cr * 0.05) capPos.setY(i, cr * 0.05);
      const n = noise2D(capPos.getX(i) * 10 + c * 5, capPos.getZ(i) * 10) * 0.1;
      capPos.setX(i, capPos.getX(i) * (1 + n));
      capPos.setZ(i, capPos.getZ(i) * (1 + n));
    }
    capGeo.computeVertexNormals();

    // spotted cap vertex colors
    const capColors = new Float32Array(capPos.count * 3);
    const baseCol = new THREE.Color(land.colors.foliage);
    const spotCol = new THREE.Color(land.colors.foliageLight);
    const darkCol = new THREE.Color(land.colors.foliageDark);
    for (let i = 0; i < capPos.count; i++) {
      const x = capPos.getX(i), z = capPos.getZ(i), y = capPos.getY(i);
      const spot = noise2D(x * 20 + c, z * 20);
      const c2 = spot > 0.68 ? spotCol : (y < cr * 0.2 ? darkCol : baseCol);
      capColors[i * 3] = c2.r; capColors[i * 3 + 1] = c2.g; capColors[i * 3 + 2] = c2.b;
    }
    capGeo.setAttribute('color', new THREE.BufferAttribute(capColors, 3));

    const capMat = new THREE.MeshToonMaterial({ vertexColors: true, gradientMap: toonGrad4 });
    const cap = new THREE.Mesh(capGeo, capMat);
    const ox = c === 0 ? 0 : (seededRandom() - 0.5) * capR * 0.6;
    const oz = c === 0 ? 0 : (seededRandom() - 0.5) * capR * 0.6;
    cap.position.set(ox, stemH * (0.85 + c * 0.05), oz);
    cap.castShadow = true;
    cap.receiveShadow = true;
    group.add(cap);

    const capOut = new THREE.Mesh(capGeo.clone(), new THREE.MeshBasicMaterial({ color: outlineColor, side: THREE.BackSide }));
    capOut.position.copy(cap.position);
    capOut.scale.multiplyScalar(1.04);
    group.add(capOut);
  }

  // small mushrooms at base
  for (let i = 0; i < 2; i++) {
    const miniH = 0.02 + seededRandom() * 0.03;
    const miniR = 0.012 + seededRandom() * 0.01;
    const miniStem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.003, 0.005, miniH, 4),
      new THREE.MeshToonMaterial({ color: new THREE.Color(land.colors.trunkLight), gradientMap: toonGrad3 })
    );
    const miniCap = new THREE.Mesh(
      new THREE.SphereGeometry(miniR, 6, 4, 0, Math.PI * 2, 0, Math.PI * 0.5),
      new THREE.MeshToonMaterial({ color: new THREE.Color(land.colors.foliageLight), gradientMap: toonGrad3 })
    );
    const ox = (seededRandom() - 0.5) * 0.08;
    const oz = (seededRandom() - 0.5) * 0.08;
    miniStem.position.set(ox, miniH * 0.5, oz);
    miniCap.position.set(ox, miniH, oz);
    group.add(miniStem, miniCap);
  }

  return group;
}

// ── CRYSTAL SPIRE ───────────────────────────────
function createCrystalSpire(land, height, outlineColor) {
  const group = new THREE.Group();
  const spireCount = 2 + Math.floor(seededRandom() * 3);

  for (let s = 0; s < spireCount; s++) {
    const h = height * (0.5 + seededRandom() * 0.9);
    const r = 0.015 + seededRandom() * 0.04;
    const sides = 5 + Math.floor(seededRandom() * 2);
    const geo = new THREE.CylinderGeometry(r * 0.15, r, h, sides, 1);

    // twist and facet
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i);
      const twist = (y / h) * 0.4;
      const x = pos.getX(i), z = pos.getZ(i);
      pos.setX(i, x * Math.cos(twist) - z * Math.sin(twist));
      pos.setZ(i, x * Math.sin(twist) + z * Math.cos(twist));
    }
    geo.computeVertexNormals();

    const colors = [land.colors.foliage, land.colors.foliageLight, land.colors.foliageDark];
    const mat = new THREE.MeshToonMaterial({
      color: new THREE.Color(colors[s % 3]),
      gradientMap: toonGrad3,
      transparent: true, opacity: 0.82,
    });
    const crystal = new THREE.Mesh(geo, mat);
    const ox = (seededRandom() - 0.5) * 0.06;
    const oz = (seededRandom() - 0.5) * 0.06;
    crystal.position.set(ox, h * 0.5, oz);
    crystal.rotation.z = (seededRandom() - 0.5) * 0.35;
    crystal.rotation.x = (seededRandom() - 0.5) * 0.15;
    crystal.castShadow = true;
    group.add(crystal);

    const outMesh = new THREE.Mesh(geo.clone(), new THREE.MeshBasicMaterial({ color: outlineColor, side: THREE.BackSide }));
    outMesh.position.copy(crystal.position);
    outMesh.rotation.copy(crystal.rotation);
    outMesh.scale.multiplyScalar(1.04);
    group.add(outMesh);
  }

  // ice/crystal debris at base
  for (let i = 0; i < 3; i++) {
    const dSize = 0.008 + seededRandom() * 0.012;
    const dGeo = new THREE.OctahedronGeometry(dSize, 0);
    const dMat = new THREE.MeshToonMaterial({
      color: new THREE.Color(land.colors.foliageLight),
      gradientMap: toonGrad3,
      transparent: true, opacity: 0.7,
    });
    const debris = new THREE.Mesh(dGeo, dMat);
    debris.position.set((seededRandom() - 0.5) * 0.08, dSize * 0.5, (seededRandom() - 0.5) * 0.08);
    debris.rotation.set(seededRandom() * 2, seededRandom() * 2, 0);
    group.add(debris);
  }

  return group;
}

// ── TALL TREE (spirit forest) ───────────────────
function createTallTree(land, height, outlineColor) {
  const group = new THREE.Group();
  const trunkH = height * 1.1;

  // tall trunk with S-curve and exposed root flare
  const trunkGeo = new THREE.CylinderGeometry(0.012, 0.04, trunkH, 6, 12);
  const trunkPos = trunkGeo.attributes.position;
  for (let i = 0; i < trunkPos.count; i++) {
    const y = trunkPos.getY(i);
    const t = (y / trunkH + 0.5);
    // S-curve
    const bend = Math.sin(t * Math.PI * 1.3) * 0.025;
    trunkPos.setX(i, trunkPos.getX(i) + bend);
    // root flare at base
    if (t < 0.15) {
      const flare = 1 + (0.15 - t) * 4;
      trunkPos.setX(i, trunkPos.getX(i) * flare);
      trunkPos.setZ(i, trunkPos.getZ(i) * flare);
    }
  }
  trunkGeo.computeVertexNormals();

  // trunk vertex colors — dark at base, lighter up
  const trunkColors = new Float32Array(trunkPos.count * 3);
  for (let i = 0; i < trunkPos.count; i++) {
    const t = (trunkPos.getY(i) / trunkH + 0.5);
    const c = new THREE.Color(land.colors.trunk).lerp(new THREE.Color(land.colors.trunkDark), 1 - t);
    const n = noise2D(trunkPos.getX(i) * 30, trunkPos.getZ(i) * 30 + trunkPos.getY(i) * 10);
    if (n > 0.6) c.lerp(new THREE.Color(land.colors.cliffMoss || land.colors.grassDark), 0.3);
    trunkColors[i * 3] = c.r; trunkColors[i * 3 + 1] = c.g; trunkColors[i * 3 + 2] = c.b;
  }
  trunkGeo.setAttribute('color', new THREE.BufferAttribute(trunkColors, 3));

  const trunkMat = new THREE.MeshToonMaterial({ vertexColors: true, gradientMap: toonGrad4 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = trunkH * 0.5;
  trunk.castShadow = true;
  group.add(trunk);

  // trunk outline
  const trunkOut = new THREE.Mesh(trunkGeo.clone(), new THREE.MeshBasicMaterial({ color: outlineColor, side: THREE.BackSide }));
  trunkOut.position.copy(trunk.position);
  trunkOut.scale.multiplyScalar(1.04);
  group.add(trunkOut);

  // canopy — sparse but layered clusters
  const leafCount = 4 + Math.floor(seededRandom() * 3);
  for (let i = 0; i < leafCount; i++) {
    const lr = 0.035 + seededRandom() * 0.06;
    const lGeo = new THREE.IcosahedronGeometry(lr, 2);
    const lPos = lGeo.attributes.position;
    for (let j = 0; j < lPos.count; j++) {
      const n = noise2D(lPos.getX(j) * 12 + i * 5, lPos.getZ(j) * 12) * 0.2 + 0.9;
      lPos.setX(j, lPos.getX(j) * n);
      lPos.setY(j, lPos.getY(j) * n * 0.65);
      lPos.setZ(j, lPos.getZ(j) * n);
    }
    lGeo.computeVertexNormals();

    const foliageColors = [land.colors.foliage, land.colors.foliageDark, land.colors.foliageLight];
    const lMat = new THREE.MeshToonMaterial({
      color: new THREE.Color(foliageColors[i % 3]),
      gradientMap: toonGrad4,
    });
    const leaf = new THREE.Mesh(lGeo, lMat);
    const angle = (i / leafCount) * Math.PI * 2 + seededRandom() * 0.5;
    leaf.position.set(
      Math.cos(angle) * lr * 1.8,
      trunkH * (0.65 + seededRandom() * 0.35),
      Math.sin(angle) * lr * 1.8,
    );
    leaf.castShadow = true;
    group.add(leaf);

    const outMesh = new THREE.Mesh(lGeo.clone(), new THREE.MeshBasicMaterial({ color: outlineColor, side: THREE.BackSide }));
    outMesh.position.copy(leaf.position);
    outMesh.scale.multiplyScalar(1.06);
    group.add(outMesh);
  }

  // hanging vines/moss
  const vineCount = 2 + Math.floor(seededRandom() * 3);
  for (let i = 0; i < vineCount; i++) {
    const vineH = 0.06 + seededRandom() * 0.12;
    const vineGeo = new THREE.CylinderGeometry(0.003, 0.001, vineH, 3, 5);
    const vPos = vineGeo.attributes.position;
    for (let j = 0; j < vPos.count; j++) {
      vPos.setX(j, vPos.getX(j) + Math.sin(vPos.getY(j) * 12) * 0.005);
    }
    vineGeo.computeVertexNormals();
    const vineMat = new THREE.MeshToonMaterial({
      color: new THREE.Color(land.colors.foliageDark), gradientMap: toonGrad3,
    });
    const vine = new THREE.Mesh(vineGeo, vineMat);
    vine.position.set(
      (seededRandom() - 0.5) * 0.08,
      trunkH * (0.5 + seededRandom() * 0.3),
      (seededRandom() - 0.5) * 0.08,
    );
    vine.rotation.z = Math.PI + (seededRandom() - 0.5) * 0.3;
    group.add(vine);
  }

  return group;
}

// ── CORAL FORMATION ─────────────────────────────
function createCoralFormation(land, height, outlineColor) {
  const group = new THREE.Group();
  const branchCount = 3 + Math.floor(seededRandom() * 3);

  for (let b = 0; b < branchCount; b++) {
    const bh = height * (0.35 + seededRandom() * 0.65);
    const br = 0.015 + seededRandom() * 0.025;

    const geo = new THREE.CylinderGeometry(br * 0.3, br, bh, 7, 8);
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const y = pos.getY(i), x = pos.getX(i), z = pos.getZ(i);
      const bump = noise2D(x * 25 + b * 7, z * 25 + y * 12) * 0.006;
      const bend = (y / bh + 0.5) * (seededRandom() - 0.5) * 0.02;
      pos.setX(i, x + bump + bend);
      pos.setZ(i, z + bump);
    }
    geo.computeVertexNormals();

    const colors = [land.colors.foliage, land.colors.foliageLight, land.colors.foliageDark];
    const mat = new THREE.MeshToonMaterial({
      color: new THREE.Color(colors[b % 3]),
      gradientMap: toonGrad4,
    });
    const branch = new THREE.Mesh(geo, mat);
    const angle = (b / branchCount) * Math.PI * 2 + seededRandom() * 0.5;
    const spread = 0.01 + seededRandom() * 0.04;
    branch.position.set(Math.cos(angle) * spread, bh * 0.5, Math.sin(angle) * spread);
    branch.rotation.z = (seededRandom() - 0.5) * 0.5;
    branch.rotation.x = (seededRandom() - 0.5) * 0.35;
    branch.castShadow = true;
    group.add(branch);

    // bulb tips with slight glow
    const tipR = br * 0.6 + seededRandom() * br * 0.3;
    const tipGeo = new THREE.SphereGeometry(tipR, 6, 5);
    const tipMat = new THREE.MeshToonMaterial({
      color: new THREE.Color(land.colors.foliageLight),
      gradientMap: toonGrad3,
    });
    const tip = new THREE.Mesh(tipGeo, tipMat);
    tip.position.set(branch.position.x, bh * 0.95, branch.position.z);
    tip.castShadow = true;
    group.add(tip);
  }

  // outlines
  const children = [...group.children];
  children.forEach(child => {
    if (child.geometry) {
      const outMesh = new THREE.Mesh(child.geometry.clone(), new THREE.MeshBasicMaterial({ color: outlineColor, side: THREE.BackSide }));
      outMesh.position.copy(child.position);
      outMesh.rotation.copy(child.rotation);
      outMesh.scale.multiplyScalar(1.04);
      group.add(outMesh);
    }
  });

  return group;
}

// ── GHIBLI TREE — round puffy foliage ───────────
function createGhibliTree(land, height, outlineColor) {
  const group = new THREE.Group();

  // trunk with exposed root flare
  const trunkGeo = new THREE.CylinderGeometry(0.02, 0.045, height * 0.55, 6, 8);
  const trunkPos = trunkGeo.attributes.position;
  for (let i = 0; i < trunkPos.count; i++) {
    const y = trunkPos.getY(i);
    const t = (y / (height * 0.55) + 0.5);
    const bend = Math.sin(t * Math.PI) * 0.012;
    trunkPos.setX(i, trunkPos.getX(i) + bend);
    // root flare
    if (t < 0.12) {
      const flare = 1 + (0.12 - t) * 3.5;
      trunkPos.setX(i, trunkPos.getX(i) * flare);
      trunkPos.setZ(i, trunkPos.getZ(i) * flare);
    }
  }
  trunkGeo.computeVertexNormals();
  const trunkMat = new THREE.MeshToonMaterial({
    color: new THREE.Color(land.colors.trunk), gradientMap: toonGrad4,
  });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = height * 0.275;
  trunk.castShadow = true;
  group.add(trunk);

  // foliage — bigger cluster with more puffs
  const foliageGroup = new THREE.Group();
  foliageGroup.position.y = height * 0.5;

  const canopyR = height * 0.5;
  const spherePositions = [
    [0, canopyR * 0.15, 0, canopyR],
    [canopyR * 0.55, canopyR * 0.05, 0, canopyR * 0.78],
    [-canopyR * 0.5, canopyR * 0.1, canopyR * 0.25, canopyR * 0.72],
    [canopyR * 0.15, canopyR * 0.45, -canopyR * 0.2, canopyR * 0.65],
    [-canopyR * 0.28, -canopyR * 0.05, -canopyR * 0.45, canopyR * 0.68],
    [canopyR * 0.35, canopyR * 0.35, canopyR * 0.35, canopyR * 0.58],
    [-canopyR * 0.4, canopyR * 0.38, 0, canopyR * 0.52],
    [0, canopyR * 0.5, canopyR * 0.15, canopyR * 0.45],
    [canopyR * 0.2, -canopyR * 0.1, -canopyR * 0.3, canopyR * 0.5],
  ];

  const foliageColors = [land.colors.foliage, land.colors.foliageDark, land.colors.foliageLight];

  spherePositions.forEach((sp, idx) => {
    const sGeo = new THREE.IcosahedronGeometry(sp[3], 2);
    const sPos = sGeo.attributes.position;
    for (let i = 0; i < sPos.count; i++) {
      const x = sPos.getX(i), y = sPos.getY(i), z = sPos.getZ(i);
      const n = noise2D(x * 8 + idx * 10, z * 8 + idx * 10) * 0.18 + 0.9;
      sPos.setX(i, x * n);
      sPos.setY(i, y * n);
      sPos.setZ(i, z * n);
    }
    sGeo.computeVertexNormals();

    const sMat = new THREE.MeshToonMaterial({
      color: new THREE.Color(foliageColors[idx % 3]),
      gradientMap: toonGrad4,
    });
    const sphere = new THREE.Mesh(sGeo, sMat);
    sphere.position.set(sp[0], sp[1], sp[2]);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    foliageGroup.add(sphere);

    const outMesh = new THREE.Mesh(sGeo.clone(), new THREE.MeshBasicMaterial({ color: outlineColor, side: THREE.BackSide }));
    outMesh.position.copy(sphere.position);
    outMesh.scale.multiplyScalar(1.045);
    foliageGroup.add(outMesh);
  });

  group.add(foliageGroup);
  return group;
}

// ── CLOUDS (fuller, more detailed) ──────────────
function createClouds(land) {
  const group = new THREE.Group();
  seed = 500;

  for (let i = 0; i < 12; i++) {
    const cloudG = new THREE.Group();
    const cx = (seededRandom() - 0.5) * 24;
    const cy = 4.5 + seededRandom() * 5;
    const cz = (seededRandom() - 0.5) * 24;
    const cloudScale = 0.5 + seededRandom() * 1.2;

    const puffs = 4 + Math.floor(seededRandom() * 5);
    for (let j = 0; j < puffs; j++) {
      const pr = (0.25 + seededRandom() * 0.5) * cloudScale;
      const px = (j - puffs / 2) * pr * 0.85;
      const py = seededRandom() * pr * 0.35;
      const pz = (seededRandom() - 0.5) * pr * 0.6;

      const pGeo = new THREE.IcosahedronGeometry(pr, 2);
      const pPos = pGeo.attributes.position;
      for (let k = 0; k < pPos.count; k++) {
        let y = pPos.getY(k);
        if (y < 0) y *= 0.25;
        pPos.setY(k, y * 0.65);
        // organic deformation
        const n = noise2D(pPos.getX(k) * 4 + j, pPos.getZ(k) * 4) * 0.1;
        pPos.setX(k, pPos.getX(k) * (1 + n));
        pPos.setZ(k, pPos.getZ(k) * (1 + n));
      }
      pGeo.computeVertexNormals();

      const pMat = new THREE.MeshToonMaterial({
        color: new THREE.Color(py > pr * 0.1 ? land.cloudColor : land.cloudShadow),
        gradientMap: toonGrad4,
      });
      const puff = new THREE.Mesh(pGeo, pMat);
      puff.position.set(px, py, pz);
      puff.castShadow = true;
      cloudG.add(puff);
    }

    cloudG.position.set(cx, cy, cz);
    cloudG.userData.speed = 0.015 + seededRandom() * 0.035;
    cloudG.userData.baseX = cx;
    group.add(cloudG);
  }

  return group;
}

// ── BUTTERFLIES / PARTICLES ─────────────────────
function createParticles(land) {
  const group = new THREE.Group();
  if (!land.hasButterflies && !land.hasGlowSpots) return group;

  seed = 1000;
  const count = land.hasButterflies ? 10 : 6;

  for (let i = 0; i < count; i++) {
    const bG = new THREE.Group();
    const wingSize = 0.012 + seededRandom() * 0.008;
    const wingGeo = new THREE.PlaneGeometry(wingSize, wingSize * 0.7);
    const wingColor = land.hasButterflies
      ? [land.colors.flowers, land.colors.flowers2, land.colors.flowers3][Math.floor(seededRandom() * 3)]
      : land.colors.flowers;
    const wingMat = new THREE.MeshBasicMaterial({
      color: new THREE.Color(wingColor),
      transparent: true, opacity: 0.8,
      side: THREE.DoubleSide,
    });
    const wing1 = new THREE.Mesh(wingGeo, wingMat);
    wing1.position.x = wingSize * 0.4;
    const wing2 = new THREE.Mesh(wingGeo, wingMat.clone());
    wing2.position.x = -wingSize * 0.4;
    bG.add(wing1, wing2);

    bG.position.set(
      (seededRandom() - 0.5) * RADIUS * 1.5,
      0.5 + seededRandom() * 2,
      (seededRandom() - 0.5) * RADIUS * 1.5,
    );
    bG.userData.isButterfly = true;
    bG.userData.phase = seededRandom() * Math.PI * 2;
    bG.userData.speed = 0.3 + seededRandom() * 0.5;
    bG.userData.radius = 0.3 + seededRandom() * 0.6;
    bG.userData.baseY = bG.position.y;
    bG.userData.centerX = bG.position.x;
    bG.userData.centerZ = bG.position.z;
    group.add(bG);
  }

  return group;
}

// ── TRANSITION ──────────────────────────────────
let currentLandIndex = 0;
let transitioning = false;
let transitionProgress = 0;

function switchToLand(index) {
  if (index === currentLandIndex || transitioning) return;
  transitioning = true;
  transitionProgress = 0;
  const targetIndex = index;

  function animateOut() {
    transitionProgress += 0.026;
    if (transitionProgress < 1) {
      const t = transitionProgress;
      islandGroup.position.y = -t * 2.5;
      islandGroup.rotation.y += 0.012;
      islandGroup.scale.setScalar(1 - t * 0.2);
      cloudGroup.children.forEach(c => {
        c.children.forEach(p => { if (p.material) p.material.opacity = Math.max(0, 1 - t * 2); });
      });
      requestAnimationFrame(animateOut);
    } else {
      scene.remove(islandGroup);
      scene.remove(cloudGroup);
      scene.remove(particleGroup);
      islandGroup = createIsland(LANDS[targetIndex]);
      cloudGroup = createClouds(LANDS[targetIndex]);
      particleGroup = createParticles(LANDS[targetIndex]);
      islandGroup.position.y = -2.5;
      islandGroup.scale.setScalar(0.8);
      scene.add(islandGroup);
      scene.add(cloudGroup);
      scene.add(particleGroup);
      currentLandIndex = targetIndex;
      updateSceneColors(LANDS[targetIndex]);
      transitionProgress = 0;
      animateIn();
    }
  }

  function animateIn() {
    transitionProgress += 0.022;
    if (transitionProgress < 1) {
      const t = 1 - Math.pow(1 - transitionProgress, 3);
      islandGroup.position.y = -2.5 + t * 2.5;
      islandGroup.scale.setScalar(0.8 + t * 0.2);
      requestAnimationFrame(animateIn);
    } else {
      islandGroup.position.y = 0;
      islandGroup.scale.setScalar(1);
      transitioning = false;
    }
  }

  animateOut();
  document.querySelectorAll('.land-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === targetIndex);
  });
}

// ── DAY/NIGHT CYCLE ─────────────────────────────
// Full cycle ~80 seconds. Phases: dawn→day→golden→sunset→dusk→night→pre-dawn
const CYCLE_SPEED = 0.0125; // full cycle per ~80s
let dayTime = 0.2; // start at morning

// Time-of-day color tints (applied universally on top of biome colors)
const TOD_PHASES = [
  // t,    skyTop,     skyMid,     skyBot,     fog,        sunCol,     sunInt, ambCol,     ambInt, rimCol,     rimInt, fillInt
  { t: 0.00, skyTop: '#1a1028', skyMid: '#2a1838', skyBot: '#483050', fog: '#201828', sunCol: '#8888cc', sunInt: 0.15, ambCol: '#283048', ambInt: 0.2, rimCol: '#6868a8', rimInt: 0.05, fillInt: 0.05 }, // midnight
  { t: 0.12, skyTop: '#2a2040', skyMid: '#584068', skyBot: '#886878', fog: '#3a2840', sunCol: '#cc8888', sunInt: 0.3, ambCol: '#4a3858', ambInt: 0.25, rimCol: '#cc8888', rimInt: 0.1, fillInt: 0.08 }, // pre-dawn
  { t: 0.18, skyTop: '#e89870', skyMid: '#f0b888', skyBot: '#f8d8a8', fog: '#e8a880', sunCol: '#ffb880', sunInt: 0.9, ambCol: '#c89078', ambInt: 0.4, rimCol: '#ffc890', rimInt: 0.3, fillInt: 0.15 }, // dawn
  { t: 0.25, skyTop: '#78b8e8', skyMid: '#a8d0f0', skyBot: '#d0e8f0', fog: '#b8d0e0', sunCol: '#fff4e0', sunInt: 1.4, ambCol: '#c8d0e0', ambInt: 0.55, rimCol: '#ffecd0', rimInt: 0.35, fillInt: 0.3 }, // morning
  { t: 0.45, skyTop: '#78b8e8', skyMid: '#a8d0f0', skyBot: '#d0e8f0', fog: '#b8d0e0', sunCol: '#fff4e0', sunInt: 1.4, ambCol: '#c8d0e0', ambInt: 0.55, rimCol: '#ffecd0', rimInt: 0.35, fillInt: 0.3 }, // midday
  { t: 0.55, skyTop: '#d89848', skyMid: '#e8b868', skyBot: '#f0d890', fog: '#d8a868', sunCol: '#ffc868', sunInt: 1.1, ambCol: '#c89858', ambInt: 0.45, rimCol: '#ffd080', rimInt: 0.4, fillInt: 0.2 }, // golden hour
  { t: 0.63, skyTop: '#b85838', skyMid: '#d87848', skyBot: '#e8a068', fog: '#c07050', sunCol: '#ff8848', sunInt: 0.7, ambCol: '#a06840', ambInt: 0.35, rimCol: '#ff9060', rimInt: 0.3, fillInt: 0.12 }, // sunset
  { t: 0.72, skyTop: '#382848', skyMid: '#583858', skyBot: '#785060', fog: '#3a2838', sunCol: '#9868a8', sunInt: 0.3, ambCol: '#483858', ambInt: 0.25, rimCol: '#886898', rimInt: 0.1, fillInt: 0.08 }, // dusk
  { t: 0.82, skyTop: '#101828', skyMid: '#182030', skyBot: '#283040', fog: '#141820', sunCol: '#8888cc', sunInt: 0.15, ambCol: '#283048', ambInt: 0.2, rimCol: '#6868a8', rimInt: 0.05, fillInt: 0.05 }, // night
  { t: 1.00, skyTop: '#1a1028', skyMid: '#2a1838', skyBot: '#483050', fog: '#201828', sunCol: '#8888cc', sunInt: 0.15, ambCol: '#283048', ambInt: 0.2, rimCol: '#6868a8', rimInt: 0.05, fillInt: 0.05 }, // midnight wrap
];

function lerpColor(a, b, t) {
  const ca = new THREE.Color(a), cb = new THREE.Color(b);
  return ca.lerp(cb, t);
}

function getTOD(time) {
  const t = time % 1;
  let i = 0;
  for (let j = 1; j < TOD_PHASES.length; j++) {
    if (TOD_PHASES[j].t > t) { i = j - 1; break; }
  }
  const a = TOD_PHASES[i], b = TOD_PHASES[i + 1];
  const f = (t - a.t) / (b.t - a.t);
  const smooth = f * f * (3 - 2 * f); // smoothstep
  return {
    skyTop: lerpColor(a.skyTop, b.skyTop, smooth),
    skyMid: lerpColor(a.skyMid, b.skyMid, smooth),
    skyBot: lerpColor(a.skyBot, b.skyBot, smooth),
    fog: lerpColor(a.fog, b.fog, smooth),
    sunCol: lerpColor(a.sunCol, b.sunCol, smooth),
    sunInt: a.sunInt + (b.sunInt - a.sunInt) * smooth,
    ambCol: lerpColor(a.ambCol, b.ambCol, smooth),
    ambInt: a.ambInt + (b.ambInt - a.ambInt) * smooth,
    rimCol: lerpColor(a.rimCol, b.rimCol, smooth),
    rimInt: a.rimInt + (b.rimInt - a.rimInt) * smooth,
    fillInt: a.fillInt + (b.fillInt - a.fillInt) * smooth,
  };
}

// sky canvas (reused each frame)
const skyCanvas = document.createElement('canvas');
skyCanvas.width = 1;
skyCanvas.height = 512;
const skyCtx = skyCanvas.getContext('2d');
let skyTexture = null;

function updateDayNight(tod) {
  // sky gradient
  const grad = skyCtx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#' + tod.skyTop.getHexString());
  grad.addColorStop(0.5, '#' + tod.skyMid.getHexString());
  grad.addColorStop(1, '#' + tod.skyBot.getHexString());
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 1, 512);
  if (!skyTexture) {
    skyTexture = new THREE.CanvasTexture(skyCanvas);
    skyTexture.mapping = THREE.EquirectangularReflectionMapping;
  } else {
    skyTexture.needsUpdate = true;
  }
  scene.background = skyTexture;

  // fog
  if (!scene.fog) scene.fog = new THREE.FogExp2(tod.fog, 0.015);
  else scene.fog.color.copy(tod.fog);

  // lights
  sunLight.color.copy(tod.sunCol);
  sunLight.intensity = tod.sunInt;
  ambientLight.color.copy(tod.ambCol);
  ambientLight.intensity = tod.ambInt;
  rimLight.color.copy(tod.rimCol);
  rimLight.intensity = tod.rimInt;
  fillLight.intensity = tod.fillInt;

  // sun position arcs across sky
  const t = dayTime % 1;
  const sunAngle = t * Math.PI * 2 - Math.PI * 0.5;
  sunLight.position.set(Math.cos(sunAngle) * 10, Math.sin(sunAngle) * 12 + 2, 5);
}

// ── STARS ────────────────────────────────────────
const starGroup = new THREE.Group();
scene.add(starGroup);
{
  const starCount = 200;
  const starGeo = new THREE.BufferGeometry();
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.45; // upper hemisphere
    const r = 40 + Math.random() * 20;
    starPositions[i * 3] = Math.cos(theta) * Math.sin(phi) * r;
    starPositions[i * 3 + 1] = Math.cos(phi) * r;
    starPositions[i * 3 + 2] = Math.sin(theta) * Math.sin(phi) * r;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0 });
  const stars = new THREE.Points(starGeo, starMat);
  stars.userData.isStars = true;
  starGroup.add(stars);
}

// ── FIREFLIES (appear at night) ─────────────────
const fireflyGroup = new THREE.Group();
scene.add(fireflyGroup);
{
  for (let i = 0; i < 25; i++) {
    const ffGeo = new THREE.SphereGeometry(0.015, 4, 3);
    const ffMat = new THREE.MeshBasicMaterial({ color: 0xeeff88, transparent: true, opacity: 0 });
    const ff = new THREE.Mesh(ffGeo, ffMat);
    ff.position.set(
      (Math.random() - 0.5) * RADIUS * 2,
      0.3 + Math.random() * 2.5,
      (Math.random() - 0.5) * RADIUS * 2,
    );
    ff.userData.isFirefly = true;
    ff.userData.phase = Math.random() * Math.PI * 2;
    ff.userData.speed = 0.2 + Math.random() * 0.4;
    ff.userData.baseX = ff.position.x;
    ff.userData.baseY = ff.position.y;
    ff.userData.baseZ = ff.position.z;
    ff.userData.radius = 0.15 + Math.random() * 0.3;
    fireflyGroup.add(ff);
  }
}

function updateSceneColors(land) {
  // initial setup uses the biome sky — day/night will override each frame
  const tod = getTOD(dayTime);
  updateDayNight(tod);

  // update water shader colors for new biome
  islandGroup.traverse(child => {
    if (child.userData.isWaveWater && child.userData.uniforms) {
      const u = child.userData.uniforms;
      u.uShallow.value.set(land.colors.waterShallow);
      u.uMid.value.set(land.colors.water);
      u.uDeep.value.set(land.colors.waterDeep);
      u.uFoamColor.value.set(land.colors.waterFoam);
    }
  });
}

// ── UI ──────────────────────────────────────────
const uiContainer = document.getElementById('ui');
LANDS.forEach((land, i) => {
  const btn = document.createElement('button');
  btn.className = 'land-btn' + (i === 0 ? ' active' : '');
  btn.style.animationDelay = `${0.3 + i * 0.08}s`;
  btn.textContent = land.name;
  btn.addEventListener('click', () => switchToLand(i));

  // tooltip
  const tooltip = document.createElement('div');
  tooltip.className = 'land-tooltip';
  const nameRow = document.createElement('div');
  nameRow.className = 'tooltip-name';
  [land.colors.grass, land.colors.foliage, land.colors.water].forEach(c => {
    const swatch = document.createElement('span');
    swatch.className = 'tooltip-swatch';
    swatch.style.background = c;
    nameRow.appendChild(swatch);
  });
  nameRow.appendChild(document.createTextNode(land.name));
  const descRow = document.createElement('div');
  descRow.className = 'tooltip-desc';
  descRow.textContent = land.desc;
  tooltip.appendChild(nameRow);
  tooltip.appendChild(descRow);
  btn.appendChild(tooltip);

  uiContainer.appendChild(btn);
});

// ── INIT ────────────────────────────────────────
islandGroup = createIsland(LANDS[0]);
cloudGroup = createClouds(LANDS[0]);
particleGroup = createParticles(LANDS[0]);
scene.add(islandGroup);
scene.add(cloudGroup);
scene.add(particleGroup);
updateSceneColors(LANDS[0]);

// ── ANIMATION LOOP ──────────────────────────────
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();
  const dt = elapsed - lastTime;
  lastTime = elapsed;

  // ── DAY/NIGHT CYCLE UPDATE ──
  dayTime = (dayTime + CYCLE_SPEED * dt) % 1;
  const tod = getTOD(dayTime);
  updateDayNight(tod);

  // night factor (0 = day, 1 = full night)
  const t = dayTime % 1;
  const nightFactor = t > 0.72 && t < 0.95 ? 1 : (t >= 0.63 && t <= 0.72 ? (t - 0.63) / 0.09 : (t >= 0.95 || t < 0.12 ? (t >= 0.95 ? 1 - (t - 0.95) / 0.05 : 1 - t / 0.12) : 0));

  // stars visibility
  starGroup.traverse(child => {
    if (child.userData.isStars && child.material) {
      child.material.opacity = nightFactor * 0.8;
      child.rotation.y = elapsed * 0.003;
    }
  });

  // fireflies — glow and drift at night
  fireflyGroup.traverse(child => {
    if (child.userData.isFirefly) {
      const p = child.userData.phase;
      const spd = child.userData.speed;
      child.position.x = child.userData.baseX + Math.sin(elapsed * spd * 0.7 + p) * child.userData.radius;
      child.position.y = child.userData.baseY + Math.sin(elapsed * spd * 1.2 + p) * 0.15;
      child.position.z = child.userData.baseZ + Math.cos(elapsed * spd * 0.5 + p * 1.3) * child.userData.radius;
      // blink
      const blink = Math.sin(elapsed * 2.5 + p) * 0.5 + 0.5;
      child.material.opacity = nightFactor * blink * 0.9;
      const s = 1 + blink * 0.4;
      child.scale.setScalar(s);
    }
  });

  // gentle breathing
  if (!transitioning) {
    islandGroup.position.y = Math.sin(elapsed * 0.35) * 0.05;
    islandGroup.rotation.y = Math.sin(elapsed * 0.1) * 0.025;
  }

  // water Gerstner waves + foam + flowers + glow + leaves + lava
  islandGroup.traverse(child => {
    // Gerstner wave animation — vertices move in circular orbits
    if (child.userData.isWaveWater) {
      const pos = child.geometry.attributes.position;
      const origX = child.userData.origX;
      const origY = child.userData.origY;
      const origZ = child.userData.origZ;
      const waves = child.userData.waves;
      const uniforms = child.userData.uniforms;

      // update shader uniforms
      uniforms.uTime.value = elapsed;
      uniforms.uSunDir.value.copy(sunLight.position).normalize();
      uniforms.uSunColor.value.copy(sunLight.color);

      for (let i = 0; i < pos.count; i++) {
        const ox = origX[i], oz = origZ[i];
        const wd = Math.sqrt(ox * ox + oz * oz) / RADIUS;
        // dampen near island
        const dampen = Math.max(0, Math.min(1, (wd - 0.85) * 4));

        let dx = 0, dy = 0, dz = 0;
        // sum Gerstner waves
        for (const w of waves) {
          const dot = w.dir[0] * ox + w.dir[1] * oz;
          const phase = w.freq * dot - w.speed * elapsed;
          const s = Math.sin(phase), c = Math.cos(phase);
          // Gerstner: horizontal displacement + vertical wave
          dx += w.steep * w.amp * w.dir[0] * c;
          dz += w.steep * w.amp * w.dir[1] * c;
          dy += w.amp * s;
        }

        pos.setX(i, ox + dx * dampen);
        pos.setY(i, origY[i] + dy * dampen);
        pos.setZ(i, oz + dz * dampen);
      }
      pos.needsUpdate = true;
      child.geometry.computeVertexNormals();
    }
    if (child.userData.isFlower) {
      child.position.y = child.userData.baseY + Math.sin(elapsed * 2 + child.userData.phase) * 0.004;
    }
    if (child.userData.isGlow && child.material) {
      child.material.opacity = 0.45 + Math.sin(elapsed * 1.6 + child.userData.phase) * 0.3;
      const s = 1 + Math.sin(elapsed * 2 + child.userData.phase) * 0.18;
      child.scale.setScalar(s);
    }
    if (child.userData.isLeaf) {
      child.position.y = child.userData.baseY + Math.sin(elapsed * child.userData.speed + child.userData.phase) * 0.12 - elapsed * 0.008;
      child.position.x = child.userData.baseX + Math.sin(elapsed * 0.35 + child.userData.phase) * 0.25;
      child.rotation.x += 0.006;
      child.rotation.z += 0.004;
      if (child.position.y < 0) child.position.y = child.userData.baseY + 2.5;
    }
    if (child.userData.isLava && child.material) {
      child.material.opacity = 0.35 + Math.sin(elapsed * 3.5 + child.userData.phase) * 0.3;
    }
  });

  // butterflies
  particleGroup.traverse(child => {
    if (child.userData.isButterfly) {
      const t = elapsed * child.userData.speed + child.userData.phase;
      child.position.x = child.userData.centerX + Math.sin(t * 0.7) * child.userData.radius;
      child.position.z = child.userData.centerZ + Math.cos(t * 0.5) * child.userData.radius;
      child.position.y = child.userData.baseY + Math.sin(t * 1.5) * 0.2;
      // wing flap
      if (child.children[0]) child.children[0].rotation.y = Math.sin(elapsed * 8 + child.userData.phase) * 0.6;
      if (child.children[1]) child.children[1].rotation.y = -Math.sin(elapsed * 8 + child.userData.phase) * 0.6;
      child.lookAt(
        child.position.x + Math.cos(t * 0.7) * 0.5,
        child.position.y,
        child.position.z - Math.sin(t * 0.5) * 0.5,
      );
    }
  });

  // drift clouds
  cloudGroup.children.forEach(cloud => {
    cloud.position.x = cloud.userData.baseX + Math.sin(elapsed * cloud.userData.speed * 0.4) * 1.5 + elapsed * cloud.userData.speed;
    cloud.position.y += Math.sin(elapsed * 0.25 + cloud.position.z) * 0.00015;
    if (cloud.position.x > 18) cloud.position.x = -18;
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ── RESIZE ──────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── WATER RIPPLE RAYCASTER ─────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let rippleIndex = 0;
let lastRippleTime = 0;

renderer.domElement.addEventListener('pointermove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  const now = clock.getElapsedTime();
  if (now - lastRippleTime < 0.15) return; // throttle

  raycaster.setFromCamera(mouse, camera);
  // find water mesh
  const waterMeshes = [];
  islandGroup.traverse(child => {
    if (child.userData.isWaveWater) waterMeshes.push(child);
  });
  const hits = raycaster.intersectObjects(waterMeshes);
  if (hits.length > 0) {
    const pt = hits[0].point;
    const uniforms = hits[0].object.userData.uniforms;
    if (uniforms && uniforms.uRipples) {
      const rip = uniforms.uRipples.value[rippleIndex % 5];
      rip.x = pt.x;
      rip.y = pt.z;
      rip.z = 0.8;
      rip.w = now;
      rippleIndex++;
      lastRippleTime = now;
    }
  }
});
</script>
