<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aethlands</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    color: #e8e0d4;
  }
  canvas { display: block; }

  #ui {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    z-index: 10;
    max-width: 95vw;
  }
  .land-btn {
    padding: 9px 18px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: #5a4a3a;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    opacity: 0;
    transform: translateY(20px);
    animation: btnEntrance 0.5s ease-out forwards;
    position: relative;
  }
  .land-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }
  .land-btn.active {
    background: rgba(255,255,255,0.35);
    border-color: rgba(255,255,255,0.6);
    box-shadow: 0 4px 20px rgba(180,160,120,0.15);
  }
  @keyframes btnEntrance {
    from { opacity: 0; transform: translateY(20px) scale(0.92); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Tooltip */
  .land-tooltip {
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(30, 28, 40, 0.88);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 8px 14px;
    color: #d8d0c4;
    font-size: 12px;
    font-weight: 400;
    line-height: 1.45;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 20;
  }
  .land-tooltip .tooltip-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
    color: #f0e8dc;
  }
  .land-tooltip .tooltip-desc {
    opacity: 0.75;
  }
  .land-tooltip .tooltip-swatch {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .land-btn:hover .land-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Screenshot Button */
  #screenshot-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: #5a4a3a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.3s ease;
    opacity: 0;
    animation: btnEntrance 0.5s ease-out 0.8s forwards;
  }
  #screenshot-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }
  #screenshot-btn svg { width: 22px; height: 22px; }
  #screenshot-btn.success {
    border-color: rgba(120,200,120,0.6);
    background: rgba(120,200,120,0.2);
  }

  /* Screenshot Flash */
  #screenshot-flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.15s ease-out;
  }
  #screenshot-flash.active {
    opacity: 0.7;
    transition: none;
  }

  /* Cinematic Tour Button */
  #tour-btn {
    position: fixed;
    top: 20px;
    right: 74px;
    width: 44px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: #5a4a3a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.3s ease;
    opacity: 0;
    animation: btnEntrance 0.5s ease-out 0.9s forwards;
  }
  #tour-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }
  #tour-btn.active {
    background: rgba(255,255,255,0.35);
    border-color: rgba(255,255,255,0.6);
  }
  #tour-btn svg { width: 20px; height: 20px; }

  /* Cinematic indicator */
  #cinematic-indicator {
    position: fixed;
    top: 72px;
    right: 20px;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    background: rgba(30,28,40,0.7);
    backdrop-filter: blur(12px);
    color: #d8d0c4;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #cinematic-indicator.visible { opacity: 1; }

  /* Walk Mode Button */
  #walk-btn {
    position: fixed;
    top: 20px;
    right: 128px;
    width: 44px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: #5a4a3a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.3s ease;
    opacity: 0;
    animation: btnEntrance 0.5s ease-out 1.0s forwards;
  }
  #walk-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }
  #walk-btn.active {
    background: rgba(255,255,255,0.35);
    border-color: rgba(255,255,255,0.6);
  }
  #walk-btn svg { width: 20px; height: 20px; }

  /* Walk mode crosshair */
  #walk-crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  #walk-crosshair.visible { opacity: 0.5; }
  #walk-crosshair::before, #walk-crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.8);
    border-radius: 1px;
  }
  #walk-crosshair::before {
    width: 2px; height: 14px;
    top: 5px; left: 11px;
  }
  #walk-crosshair::after {
    width: 14px; height: 2px;
    top: 11px; left: 5px;
  }

  /* Walk mode hint */
  #walk-hint {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 18px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    background: rgba(30,28,40,0.75);
    backdrop-filter: blur(12px);
    color: #d8d0c4;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.3px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    white-space: nowrap;
  }
  #walk-hint.visible { opacity: 1; }

  /* Welcome overlay */
  #welcome-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1.2s ease;
  }
  #welcome-overlay.hidden { opacity: 0; }
  #welcome-inner {
    text-align: center;
    padding: 32px 48px;
    background: rgba(20, 18, 30, 0.75);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px;
    max-width: 420px;
    animation: welcomeIn 0.8s ease-out 0.5s both;
  }
  @keyframes welcomeIn {
    from { opacity: 0; transform: translateY(16px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  #welcome-inner h1 {
    font-size: 22px;
    font-weight: 600;
    color: #f0e8dc;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  #welcome-inner .welcome-hints {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .welcome-hint-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #c8c0b4;
  }
  .welcome-hint-key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 24px;
    padding: 0 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    color: #e0d8cc;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  #welcome-dismiss {
    font-size: 11px;
    color: rgba(200,192,180,0.5);
    letter-spacing: 0.3px;
  }

  /* Action button tooltips */
  .action-tooltip {
    position: absolute;
    left: 50%;
    top: calc(100% + 8px);
    transform: translateX(-50%) translateY(-4px);
    background: rgba(30, 28, 40, 0.88);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 6px 12px;
    color: #d8d0c4;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 400;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 20;
  }
  .action-tooltip .tooltip-shortcut {
    display: inline-block;
    padding: 1px 5px;
    margin-left: 6px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    color: #c0b8ac;
  }
  #screenshot-btn:hover .action-tooltip,
  #tour-btn:hover .action-tooltip,
  #walk-btn:hover .action-tooltip,
  #photo-btn:hover .action-tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Photo Mode Button */
  #photo-btn {
    position: fixed;
    top: 20px;
    right: 182px;
    width: 44px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    color: #5a4a3a;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.3s ease;
    opacity: 0;
    animation: btnEntrance 0.5s ease-out 1.1s forwards;
  }
  #photo-btn:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px);
  }
  #photo-btn.active {
    background: rgba(255,255,255,0.35);
    border-color: rgba(255,255,255,0.6);
  }
  #photo-btn svg { width: 20px; height: 20px; }

  /* Photo Mode Panel */
  #photo-panel {
    position: fixed;
    top: 72px;
    right: 20px;
    width: 220px;
    padding: 16px;
    background: rgba(20, 18, 30, 0.82);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    font-family: 'DM Sans', sans-serif;
  }
  #photo-panel.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  #photo-panel h3 {
    font-size: 12px;
    font-weight: 600;
    color: #e0d8cc;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .photo-control {
    margin-bottom: 10px;
  }
  .photo-control label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #b0a898;
    margin-bottom: 4px;
  }
  .photo-control label span {
    color: #d8d0c4;
    font-weight: 500;
  }
  .photo-control input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    outline: none;
  }
  .photo-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e0d8cc;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }
  .photo-control input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e0d8cc;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }
  .photo-control input[type="range"]::-moz-range-track {
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    border: none;
  }
  .photo-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 11px;
    color: #b0a898;
    cursor: pointer;
  }
  .photo-toggle-switch {
    width: 32px;
    height: 18px;
    background: rgba(255,255,255,0.12);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s ease;
  }
  .photo-toggle-switch::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #b0a898;
    top: 2px;
    left: 2px;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .photo-toggle-switch.on {
    background: rgba(160,200,160,0.3);
  }
  .photo-toggle-switch.on::after {
    transform: translateX(14px);
    background: #c8e0c0;
  }
  #photo-time-indicator {
    font-size: 10px;
    color: rgba(200,192,180,0.5);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.3px;
  }

  /* Settings Panel — mirrors photo-panel style */
  #settings-panel {
    position: fixed;
    top: 72px;
    left: 20px;
    width: 200px;
    padding: 16px;
    background: rgba(20, 18, 30, 0.82);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    font-family: 'DM Sans', sans-serif;
  }
  #settings-panel.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  #settings-panel h3 {
    font-size: 12px;
    font-weight: 600;
    color: #e0d8cc;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  #settings-panel .photo-control label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #b0a898;
    margin-bottom: 4px;
  }
  #settings-panel .photo-control label span {
    color: #d8d0c4;
    font-weight: 500;
  }
  #settings-panel .photo-control input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    outline: none;
  }
  #settings-panel .photo-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e0d8cc;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }
  #settings-panel .photo-control input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e0d8cc;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
  }

  /* Achievement Toast */
  #achievement-toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: rgba(20, 18, 30, 0.88);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
    white-space: nowrap;
  }
  #achievement-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #achievement-toast .ach-icon {
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
  }
  #achievement-toast .ach-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #achievement-toast .ach-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(200, 180, 140, 0.7);
  }
  #achievement-toast .ach-title {
    font-size: 14px;
    font-weight: 500;
    color: #f0e8dc;
  }
  #achievement-toast .ach-desc {
    font-size: 11px;
    color: rgba(200,192,180,0.6);
  }
  #achievement-toast .ach-progress {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    margin-top: 6px;
    position: absolute;
    bottom: 6px;
    left: 16px;
    right: 16px;
    width: calc(100% - 32px);
  }
  #achievement-toast .ach-progress-bar {
    height: 100%;
    background: rgba(200, 180, 140, 0.5);
    border-radius: 1px;
    transition: width 0.3s ease;
  }

  /* ── Touch / Active states ── */
  .land-btn:active {
    background: rgba(255,255,255,0.3);
    border-color: rgba(255,255,255,0.5);
    transform: scale(0.95);
  }
  #screenshot-btn:active, #tour-btn:active, #walk-btn:active, #photo-btn:active {
    background: rgba(255,255,255,0.3);
    border-color: rgba(255,255,255,0.5);
    transform: scale(0.92);
  }

  /* ── Virtual Joystick (walk mode on mobile) ── */
  #touch-joystick {
    position: fixed;
    bottom: 40px;
    left: 40px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    z-index: 30;
    display: none;
    touch-action: none;
  }
  #touch-joystick-knob {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.3);
    pointer-events: none;
    transition: background 0.15s ease;
  }
  #touch-joystick-knob.active {
    background: rgba(255,255,255,0.35);
  }
  #touch-look-zone {
    position: fixed;
    top: 0; right: 0;
    width: 50%;
    height: 100%;
    z-index: 25;
    display: none;
    touch-action: none;
  }
  #touch-walk-exit {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: rgba(30, 28, 40, 0.8);
    backdrop-filter: blur(12px);
    color: #d8d0c4;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    z-index: 30;
    display: none;
    cursor: pointer;
  }
  #touch-walk-exit:active {
    background: rgba(255,255,255,0.2);
  }

  /* ── Mobile Responsive ── */
  @media (max-width: 600px) {
    #ui {
      bottom: 14px;
      gap: 5px;
    }
    .land-btn {
      padding: 10px 14px;
      font-size: 12px;
      border-radius: 11px;
    }
    #screenshot-btn, #tour-btn, #walk-btn, #photo-btn {
      width: 48px;
      height: 48px;
    }
    #screenshot-btn { right: 12px; top: 12px; }
    #tour-btn { right: 66px; top: 12px; }
    #walk-btn { right: 120px; top: 12px; }
    #photo-btn { right: 174px; top: 12px; }
    #cinematic-indicator { top: 68px; right: 12px; }
    #welcome-inner {
      padding: 24px 28px;
      max-width: 88vw;
    }
    #welcome-inner h1 { font-size: 18px; }
    .welcome-hint-row { font-size: 12px; }

    cloudColor: '#788898', cloudShadow: '#485868',

// ── THREE.JS SETUP ──────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 250);
camera.position.set(8, 6, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance', preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ── POST-PROCESSING ────────────────────────────
// Depth render target for SSAO + DoF
const depthTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
  minFilter: THREE.NearestFilter,
  magFilter: THREE.NearestFilter,
  type: THREE.FloatType,
});
depthTarget.depthTexture = new THREE.DepthTexture();
depthTarget.depthTexture.type = THREE.UnsignedIntType;

const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

// ── SSAO — screen-space ambient occlusion for depth and grounding ──
const ssaoShader = {
  uniforms: {
    tDiffuse: { value: null },
    tDepth: { value: depthTarget.depthTexture },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    uCameraNear: { value: 0.1 },
    uCameraFar: { value: 250 },
    uIntensity: { value: 0.4 },   // subtle — Ghibli style shouldn't be grimy
    uRadius: { value: 0.25 },     // tighter radius for clean crevice darkening
    uBias: { value: 0.015 },      // smaller bias to catch fine detail
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform sampler2D tDepth;
    uniform vec2 uResolution;
    uniform float uCameraNear;
    uniform float uCameraFar;
    uniform float uIntensity;
    uniform float uRadius;
    uniform float uBias;
    varying vec2 vUv;

    float getLinearDepth(vec2 uv) {
      float z = texture2D(tDepth, uv).r;
      return (2.0 * uCameraNear) / (uCameraFar + uCameraNear - z * (uCameraFar - uCameraNear));
    }

    // hash for sample directions
    float ssaoHash(vec2 p) {
      vec3 p3 = fract(vec3(p.xyx) * 0.1031);
      p3 += dot(p3, p3.yzx + 33.33);
      return fract((p3.x + p3.y) * p3.z);
    }

    void main() {
      vec4 col = texture2D(tDiffuse, vUv);
      float depth = getLinearDepth(vUv);

      // skip very far or very near pixels
      if (depth > 0.98 || depth < 0.001) {
        gl_FragColor = col;
        return;
      }

      float occlusion = 0.0;
      // scale radius by depth so AO is consistent at all distances
      float pixelR = uRadius / max(depth * uCameraFar, 0.5);
      // clamp to reasonable screen-space size
      pixelR = min(pixelR, 0.03);

      // 16 sample golden-angle spiral — balanced quality/performance
      for (int i = 0; i < 16; i++) {
        float angle = float(i) * 2.3998 + ssaoHash(vUv * 500.0 + float(i)) * 0.8;
        float r = sqrt((float(i) + 0.5) / 16.0); // sqrt for uniform disc distribution
        vec2 offset = vec2(cos(angle), sin(angle)) * r * pixelR;
        float sampleDepth = getLinearDepth(vUv + offset);
        float diff = depth - sampleDepth;
        // range check — only occlude from nearby geometry, not distant objects
        float rangeCheck = smoothstep(0.0, 1.0, uRadius / (abs(diff) * uCameraFar + 0.001));
        occlusion += step(uBias * depth, diff) * rangeCheck;
      }
      occlusion = 1.0 - (occlusion / 16.0) * uIntensity;
      // soft clamp — Ghibli style: subtle grounding, not grimy
      occlusion = mix(0.5, 1.0, clamp(occlusion, 0.0, 1.0));
      // fade AO at distance — close objects get full AO, far objects none
      float aoFade = 1.0 - smoothstep(0.0, 0.3, depth);
      occlusion = mix(1.0, occlusion, aoFade);

      // apply AO as a multiply — darken crevices, keep highlights
      gl_FragColor = vec4(col.rgb * occlusion, col.a);
    }
  `,
};
const ssaoPass = new ShaderPass(ssaoShader);
composer.addPass(ssaoPass);

// Bloom — makes specular, glow spots, lava, and fireflies pop
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.5,   // strength — warm Ghibli glow
  0.8,   // radius — soft, wide bloom spread
  0.72,  // threshold — catches more mid-tones for dreamy feel
);
composer.addPass(bloomPass);

// ── GOD RAYS (volumetric light scattering) ──────
const godRayShader = {
  uniforms: {
    tDiffuse: { value: null },
    uSunScreenPos: { value: new THREE.Vector2(0.5, 0.5) },
    uIntensity: { value: 0.0 },
    uSunColor: { value: new THREE.Vector3(1.0, 0.9, 0.7) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform vec2 uSunScreenPos;
    uniform float uIntensity;
    uniform vec3 uSunColor;
    varying vec2 vUv;
    void main() {
      vec4 texColor = texture2D(tDiffuse, vUv);
      if (uIntensity < 0.01) { gl_FragColor = texColor; return; }
      vec2 deltaUV = (vUv - uSunScreenPos);
      float dist = length(deltaUV);
      deltaUV *= 1.0 / 40.0;
      vec2 uv = vUv;
      float illumination = 0.0;
      float decay = 1.0;
      for (int i = 0; i < 40; i++) {
        uv -= deltaUV;
        vec4 s = texture2D(tDiffuse, clamp(uv, 0.0, 1.0));
        float lum = dot(s.rgb, vec3(0.2126, 0.7152, 0.0722));
        lum = lum * lum;
        illumination += lum * decay * 0.025;
        decay *= 0.965;
      }
      float falloff = exp(-dist * dist * 3.0);
      vec3 rayColor = uSunColor * illumination * uIntensity * falloff;
      float haze = smoothstep(0.6, 0.0, dist) * uIntensity * 0.12;
      vec3 hazeColor = mix(vec3(0.75, 0.82, 0.95), uSunColor, 0.4);
      gl_FragColor = vec4(texColor.rgb + rayColor + hazeColor * haze, texColor.a);
    }
  `,
};
const godRayPass = new ShaderPass(godRayShader);
composer.addPass(godRayPass);

// Color grading / vignette / atmospheric pass
const colorGradeShader = {
  uniforms: {
    tDiffuse: { value: null },
    uVignetteStrength: { value: 0.3 },
    uSaturation: { value: 1.12 },
    uContrast: { value: 1.02 },
    uBrightness: { value: 0.02 },
    uTime: { value: 0.0 },
    uTemperature: { value: 0.15 },
    uGrain: { value: 0.02 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uVignetteStrength;
    uniform float uSaturation;
    uniform float uContrast;
    uniform float uBrightness;
    uniform float uTime;
    uniform float uTemperature;
    uniform float uGrain;
    varying vec2 vUv;

    float grainHash(vec2 p) {
      vec3 p3 = fract(vec3(p.xyx) * 0.1031);
      p3 += dot(p3, p3.yzx + 33.33);
      return fract((p3.x + p3.y) * p3.z);
    }

    void main() {
      // ── CHROMATIC ABERRATION — subtle radial color split ──
      vec2 center = vUv - 0.5;
      float dist = length(center);
      float caStrength = dist * dist * 0.003;
      vec2 caOffset = center * caStrength;
      float r = texture2D(tDiffuse, vUv + caOffset).r;
      float g = texture2D(tDiffuse, vUv).g;
      float b = texture2D(tDiffuse, vUv - caOffset).b;
      vec3 col = vec3(r, g, b);

      // ── TONE CURVE — Ghibli-soft lift/gamma/gain ──
      col = pow(col, vec3(1.0 / 1.04));
      col = (col - 0.5) * uContrast + 0.5 + uBrightness;
      // warm halation — bright areas gently bleed warm
      float bright = max(col.r, max(col.g, col.b));
      col += vec3(0.012, 0.008, 0.0) * bright * bright;

      // ── COLOR TEMPERATURE — warm/cool shift ──
      float temp = uTemperature * 0.08;
      col.r += temp;
      col.b -= temp;
      col.g += temp * 0.3;

      // ── SATURATION ──
      float lum = dot(col, vec3(0.2126, 0.7152, 0.0722));
      col = mix(vec3(lum), col, uSaturation);

      // ── FILM GRAIN — animated noise ──
      float grain = grainHash(vUv * 500.0 + fract(uTime * 7.23) * 100.0) - 0.5;
      col += grain * uGrain;

      // ── VIGNETTE ──
      vec2 uv = vUv * 2.0 - 1.0;
      float vig = 1.0 - dot(uv * 0.5, uv * 0.5);
      vig = smoothstep(0.0, 1.0, vig);
      col *= mix(1.0 - uVignetteStrength, 1.0, vig);

      gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
    }
  `,
};
const colorGradePass = new ShaderPass(colorGradeShader);
composer.addPass(colorGradePass);

// ── DEPTH OF FIELD — cinematic bokeh for dreamy Ghibli look ──
const dofShader = {
  uniforms: {
    tDiffuse: { value: null },
    tDepth: { value: depthTarget.depthTexture },
    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
    uCameraNear: { value: 0.1 },
    uCameraFar: { value: 250 },
    uFocalDepth: { value: 0.05 },  // focus distance (linear depth, ~12 world units)
    uFocalRange: { value: 0.08 },  // wide-ish sharp zone for dreamy but readable
    uMaxBlur: { value: 2.5 },      // gentle bokeh — Ghibli soft, not cinema aggressive
    uEnabled: { value: 1.0 },      // 0 to disable
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform sampler2D tDepth;
    uniform vec2 uResolution;
    uniform float uCameraNear;
    uniform float uCameraFar;
    uniform float uFocalDepth;
    uniform float uFocalRange;
    uniform float uMaxBlur;
    uniform float uEnabled;
    varying vec2 vUv;

    float dofLinearDepth(vec2 uv) {
      float z = texture2D(tDepth, uv).r;
      return (2.0 * uCameraNear) / (uCameraFar + uCameraNear - z * (uCameraFar - uCameraNear));
    }

    void main() {
      if (uEnabled < 0.5) {
        gl_FragColor = texture2D(tDiffuse, vUv);
        return;
      }

      float depth = dofLinearDepth(vUv);
      float blur = clamp(abs(depth - uFocalDepth) / uFocalRange, 0.0, 1.0) * uMaxBlur;

      // no blur needed — sharp zone
      if (blur < 0.5) {
        gl_FragColor = texture2D(tDiffuse, vUv);
        return;
      }

      // golden-angle bokeh disc — 16 samples with bright-weighted highlights
      vec3 col = vec3(0.0);
      float total = 0.0;
      vec2 texel = blur / uResolution;
      for (int i = 0; i < 16; i++) {
        float angle = float(i) * 2.3998; // golden angle
        float r = sqrt((float(i) + 1.0) / 16.0); // uniform disc distribution
        vec2 offset = vec2(cos(angle), sin(angle)) * r * texel;
        vec3 s = texture2D(tDiffuse, vUv + offset).rgb;
        // bright bokeh weighting — glowing highlights bloom like anamorphic lenses
        float lum = dot(s, vec3(0.2126, 0.7152, 0.0722));
        float w = 1.0 + max(0.0, lum - 0.4) * 3.0;
        col += s * w;
        total += w;
      }
      // smooth transition from sharp to blurred
      vec3 center = texture2D(tDiffuse, vUv).rgb;
      float blendT = smoothstep(0.3, 1.8, blur);
      col = mix(center, col / total, blendT);

      gl_FragColor = vec4(col, 1.0);
    }
  `,
};
const dofPass = new ShaderPass(dofShader);
composer.addPass(dofPass);

// ── UNDERWATER POST-PROCESSING — submerged view with caustics, distortion, god rays ──
const underwaterShader = {
  uniforms: {
    tDiffuse: { value: null },
    uTime: { value: 0 },
    uSubmergeDepth: { value: 0 }, // 0 = surface, 1 = fully submerged
    uWaterColor: { value: new THREE.Color(0x2a6878) },
    uCausticColor: { value: new THREE.Color(0x88ccdd) },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float uTime;
    uniform float uSubmergeDepth;
    uniform vec3 uWaterColor;
    uniform vec3 uCausticColor;
    varying vec2 vUv;

    float uwHash(vec2 p) {
      vec3 p3 = fract(vec3(p.xyx) * 0.1031);
      p3 += dot(p3, p3.yzx + 33.33);
      return fract((p3.x + p3.y) * p3.z);
    }
    float uwNoise(vec2 p) {
      vec2 i = floor(p), f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      float a = uwHash(i), b = uwHash(i + vec2(1,0));
      float c = uwHash(i + vec2(0,1)), d = uwHash(i + vec2(1,1));
      return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    void main() {
      if (uSubmergeDepth < 0.01) {
        gl_FragColor = texture2D(tDiffuse, vUv);
        return;
      }

      float depth = clamp(uSubmergeDepth, 0.0, 1.0);

      // ── DISTORTION — wobbly refraction through water surface ──
      vec2 distort = vec2(
        sin(vUv.y * 15.0 + uTime * 1.8) * 0.004 + sin(vUv.y * 25.0 + uTime * 2.5) * 0.002,
        cos(vUv.x * 12.0 + uTime * 1.5) * 0.003 + cos(vUv.x * 20.0 + uTime * 2.2) * 0.0015
      ) * depth;
      vec2 uv = vUv + distort;

      vec3 col = texture2D(tDiffuse, uv).rgb;

      // ── UNDERWATER FOG — blue-green tint increases with depth ──
      float fogStrength = depth * 0.55;
      col = mix(col, uWaterColor * 0.6, fogStrength);

      // ── CAUSTIC LIGHT PATTERNS — dancing light refracting through surface ──
      // voronoi caustics (two scales, different speeds)
      float caustic = 0.0;
      for (int k = 0; k < 2; k++) {
        float scale = 6.0 + float(k) * 5.0;
        float speed = 0.8 + float(k) * 0.3;
        vec2 cuv = uv * scale + uTime * speed * vec2(0.3, 0.2);
        vec2 ci = floor(cuv), cf = fract(cuv);
        float minD = 1.0;
        for (int y = -1; y <= 1; y++) {
          for (int x = -1; x <= 1; x++) {
            vec2 neighbor = vec2(float(x), float(y));
            vec2 pt = vec2(uwHash(ci + neighbor), uwHash(ci + neighbor + vec2(7.3, 1.7)));
            pt = 0.5 + 0.5 * sin(uTime * 0.9 + 6.2831 * pt);
            float d = length(neighbor + pt - cf);
            minD = min(minD, d);
          }
        }
        caustic += pow(1.0 - minD, 3.0) * (k == 0 ? 0.5 : 0.25);
      }
      // caustics strongest near surface, project downward
      float causticStrength = depth * (1.0 - vUv.y * 0.6); // stronger at bottom of screen
      col += uCausticColor * caustic * causticStrength * 0.35;

      // ── LIGHT RAYS — vertical god rays from surface above ──
      float rays = 0.0;
      for (int i = 0; i < 4; i++) {
        float freq = 3.0 + float(i) * 2.5;
        float phase = uTime * (0.15 + float(i) * 0.08);
        float ray = pow(max(0.0, sin(uv.x * freq + phase + uwNoise(uv * 3.0 + uTime * 0.1) * 2.0)), 8.0);
        rays += ray * (0.4 - float(i) * 0.08);
      }
      // rays fade toward bottom of screen (they come from above)
      float rayFade = pow(max(0.0, 1.0 - vUv.y), 0.8);
      col += vec3(0.3, 0.6, 0.7) * rays * rayFade * depth * 0.18;

      // ── FLOATING PARTICLES / SEDIMENT — tiny bright dots ──
      vec2 partUV = uv * 80.0 + vec2(uTime * 0.3, -uTime * 0.5);
      float particle = step(0.992, uwHash(floor(partUV)));
      float partFlicker = 0.5 + 0.5 * sin(uTime * 6.0 + uwHash(floor(partUV)) * 30.0);
      col += vec3(0.5, 0.7, 0.8) * particle * partFlicker * depth * 0.4;

      // ── DEPTH DARKENING — edges get darker underwater (murky periphery) ──
      vec2 center = uv * 2.0 - 1.0;
      float vignette = 1.0 - dot(center * 0.6, center * 0.6);
      vignette = smoothstep(0.0, 1.0, vignette);
      col *= mix(1.0 - depth * 0.35, 1.0, vignette);

      // ── SURFACE SHIMMER — bright rippling band at the top (water surface seen from below) ──
      float surfaceDist = smoothstep(0.0, 0.15, vUv.y); // top of screen = surface
      float shimmer = uwNoise(vec2(uv.x * 20.0, uTime * 2.0)) * 0.5
                    + uwNoise(vec2(uv.x * 35.0, uTime * 3.5)) * 0.3;
      float surfaceBand = (1.0 - surfaceDist) * shimmer;
      col += vec3(0.4, 0.7, 0.8) * surfaceBand * depth * 0.5;

      // ── COLOR SHIFT — desaturate slightly, push toward blue-green ──
      float lum = dot(col, vec3(0.2126, 0.7152, 0.0722));
      col = mix(col, vec3(lum) * uWaterColor * 2.5, depth * 0.2);

      gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
    }
  `,
};
const underwaterPass = new ShaderPass(underwaterShader);
underwaterPass.uniforms.uSubmergeDepth.value = 0;
composer.addPass(underwaterPass);

let isUnderwater = false;
let underwaterDepth = 0; // 0-1 smooth transition

controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.enablePan = false;
controls.minDistance = 5;
controls.maxDistance = 18;

// ── TOON GRADIENTS ──────────────────────────────
function createToonGradient(steps, softness = 0.35) {
  const colors = new Uint8Array(steps);
  for (let i = 0; i < steps; i++) {
    colors[i] = Math.floor((i / (steps - 1)) * 255 * (1 - softness) + 255 * softness);
  }
  const tex = new THREE.DataTexture(colors, steps, 1, THREE.RedFormat);
  tex.needsUpdate = true;
  return tex;
}

const toonGrad3 = createToonGradient(4, 0.52);
const toonGrad4 = createToonGradient(5, 0.48);
const toonGrad5 = createToonGradient(6, 0.44);
const toonGrad6 = createToonGradient(8, 0.42);

// reflective material for foliage/vegetation — waxy leaf sheen
// shared sun direction uniform — all foliage materials reference the same object
const _foliageSunDir = new THREE.Vector3(0.5, 0.8, 0.3).normalize();

// foliage material with backlit translucency (Ghibli SSS — light glowing through leaves)
// Uses MeshPhongMaterial + onBeforeCompile to keep full shadow/lighting + inject SSS
function createFoliageMat(color, opts = {}) {
  const col = new THREE.Color(color);
  const sssColor = col.clone().lerp(new THREE.Color(0xffeeaa), 0.35);
  const mat = new THREE.MeshPhongMaterial({
    color: col,
    specular: new THREE.Color(opts.specular || 0x445533),
    shininess: opts.shininess || 18,
    ...opts,
  });

  mat.onBeforeCompile = (shader) => {
    // inject SSS uniforms
    shader.uniforms.uSSSColor = { value: sssColor };
    shader.uniforms.uSSSStrength = { value: 0.45 };
    shader.uniforms.uSunDir = { value: _foliageSunDir };

    // vertex shader: add view direction varying
    shader.vertexShader = shader.vertexShader.replace(
      '#include <common>',
      `#include <common>
       varying vec3 vViewDirSSS;`
    );
    shader.vertexShader = shader.vertexShader.replace(
      '#include <fog_vertex>',
      `#include <fog_vertex>
       vec4 sssWorldPos = modelMatrix * vec4(transformed, 1.0);
       vViewDirSSS = normalize(cameraPosition - sssWorldPos.xyz);`
    );

    // fragment shader: declare uniforms + varying
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <common>',
      `#include <common>
       uniform vec3 uSSSColor;
       uniform float uSSSStrength;
       uniform vec3 uSunDir;
       varying vec3 vViewDirSSS;`
    );

    // inject SSS computation before the final output
    shader.fragmentShader = shader.fragmentShader.replace(
      '#include <output_fragment>',
      `// ── BACKLIT TRANSLUCENCY (SSS) — the Ghibli magic ──
       {
         vec3 sssSun = normalize(uSunDir);
         vec3 sssView = normalize(vViewDirSSS);
         // backlit: light passing through leaves when sun is behind them
         float backlit = pow(max(dot(sssView, -sssSun), 0.0), 3.0);
         // thin edge: glow where view is perpendicular to surface
         float thinEdge = pow(1.0 - abs(dot(normal, sssView)), 2.5);
         float sss = backlit * 0.7 + thinEdge * 0.3;
         // stronger on faces angled away from sun (actual back side)
         float sssNdotL = dot(normal, sssSun);
         float backFace = max(0.0, -sssNdotL) * 0.6 + 0.4;
         outgoingLight += uSSSColor * sss * backFace * uSSSStrength;
         // rim glow — soft edge highlight
         float rim = pow(1.0 - max(dot(normal, sssView), 0.0), 4.0);
         outgoingLight += uSSSColor * rim * 0.12;
       }
       #include <output_fragment>`
    );
  };

  // force shader recompilation
  mat.customProgramCacheKey = () => 'foliage_sss_' + col.getHexString();

  return mat;
}
// reflective material for trunks — subtle bark sheen
function createTrunkMat(color, opts = {}) {
  return new THREE.MeshPhongMaterial({

// tapered ray spikes with vertex color fade (bright base → transparent tip)
const sunRays = [];

function createTaperedRay(length, baseWidth, tipWidth, segments) {
  // custom geometry: tapered quad strip that fades from bright to transparent
  const geo = new THREE.BufferGeometry();
  const verts = [];
  const cols = [];
  const indices = [];
  const baseColor = new THREE.Color(0xfff4d0);
  const tipColor = new THREE.Color(0xffcc70);

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const w = baseWidth * (1 - t * 0.85) + tipWidth * t; // taper
    const y = t * length;
    const alpha = (1 - t) * (1 - t); // quadratic fade
    // two vertices per row (left and right)
    verts.push(-w / 2, y, 0, w / 2, y, 0);
    const c = baseColor.clone().lerp(tipColor, t);
    cols.push(c.r, c.g, c.b, alpha, c.r, c.g, c.b, alpha);
  }
  for (let i = 0; i < segments; i++) {
    const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
    indices.push(a, b, c, b, d, c);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(cols, 4));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

// ── NOISE ───────────────────────────────────────
let seed = 42;
function seededRandom() {
  seed = (seed * 16807) % 2147483647;
  return (seed - 1) / 2147483646;
}

function noise2D(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = x - ix, fz = z - iz;
  const sx = fx * fx * (3 - 2 * fx), sz = fz * fz * (3 - 2 * fz);
  const hash = (a, b) => {
    let h = (a * 127 + b * 311 + 7) & 0xffff;
    h = ((h * h * 13) >> 8) & 0xff;
    return h / 255;
  };
  const v00 = hash(ix, iz), v10 = hash(ix + 1, iz);
  const v01 = hash(ix, iz + 1), v11 = hash(ix + 1, iz + 1);
  return (v00 + sx * (v10 - v00)) + sz * ((v01 + sx * (v11 - v01)) - (v00 + sx * (v10 - v00)));
}

function fbm(x, z, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * noise2D(x * freq, z * freq);
    amp *= 0.5;
    freq *= 2.1;
  }
  return val;
}

// ridge noise for mountain drama
function ridgeNoise(x, z) {
  let v = noise2D(x, z);
  v = Math.abs(v * 2 - 1);
  return 1 - v;
}

function ridgeFbm(x, z, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * ridgeNoise(x * freq, z * freq);
    amp *= 0.45;
    freq *= 2.1;
  }
  return val;
}

// ── WIND SYSTEM ────────────────────────────────
const wind = {
  baseDir: new THREE.Vector2(0.7, 0.5).normalize(),
  baseStrength: 0.5,
  gustFreq: 0.15,       // gust oscillation frequency
  gustStrength: 0.25,   // additional gust amplitude
  turbulence: 0.08,     // high-freq noise layered on top
  // computed per-frame:
  dir: new THREE.Vector2(0.7, 0.5).normalize(),
  strength: 0.5,
  gust: 0,
};

function updateWind(elapsed) {
  // slow directional drift
  const dirAngle = Math.atan2(wind.baseDir.y, wind.baseDir.x) + Math.sin(elapsed * 0.08) * 0.3;
  wind.dir.set(Math.cos(dirAngle), Math.sin(dirAngle));
  // layered gusts: slow swell + medium pulse + quick flutter
  const gust1 = Math.sin(elapsed * wind.gustFreq) * 0.5 + 0.5;
  const gust2 = Math.sin(elapsed * wind.gustFreq * 2.7 + 1.3) * 0.5 + 0.5;
  const gust3 = Math.sin(elapsed * wind.gustFreq * 7.1 + 3.7) * 0.5 + 0.5;
  wind.gust = gust1 * 0.5 + gust2 * 0.3 + gust3 * 0.2;
  wind.strength = wind.baseStrength + wind.gust * wind.gustStrength;
}

// spatial wind offset — creates wave-like wind traveling across the island
function getWindAt(x, z, elapsed) {
  const phase = x * wind.dir.x + z * wind.dir.y;
  const spatial = Math.sin(phase * 2.0 + elapsed * 1.5) * 0.5 + 0.5;
  const turb = Math.sin(phase * 8 + elapsed * 4) * wind.turbulence;
  return (wind.strength * (0.6 + spatial * 0.4) + turb);
}

// ── TERRAIN HEIGHT ──────────────────────────────
const RADIUS = 2.8;

function getTerrainHeight(x, z, land) {
  const dist = Math.sqrt(x * x + z * z) / RADIUS;
  const mh = land.mountainHeight;

  // raised grassy plateau — whole surface is elevated above water
  let h = mh * 0.45;

  // rolling terrain texture across the surface
  h += fbm(x * 0.6 + 5, z * 0.6 + 5, 5) * mh * 0.15;
  h += fbm(x * 1.5 + 20, z * 1.5 + 20, 3) * 0.12;
  h += noise2D(x * 3.5 + 10, z * 3.5 + 10) * 0.05;

  // ── MULTIPLE DISTINCT HILLS ──
  // main hill (tallest, slightly off-center)
  const px1 = x + 0.2, pz1 = z - 0.3;
  const d1 = Math.sqrt(px1 * px1 + pz1 * pz1);
  const hill1 = Math.max(0, 1 - d1 * 0.55);
  h += Math.pow(hill1, 0.7) * mh * 0.55;

  // hill 2 — back-left, second tallest
  const px2 = x - 1.3, pz2 = z + 0.7;
  const d2 = Math.sqrt(px2 * px2 + pz2 * pz2);
  const hill2 = Math.max(0, 1 - d2 * 0.6);
  h += Math.pow(hill2, 0.65) * mh * 0.4;

  // hill 3 — front-right
  const px3 = x + 1.2, pz3 = z - 0.8;
  const d3 = Math.sqrt(px3 * px3 + pz3 * pz3);
  const hill3 = Math.max(0, 1 - d3 * 0.65);
  h += Math.pow(hill3, 0.65) * mh * 0.3;

  // hill 4 — small knoll back-right
  const px4 = x + 0.5, pz4 = z + 1.6;
  const d4 = Math.sqrt(px4 * px4 + pz4 * pz4);
  const hill4 = Math.max(0, 1 - d4 * 0.7);
  h += Math.pow(hill4, 0.7) * mh * 0.2;

  // hill 5 — small knoll front-left
  const px5 = x - 0.9, pz5 = z - 1.3;
  const d5 = Math.sqrt(px5 * px5 + pz5 * pz5);
  const hill5 = Math.max(0, 1 - d5 * 0.8);
  h += Math.pow(hill5, 0.7) * mh * 0.18;

  // gentle ridge connecting main + hill2
  const ridgeLine = Math.abs(z - x * 0.35 - 0.15);
  const ridgeWeight = Math.max(0, 1 - ridgeLine * 2) * Math.max(0, 1 - dist * 1.2);
  h += ridgeWeight * mh * 0.06;

  // ridge surface detail
  h += ridgeFbm(x * 0.9 + 3, z * 0.9 + 3, 3) * mh * 0.06;

  // valleys between hills (saddles between peaks)
  const v1 = Math.abs(x * 0.5 + z * 0.7 + 0.3);
  h -= Math.max(0, 0.25 - v1) * 0.18 * (1 - dist);
  const v2 = Math.abs(x * 0.8 - z * 0.3 - 0.5);
  h -= Math.max(0, 0.2 - v2) * 0.12 * (1 - dist);

  // beach shelf — flatten terrain toward the edge for a visible sandy beach
  if (dist > 0.70) {
    const beachBlend = Math.min(1, (dist - 0.70) / 0.15);
    const beachH = mh * 0.08; // low beach shelf height
    h = h * (1 - beachBlend) + beachH * beachBlend;
  }

  // cliff edge — holds height until very edge, then sharp cliff drop
  if (dist > 0.82) {
    const falloff = Math.pow(Math.max(0, (1 - dist) / 0.18), 2.0);
    h *= falloff;
  }

  return Math.max(0, h);
}
