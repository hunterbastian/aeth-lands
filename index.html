// ── FOG BANKS (ground-level drifting fog) ─────────
const MAX_FOG_BANKS = 8;
let fogBankGroup = new THREE.Group();
scene.add(fogBankGroup);

function createFogBanks(land) {
  // clear old fog banks
  while (fogBankGroup.children.length) {
    const child = fogBankGroup.children[0];
    fogBankGroup.remove(child);
    child.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  }

  const count = land.fogBanks || 0;
  if (count === 0) return;

  const fogColor = new THREE.Color(land.fog);
  seed = 1100;

  for (let i = 0; i < count; i++) {
    const bankGroup = new THREE.Group();
    const bx = (seededRandom() - 0.5) * RADIUS * 3.5;
    const bz = (seededRandom() - 0.5) * RADIUS * 3.5;
    const by = 0.2 + seededRandom() * 0.8; // ground-hugging
    const bankScale = 1.5 + seededRandom() * 2.5;

    // 3-5 flattened puffs per fog bank
    const puffCount = 3 + Math.floor(seededRandom() * 3);
    for (let j = 0; j < puffCount; j++) {
      const pr = (0.6 + seededRandom() * 0.8) * bankScale;
      const geo = new THREE.IcosahedronGeometry(pr, 2);
      const pos = geo.attributes.position;

      for (let k = 0; k < pos.count; k++) {
        let y = pos.getY(k);
        // flatten heavily — fog is wide and thin
        if (y < 0) y *= 0.15;
        else y *= 0.3;
        pos.setY(k, y);
        // organic deformation
        const n = noise2D(pos.getX(k) * 2 + j * 5, pos.getZ(k) * 2 + i * 3) * 0.15;
        pos.setX(k, pos.getX(k) * (1 + n));
        pos.setZ(k, pos.getZ(k) * (1 + n));
      }
      geo.computeVertexNormals();

      const mat = new THREE.MeshBasicMaterial({
        color: fogColor,
        transparent: true,
        opacity: land.fogOpacity || 0.15,
        depthWrite: false,
        side: THREE.DoubleSide,
      });

      const puff = new THREE.Mesh(geo, mat);
      puff.position.set(
        (j - puffCount / 2) * pr * 0.6,
        (seededRandom() - 0.5) * 0.2,
        (seededRandom() - 0.5) * pr * 0.4,
      );
      bankGroup.add(puff);
    }

    bankGroup.position.set(bx, by, bz);
    bankGroup.userData.speed = 0.08 + seededRandom() * 0.15;
    bankGroup.userData.baseX = bx;
    bankGroup.userData.baseY = by;
    bankGroup.userData.baseZ = bz;
    bankGroup.userData.driftPhase = seededRandom() * Math.PI * 2;
    bankGroup.userData.baseOpacity = land.fogOpacity || 0.15;
    bankGroup.userData.isFogBank = true;
    fogBankGroup.add(bankGroup);
  }
}

function updateFogBanks(elapsed, dt) {
  fogBankGroup.children.forEach(bank => {
    const ud = bank.userData;
    // drift with wind + gentle wandering
    bank.position.x = ud.baseX + elapsed * ud.speed * wind.dir.x * 0.5
      + Math.sin(elapsed * 0.08 + ud.driftPhase) * 2;
    bank.position.z = ud.baseZ + elapsed * ud.speed * wind.dir.y * 0.3
      + Math.cos(elapsed * 0.06 + ud.driftPhase * 1.3) * 1.5;

    // gentle vertical bob (absolute, not accumulating)
    bank.position.y = ud.baseY + Math.sin(elapsed * 0.15 + ud.driftPhase) * 0.08;

    // wrap around when drifting too far
    const wrapDist = RADIUS * 4;
    if (bank.position.x > wrapDist) { bank.position.x -= wrapDist * 2; ud.baseX -= wrapDist * 2; }
    if (bank.position.x < -wrapDist) { bank.position.x += wrapDist * 2; ud.baseX += wrapDist * 2; }
    if (bank.position.z > wrapDist) { bank.position.z -= wrapDist * 2; ud.baseZ -= wrapDist * 2; }
    if (bank.position.z < -wrapDist) { bank.position.z += wrapDist * 2; ud.baseZ += wrapDist * 2; }

    // in walk mode: fade opacity when camera is inside the fog bank
    if (walkMode) {
      const dx = bank.position.x - walkPos.x;
      const dz = bank.position.z - walkPos.z;
      const distSq = dx * dx + dz * dz;
      // if player is inside the fog, boost opacity for immersion
      const insideFactor = distSq < 4 ? 1.3 : 1.0;
      bank.children.forEach(puff => {
        puff.material.opacity = ud.baseOpacity * insideFactor;
      });
    }
  });
}

// ── WEATHER SYSTEM (rain streaks + soft snow) ─────────────────
// Rain: LineSegments with per-vertex alpha (bright head → fading tail), angled with wind
// Snow: Points with custom shader (soft feathered circles, per-particle size/alpha variation)
const WEATHER_COUNT = 600;
const WEATHER_SPAWN_RADIUS = RADIUS * 2.2;
const WEATHER_SPAWN_HEIGHT = 7;

// ── shared state
let weatherType = 'none';
let weatherIntensity = 0;
let weatherActiveCount = 0;
let weatherFade = 0;
// rain audio nodes are initialized in initAudio()
let rainAudioGain = null;

// per-particle simulation data (shared by rain and snow)
const wxPos = new Float32Array(WEATHER_COUNT * 3);   // position xyz
const wxVel = new Float32Array(WEATHER_COUNT * 3);   // velocity xyz
const wxAlpha = new Float32Array(WEATHER_COUNT);      // per-particle phase/randomness
const wxSize = new Float32Array(WEATHER_COUNT);       // per-particle size (snow only)

// ── RAIN MESH (LineSegments — each drop is head + tail vertex) ──
const rainPositions = new Float32Array(WEATHER_COUNT * 2 * 3); // 2 verts per drop
const rainAlphas = new Float32Array(WEATHER_COUNT * 2);         // alpha per vertex
const rainGeo = new THREE.BufferGeometry();
rainGeo.setAttribute('position', new THREE.Float32BufferAttribute(rainPositions, 3));
rainGeo.setAttribute('alpha', new THREE.Float32BufferAttribute(rainAlphas, 1));

const rainMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uColor: { value: new THREE.Color(0xb0c8e0) },
    uOpacity: { value: 0.0 },
  },
  vertexShader: `
    attribute float alpha;
    varying float vAlpha;
    void main() {
      vAlpha = alpha;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    uniform float uOpacity;
    varying float vAlpha;
    void main() {
      gl_FragColor = vec4(uColor, vAlpha * uOpacity);
    }
  `,
});
const rainMesh = new THREE.LineSegments(rainGeo, rainMat);
rainMesh.frustumCulled = false;
rainMesh.visible = false;
scene.add(rainMesh);

// ── SNOW MESH (Points with custom soft-flake shader) ──
const snowPositions = new Float32Array(WEATHER_COUNT * 3);
const snowSizes = new Float32Array(WEATHER_COUNT);
const snowAlphas = new Float32Array(WEATHER_COUNT);
const snowGeo = new THREE.BufferGeometry();
snowGeo.setAttribute('position', new THREE.Float32BufferAttribute(snowPositions, 3));
snowGeo.setAttribute('size', new THREE.Float32BufferAttribute(snowSizes, 1));
snowGeo.setAttribute('alpha', new THREE.Float32BufferAttribute(snowAlphas, 1));

const snowMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: {
    uOpacity: { value: 0.0 },
    uColor: { value: new THREE.Color(0xe8f0ff) },
  },
  vertexShader: `
    attribute float size;
    attribute float alpha;
    varying float vAlpha;
    void main() {
      vAlpha = alpha;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (200.0 / -mvPos.z);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform float uOpacity;
    uniform vec3 uColor;
    varying float vAlpha;
    void main() {
      // soft feathered circle
      float dist = length(gl_PointCoord - vec2(0.5));
      float circle = 1.0 - smoothstep(0.3, 0.5, dist);
      // sparkle highlight in center
      float sparkle = 1.0 - smoothstep(0.0, 0.15, dist);
      vec3 col = uColor + sparkle * 0.15;
      gl_FragColor = vec4(col, circle * vAlpha * uOpacity);
    }
  `,
});
const snowMesh = new THREE.Points(snowGeo, snowMat);
snowMesh.frustumCulled = false;
snowMesh.visible = false;
scene.add(snowMesh);

// ── RAIN STREAK CONFIG ──
const RAIN_STREAK_LENGTH = 0.35;   // base streak length
const RAIN_STREAK_WIND_MULT = 0.5; // how much wind elongates the streak

function initWeather(land) {
  weatherType = land.weather || 'none';
  weatherIntensity = land.weatherIntensity || 0;
  weatherActiveCount = Math.floor(WEATHER_COUNT * weatherIntensity);
  weatherFade = 0;

  rainMesh.visible = false;
  snowMesh.visible = false;

  if (weatherType === 'none') return;

  // spawn particles in a cylinder above the island
  for (let i = 0; i < WEATHER_COUNT; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * WEATHER_SPAWN_RADIUS;
    wxPos[i * 3] = Math.cos(a) * r;
    wxPos[i * 3 + 1] = Math.random() * WEATHER_SPAWN_HEIGHT + 1;
    wxPos[i * 3 + 2] = Math.sin(a) * r;
    wxAlpha[i] = Math.random();

    if (weatherType === 'rain') {
      wxVel[i * 3] = (Math.random() - 0.5) * 0.15;
      wxVel[i * 3 + 1] = -(5 + Math.random() * 4); // fast: 5-9 units/s
      wxVel[i * 3 + 2] = (Math.random() - 0.5) * 0.15;
      wxSize[i] = 0; // unused for rain
    } else {
      wxVel[i * 3] = (Math.random() - 0.5) * 0.3;
      wxVel[i * 3 + 1] = -(0.2 + Math.random() * 0.5); // slow drift: 0.2-0.7
      wxVel[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
      // varying flake sizes: small, medium, large with different distributions
      const sizeRoll = Math.random();
      wxSize[i] = sizeRoll < 0.5 ? 0.03 + Math.random() * 0.02  // 50% small
        : sizeRoll < 0.85 ? 0.06 + Math.random() * 0.04          // 35% medium
        : 0.12 + Math.random() * 0.06;                            // 15% large fluffy
    }
  }

  if (weatherType === 'rain') {
    rainMesh.visible = true;
    // init rain line positions (will be overwritten in update)
    for (let i = 0; i < WEATHER_COUNT; i++) {
      const i6 = i * 6;
      rainPositions[i6] = wxPos[i * 3];
      rainPositions[i6 + 1] = wxPos[i * 3 + 1];
      rainPositions[i6 + 2] = wxPos[i * 3 + 2];
      rainPositions[i6 + 3] = wxPos[i * 3];
      rainPositions[i6 + 4] = wxPos[i * 3 + 1] + 0.2;
      rainPositions[i6 + 5] = wxPos[i * 3 + 2];
      // alpha: bright at head, dim at tail
      rainAlphas[i * 2] = 0.7 + Math.random() * 0.3;    // head (bright)
      rainAlphas[i * 2 + 1] = 0.05 + Math.random() * 0.1; // tail (nearly invisible)
    }
    rainGeo.attributes.position.needsUpdate = true;
    rainGeo.attributes.alpha.needsUpdate = true;
  } else {
    snowMesh.visible = true;
    for (let i = 0; i < WEATHER_COUNT; i++) {
      snowPositions[i * 3] = wxPos[i * 3];
      snowPositions[i * 3 + 1] = wxPos[i * 3 + 1];
      snowPositions[i * 3 + 2] = wxPos[i * 3 + 2];
      snowSizes[i] = wxSize[i];
      snowAlphas[i] = 0.4 + Math.random() * 0.5;
    }
    snowGeo.attributes.position.needsUpdate = true;
    snowGeo.attributes.size.needsUpdate = true;
    snowGeo.attributes.alpha.needsUpdate = true;
  }
}

// ── SPLASH RINGS (rain impact on water) ──────────
const MAX_SPLASHES = 50;
const splashRings = [];
const splashRingGeo = new THREE.RingGeometry(0.02, 0.08, 16);
const splashRingMat = new THREE.MeshBasicMaterial({
  color: 0xd8f0f0, transparent: true, opacity: 0.6,
  depthWrite: false, side: THREE.DoubleSide,
});

for (let i = 0; i < MAX_SPLASHES; i++) {
  const ring = new THREE.Mesh(splashRingGeo, splashRingMat.clone());
  ring.rotation.x = -Math.PI / 2;
  ring.visible = false;
  ring.userData.life = 0;
  ring.userData.maxLife = 0;
  scene.add(ring);
  splashRings.push(ring);
}
let splashIndex = 0;

function spawnSplash(x, z) {
  const ring = splashRings[splashIndex];
  splashIndex = (splashIndex + 1) % MAX_SPLASHES;
  ring.position.set(x, 0.02 + tideOffset, z);
  ring.scale.setScalar(0.5);
  ring.material.opacity = 0.5 * weatherFade;
  ring.visible = true;
  ring.userData.life = 0;
  ring.userData.maxLife = 0.3 + Math.random() * 0.2;
}

function updateSplashes(dt) {
  for (const ring of splashRings) {
    if (!ring.visible) continue;
    ring.userData.life += dt;
    const t = ring.userData.life / ring.userData.maxLife;
    if (t >= 1) {
      ring.visible = false;
      continue;
    }
    ring.scale.setScalar(0.5 + t * 4.0);
    ring.material.opacity = (1 - t * t) * 0.45 * weatherFade;
  }
}

function updateWeather(dt) {
  if (weatherType === 'none' || weatherActiveCount === 0) {
    updateSplashes(dt);
    return;
  }

  // fade in smoothly
  weatherFade = Math.min(1, weatherFade + dt * 0.5);
  const isRain = weatherType === 'rain';

  // wind influence
  const windPushX = wind.dir.x * wind.strength;
  const windPushZ = wind.dir.y * wind.strength;
  const splashRadius = RADIUS * 1.5;

  if (isRain) {
    // update rain opacity
    rainMat.uniforms.uOpacity.value = 0.5 * weatherFade * weatherIntensity;

    const rp = rainGeo.attributes.position.array;
    for (let i = 0; i < weatherActiveCount; i++) {
      const i3 = i * 3;
      const i6 = i * 6;

      // move particle with velocity + wind
      wxPos[i3] += (wxVel[i3] + windPushX * 1.2) * dt;
      wxPos[i3 + 1] += wxVel[i3 + 1] * dt;
      wxPos[i3 + 2] += (wxVel[i3 + 2] + windPushZ * 1.2) * dt;

      // respawn check
      if (wxPos[i3 + 1] < -0.5 ||
          Math.abs(wxPos[i3]) > WEATHER_SPAWN_RADIUS * 1.2 ||
          Math.abs(wxPos[i3 + 2]) > WEATHER_SPAWN_RADIUS * 1.2) {
        // splash ring on water impact
        if (wxPos[i3 + 1] < 0.15) {
          const sx = wxPos[i3], sz = wxPos[i3 + 2];
          const dist = Math.sqrt(sx * sx + sz * sz);
          if (dist < splashRadius && Math.random() < 0.35) {
            spawnSplash(sx, sz);
          }
        }
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * WEATHER_SPAWN_RADIUS;
        wxPos[i3] = Math.cos(a) * r;
        wxPos[i3 + 1] = WEATHER_SPAWN_HEIGHT + Math.random() * 2;
        wxPos[i3 + 2] = Math.sin(a) * r;
      }

      // compute streak direction from actual velocity + wind
      // streak tail = position offset backwards along velocity vector
      const vx = wxVel[i3] + windPushX * 1.2;
      const vy = wxVel[i3 + 1];
      const vz = wxVel[i3 + 2] + windPushZ * 1.2;
      const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);
      const streakLen = RAIN_STREAK_LENGTH + wind.strength * RAIN_STREAK_WIND_MULT;
      const inv = streakLen / (speed || 1);

      // head vertex (current position)
      rp[i6] = wxPos[i3];
      rp[i6 + 1] = wxPos[i3 + 1];
      rp[i6 + 2] = wxPos[i3 + 2];
      // tail vertex (offset backwards along velocity)
      rp[i6 + 3] = wxPos[i3] - vx * inv;
      rp[i6 + 4] = wxPos[i3 + 1] - vy * inv;
      rp[i6 + 5] = wxPos[i3 + 2] - vz * inv;
    }

    // hide inactive
    for (let i = weatherActiveCount; i < WEATHER_COUNT; i++) {
      const i6 = i * 6;
      rp[i6 + 1] = -100; rp[i6 + 4] = -100;
    }
    rainGeo.attributes.position.needsUpdate = true;

  } else {
    // ── SNOW UPDATE ──
    snowMat.uniforms.uOpacity.value = weatherFade * weatherIntensity;

    const sp = snowGeo.attributes.position.array;
    const sa = snowGeo.attributes.alpha.array;
    const ss = snowGeo.attributes.size.array;

    for (let i = 0; i < weatherActiveCount; i++) {
      const i3 = i * 3;
      const phase = wxAlpha[i];
      const y = wxPos[i3 + 1];

      // base movement: velocity + gentler wind influence
      wxPos[i3] += (wxVel[i3] + windPushX * 0.4) * dt;
      wxPos[i3 + 1] += wxVel[i3 + 1] * dt;
      wxPos[i3 + 2] += (wxVel[i3 + 2] + windPushZ * 0.4) * dt;

      // complex wandering: figure-8 / tumbling motion
      const wander1 = Math.sin(phase * 12.5 + y * 1.8) * dt * 0.35;
      const wander2 = Math.cos(phase * 8.3 + y * 1.3) * dt * 0.25;
      const wander3 = Math.sin(phase * 5.7 + y * 2.5 + wxPos[i3] * 0.5) * dt * 0.15;
      wxPos[i3] += wander1 + wander3;
      wxPos[i3 + 2] += wander2;

      // occasional thermal updraft (large flakes catch air)
      if (wxSize[i] > 0.08) {
        const updraft = Math.sin(phase * 3 + y * 0.5) * 0.15;
        if (updraft > 0) wxPos[i3 + 1] += updraft * dt;
      }

      // respawn check
      if (wxPos[i3 + 1] < -0.3 ||
          Math.abs(wxPos[i3]) > WEATHER_SPAWN_RADIUS * 1.2 ||
          Math.abs(wxPos[i3 + 2]) > WEATHER_SPAWN_RADIUS * 1.2) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * WEATHER_SPAWN_RADIUS;
        wxPos[i3] = Math.cos(a) * r;
        wxPos[i3 + 1] = WEATHER_SPAWN_HEIGHT + Math.random() * 2;
        wxPos[i3 + 2] = Math.sin(a) * r;
        // re-randomize size and phase on respawn for variety
        const sizeRoll = Math.random();
        wxSize[i] = sizeRoll < 0.5 ? 0.03 + Math.random() * 0.02
          : sizeRoll < 0.85 ? 0.06 + Math.random() * 0.04
          : 0.12 + Math.random() * 0.06;
        wxAlpha[i] = Math.random();
      }

      // write to GPU buffers
      sp[i3] = wxPos[i3];
      sp[i3 + 1] = wxPos[i3 + 1];
      sp[i3 + 2] = wxPos[i3 + 2];
      ss[i] = wxSize[i];
      // per-flake alpha: gentle pulsing based on phase + height
      sa[i] = (0.4 + 0.3 * Math.sin(phase * 8 + y * 1.5)) * (wxSize[i] > 0.08 ? 1.0 : 0.75);
    }

    // hide inactive
    for (let i = weatherActiveCount; i < WEATHER_COUNT; i++) {
      sp[i * 3 + 1] = -100;
      sa[i] = 0;
    }
    snowGeo.attributes.position.needsUpdate = true;
    snowGeo.attributes.alpha.needsUpdate = true;
    snowGeo.attributes.size.needsUpdate = true;
  }

  updateSplashes(dt);
}

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function createWhiteNoise(ctx, duration) {
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  return buffer;
}

// pink noise — 1/f spectrum, more natural sounding than white noise
function createPinkNoise(ctx, duration) {
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
  for (let i = 0; i < bufferSize; i++) {
    const white = Math.random() * 2 - 1;
    b0 = 0.99886 * b0 + white * 0.0555179;
    b1 = 0.99332 * b1 + white * 0.0750759;
    b2 = 0.96900 * b2 + white * 0.1538520;
    b3 = 0.86650 * b3 + white * 0.3104856;
    b4 = 0.55000 * b4 + white * 0.5329522;
    b5 = -0.7616 * b5 - white * 0.0168980;
    data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
    b6 = white * 0.115926;
  }
  return buffer;
}

function createReverb(ctx) {
  // rich convolution reverb — early reflections + long diffuse tail
  // inspired by the vast, airy spaces of Elder Scrolls interiors
  const length = ctx.sampleRate * 4.5;
  const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    // early reflections (first 80ms) — discrete echoes for spatial definition
    const earlyEnd = Math.floor(ctx.sampleRate * 0.08);
    for (let i = 0; i < earlyEnd; i++) {
      // sparse taps at irregular intervals
      if (Math.random() < 0.003) {
        data[i] = (Math.random() * 2 - 1) * 0.6 * (1 - i / earlyEnd);
      }
    }
    // late diffuse tail — smooth exponential decay with randomized diffusion
    for (let i = earlyEnd; i < length; i++) {
      const progress = (i - earlyEnd) / (length - earlyEnd);
      // dual-slope decay: faster initially, slower tail (like a real reverberant space)
      const decay = progress < 0.3
        ? Math.pow(1 - progress / 0.3, 1.8) * 0.7 + 0.3 * Math.pow(1 - progress, 3.5)
        : Math.pow(1 - progress, 3.5) * 0.3;
      // channel offset for stereo width
      const stereoPhase = ch === 0 ? 0 : 0.37;
      data[i] = (Math.random() * 2 - 1) * decay * (0.8 + 0.2 * Math.sin(i * 0.001 + stereoPhase));
    }
  }
  const conv = ctx.createConvolver();
  conv.buffer = impulse;
  return conv;
}

// helper: auto-cleanup oscillator + connected nodes
function autoCleanup(osc, ...nodes) {
  osc.onended = () => { osc.disconnect(); nodes.forEach(n => n.disconnect()); };
}

// play a single reverberant piano-like note (Minecraft/Skyrim style)
function playNote(midi, velocity, delay) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (delay || 0);
  const freq = midiToFreq(midi);

  // triangle + detuned sine for warm, slightly shimmery tone
  const osc = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = freq;

  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 1.002; // slight detune for chorusing

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(velocity * 0.15, t + 0.01);
  env.gain.exponentialRampToValueAtTime(velocity * 0.08, t + 0.8);
  env.gain.exponentialRampToValueAtTime(0.001, t + 4.0);

  // filter darkens over time (bright attack → muted sustain)
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(2000 + velocity * 1500, t);
  filter.frequency.exponentialRampToValueAtTime(400, t + 3.0);

  osc.connect(filter);
  osc2.connect(filter);
  filter.connect(env);
  env.connect(noteGain);

  osc.start(t);
  osc2.start(t);
  osc.stop(t + 5);
  osc2.stop(t + 5);
  osc.onended = () => { osc.disconnect(); osc2.disconnect(); filter.disconnect(); env.disconnect(); };
}

// soft two-note chord (dawn/dusk transitions)
function playChord(midi1, midi2, velocity) {
  playNote(midi1, velocity * 0.7, 0);
  playNote(midi2, velocity * 0.5, 0.3 + Math.random() * 0.5);
}

function initAudio() {
  return; // audio disabled
  if (audioInitialized) return;
  audioInitialized = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // ── MASTER CHAIN ──
  // masterGain → compressor → destination
  masterComp = audioCtx.createDynamicsCompressor();
  masterComp.threshold.value = -18;  // start compressing at -18dB
  masterComp.knee.value = 12;        // soft knee for transparent compression
  masterComp.ratio.value = 4;        // 4:1 ratio — firm but not limiting
  masterComp.attack.value = 0.003;   // fast attack catches transients
  masterComp.release.value = 0.15;   // smooth release avoids pumping
  masterComp.connect(audioCtx.destination);

  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.4;
  masterGain.connect(masterComp);

  // ── REVERB ──
  reverbNode = createReverb(audioCtx);
  reverbGain = audioCtx.createGain();
  reverbGain.gain.value = 0.35;
  reverbNode.connect(reverbGain);
  reverbGain.connect(masterComp); // reverb bypasses masterGain to avoid double-gain

  // ── BUSES ──
  musicBus = audioCtx.createGain();
  musicBus.gain.value = 0.65;
  musicBus.connect(masterGain);
  musicReverbSend = audioCtx.createGain();
  musicReverbSend.gain.value = 0.45; // notes get heavy reverb (Skyrim piano feel)
  musicBus.connect(musicReverbSend);
  musicReverbSend.connect(reverbNode);

  ambientBus = audioCtx.createGain();
  ambientBus.gain.value = 0.8;
  ambientBus.connect(masterGain);
  ambientReverbSend = audioCtx.createGain();
  ambientReverbSend.gain.value = 0.15; // ambient gets subtle space
  ambientBus.connect(ambientReverbSend);
  ambientReverbSend.connect(reverbNode);

  sfxBus = audioCtx.createGain();
  sfxBus.gain.value = 0.7;
  sfxBus.connect(masterGain);
  sfxReverbSend = audioCtx.createGain();
  sfxReverbSend.gain.value = 0.2; // footsteps get moderate reverb
  sfxBus.connect(sfxReverbSend);
  sfxReverbSend.connect(reverbNode);

  // ── NOTE OUTPUT ──
  noteGain = audioCtx.createGain();
  noteGain.gain.value = 0.55;
  noteGain.connect(musicBus);

  // ── PAD DRONE — 3-oscillator evolving texture ──
  padGain = audioCtx.createGain();
  padGain.gain.value = 0.0;

  // shared pad filter with LFO for slow movement
  padFilterNode = audioCtx.createBiquadFilter();
  padFilterNode.type = 'lowpass';
  padFilterNode.frequency.value = 350;
  padFilterNode.Q.value = 0.7;
  padFilterNode.connect(padGain);
  padGain.connect(musicBus);

  // filter LFO — very slow breathing (0.04 Hz ≈ 25s cycle)
  padFilterLFO = audioCtx.createOscillator();
  padFilterLFO.type = 'sine';
  padFilterLFO.frequency.value = 0.04;
  padFilterLFOGain = audioCtx.createGain();
  padFilterLFOGain.gain.value = 120; // sweeps ±120 Hz around center
  padFilterLFO.connect(padFilterLFOGain);
  padFilterLFOGain.connect(padFilterNode.frequency);
  padFilterLFO.start();

  // osc1: root note (sine, warm foundation)
  padOsc1 = audioCtx.createOscillator();
  padOsc1.type = 'sine';
  padOsc1.frequency.value = midiToFreq(48);
  padOsc1.connect(padFilterNode);
  padOsc1.start();

  // osc2: fifth (sine, harmonic bed)
  padOsc2 = audioCtx.createOscillator();
  padOsc2.type = 'sine';
  padOsc2.frequency.value = midiToFreq(55);
  padOsc2.connect(padFilterNode);
  padOsc2.start();

  // osc3: octave root (triangle, adds gentle overtones for richness)
  padOsc3 = audioCtx.createOscillator();
  padOsc3.type = 'triangle';
  padOsc3.frequency.value = midiToFreq(36); // one octave below osc1
  const padOsc3Gain = audioCtx.createGain();
  padOsc3Gain.gain.value = 0.3; // subtle, just adds depth
  padOsc3.connect(padOsc3Gain);
  padOsc3Gain.connect(padFilterNode);
  padOsc3.start();

  // ── WIND — 3-layer ambient wind ──
  windMasterGain = audioCtx.createGain();
  windMasterGain.gain.value = 0;
  windMasterGain.connect(ambientBus);

  const windLayerConfigs = [
    { type: 'bandpass', freq: 280, Q: 1.2, gain: 0.08, lfoRate: 0.07, lfoDepth: 150 },
    { type: 'bandpass', freq: 900, Q: 0.6, gain: 0.05, lfoRate: 0.13, lfoDepth: 400 },
    { type: 'highpass', freq: 2800, Q: 0.3, gain: 0.025, lfoRate: 0.23, lfoDepth: 800 },
  ];
  const windNoiseBuf = createPinkNoise(audioCtx, 4); // pink noise for more natural wind
  for (const cfg of windLayerConfigs) {
    const noise = audioCtx.createBufferSource();
    noise.buffer = windNoiseBuf;
    noise.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = cfg.type;
    filter.frequency.value = cfg.freq;
    filter.Q.value = cfg.Q;
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = cfg.lfoRate;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = cfg.lfoDepth;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);
    lfo.start();
    const layerGain = audioCtx.createGain();
    layerGain.gain.value = cfg.gain;
    noise.connect(filter);
    filter.connect(layerGain);
    layerGain.connect(windMasterGain);
    noise.start();
    windLayers.push({ noise, filter, lfo, lfoGain, layerGain, baseFreq: cfg.freq, baseLfoDepth: cfg.lfoDepth, baseGain: cfg.gain });
  }

  // ── WATER — dual-layer: deep rumble + gentle surface lapping ──
  waterGain = audioCtx.createGain();
  waterGain.gain.value = 0;
  waterFilter = audioCtx.createBiquadFilter();
  waterFilter.type = 'lowpass';
  waterFilter.frequency.value = 250; // starts muffled, opens with proximity
  waterFilter.Q.value = 0.8;
  const waterBuf = createPinkNoise(audioCtx, 4);
  waterNoise = audioCtx.createBufferSource();
  waterNoise.buffer = waterBuf;
  waterNoise.loop = true;
  waterNoise.connect(waterFilter);
  waterFilter.connect(waterGain);
  waterGain.connect(ambientBus);
  waterNoise.start();

  // second water layer: higher-frequency lapping/foam
  waterLapGain = audioCtx.createGain();
  waterLapGain.gain.value = 0;
  waterLapFilter = audioCtx.createBiquadFilter();
  waterLapFilter.type = 'bandpass';
  waterLapFilter.frequency.value = 1200;
  waterLapFilter.Q.value = 0.5;
  const lapBuf = createWhiteNoise(audioCtx, 4);
  waterLapNoise = audioCtx.createBufferSource();
  waterLapNoise.buffer = lapBuf;
  waterLapNoise.loop = true;
  waterLapNoise.connect(waterLapFilter);
  waterLapFilter.connect(waterLapGain);
  waterLapGain.connect(ambientBus);
  waterLapNoise.start();

  // ── RAIN — 3-layer rain (low rumble + mid patter + high sizzle) ──
  rainMasterGain = audioCtx.createGain();
  rainMasterGain.gain.value = 0;
  rainMasterGain.connect(ambientBus);
  rainAudioGain = rainMasterGain; // keep external reference working

  const rainLayerConfigs = [
    // low: distant thunder rumble, gives weight
    { type: 'bandpass', freq: 150, Q: 0.8, gain: 0.5, noiseFn: createPinkNoise },
    // mid: the main body of rain hitting surfaces
    { type: 'bandpass', freq: 1200, Q: 0.4, gain: 0.35, noiseFn: createWhiteNoise },
    // high: bright sizzle of rain on leaves/water
    { type: 'highpass', freq: 4000, Q: 0.3, gain: 0.15, noiseFn: createWhiteNoise },
  ];
  for (const cfg of rainLayerConfigs) {
    const noise = audioCtx.createBufferSource();
    noise.buffer = cfg.noiseFn(audioCtx, 4);
    noise.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = cfg.type;
    filter.frequency.value = cfg.freq;
    filter.Q.value = cfg.Q;
    const layerGain = audioCtx.createGain();
    layerGain.gain.value = cfg.gain;
    noise.connect(filter);
    filter.connect(layerGain);
    layerGain.connect(rainMasterGain);
    noise.start();
    rainLayers.push({ noise, filter, layerGain });
  }

  // ── CRICKETS ──
  cricketGain = audioCtx.createGain();
  cricketGain.gain.value = 0;
  cricketGain.connect(ambientBus);

  // ── BIRDSONG ──
  birdGain = audioCtx.createGain();
  birdGain.gain.value = 0;
  birdGain.connect(ambientBus);

  // ── BIOME AMBIENT — per-biome signature sound bus ──
  biomeAmbientGain = audioCtx.createGain();
  biomeAmbientGain.gain.value = 0;
  biomeAmbientGain.connect(ambientBus);
  initBiomeAmbient(currentLandIndex);

  // schedule initial events
  nextNoteTime = audioCtx.currentTime + 2 + Math.random() * 4;
  nextChordTime = audioCtx.currentTime + 15 + Math.random() * 20;
  nextCricketTime = audioCtx.currentTime + 1 + Math.random() * 3;
  nextBirdTime = audioCtx.currentTime + 2 + Math.random() * 5;
  nextThunderTime = audioCtx.currentTime + 30 + Math.random() * 60;
  nextBiomeEventTime = audioCtx.currentTime + 3 + Math.random() * 5;
}

// ── BIOME AMBIENT SYSTEM ──────────────────────────
// Each biome has a continuous background texture + periodic one-shot sounds
function stopBiomeAmbient() {
  for (const src of biomeAmbientSources) {
    try { src.stop(); src.disconnect(); } catch(e) {}
  }
  biomeAmbientSources = [];
}

function initBiomeAmbient(biomeIdx) {
  if (!audioCtx || !biomeAmbientGain) return;
  stopBiomeAmbient();
  const cfg = BIOME_AMBIENT[biomeIdx];
  if (!cfg) return;

  // continuous texture layer (stream babble, lava rumble, leaf rustle, etc.)
  if (cfg.type === 'stream' || cfg.type === 'rustle' || cfg.type === 'lava') {
    const noise = audioCtx.createBufferSource();
    noise.buffer = cfg.type === 'lava' ? createPinkNoise(audioCtx, 4) : createWhiteNoise(audioCtx, 4);
    noise.loop = true;
    const filter = audioCtx.createBiquadFilter();
    if (cfg.type === 'stream') {
      // babbling brook: narrow bandpass centered at mid-freq with fast LFO for burbling
      filter.type = 'bandpass';
      filter.frequency.value = 1800;
      filter.Q.value = 1.5;
      const streamLFO = audioCtx.createOscillator();
      streamLFO.type = 'sine';
      streamLFO.frequency.value = 0.4; // slow burble rate
      const streamLFOGain = audioCtx.createGain();
      streamLFOGain.gain.value = 600;
      streamLFO.connect(streamLFOGain);
      streamLFOGain.connect(filter.frequency);
      streamLFO.start();
      biomeAmbientSources.push(streamLFO);
    } else if (cfg.type === 'rustle') {
      // dry leaves: highpass with fast LFO for crinkle texture
      filter.type = 'highpass';
      filter.frequency.value = 2000;
      filter.Q.value = 0.3;
      const rustleLFO = audioCtx.createOscillator();
      rustleLFO.type = 'sine';
      rustleLFO.frequency.value = 0.6;
      const rustleLFOGain = audioCtx.createGain();
      rustleLFOGain.gain.value = 1200;
      rustleLFO.connect(rustleLFOGain);
      rustleLFOGain.connect(filter.frequency);
      rustleLFO.start();
      biomeAmbientSources.push(rustleLFO);
    } else { // lava
      // deep tectonic rumble
      filter.type = 'lowpass';
      filter.frequency.value = 100;
      filter.Q.value = 3;
      const lavaLFO = audioCtx.createOscillator();
      lavaLFO.type = 'sine';
      lavaLFO.frequency.value = 0.15;
      const lavaLFOGain = audioCtx.createGain();
      lavaLFOGain.gain.value = 30;
      lavaLFO.connect(lavaLFOGain);
      lavaLFOGain.connect(filter.frequency);
      lavaLFO.start();
      biomeAmbientSources.push(lavaLFO);
    }
    const gain = audioCtx.createGain();
    gain.gain.value = cfg.gain;
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(biomeAmbientGain);
    noise.start();
    biomeAmbientSources.push(noise);
  }
  // ramp in the biome ambient bus
  biomeAmbientGain.gain.cancelScheduledValues(audioCtx.currentTime);
  biomeAmbientGain.gain.setValueAtTime(0, audioCtx.currentTime);
  biomeAmbientGain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 2);
}

// ── BIOME ONE-SHOT EVENTS ──────────────────────────
// Periodic sounds unique to each biome (drips, crystal pings, wind chimes, ice creaks)
function playBiomeEvent() {
  if (!audioCtx || !biomeAmbientGain) return;
  const cfg = BIOME_AMBIENT[currentLandIndex];
  if (!cfg || !cfg.interval) return;
  const t = audioCtx.currentTime;

  if (cfg.type === 'drips') {
    // mushroom water drip — high pitched droplet plop
    const freq = cfg.freq * (0.8 + Math.random() * 0.4);
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.4, t + 0.15);
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(cfg.gain * 0.8, t + 0.002);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
    osc.connect(env);
    env.connect(biomeAmbientGain);
    osc.start(t);
    osc.stop(t + 0.25);
    autoCleanup(osc, env);
  } else if (cfg.type === 'resonance') {
    // crystal resonance — high sine with long ring-out, like tapping a crystal glass
    const freq = cfg.freq * (0.85 + Math.random() * 0.3);
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t);
    // slight upward glide gives it a magical quality
    osc.frequency.exponentialRampToValueAtTime(freq * 1.01, t + 1.5);
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(cfg.gain, t + 0.005);
    env.gain.exponentialRampToValueAtTime(cfg.gain * 0.3, t + 0.8);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 2.5);
    // this goes through reverb for that enormous crystal cave echo
    osc.connect(env);
    env.connect(biomeAmbientGain);
    env.connect(reverbNode); // extra reverb send for crystalline echo
    osc.start(t);
    osc.stop(t + 3);
    autoCleanup(osc, env);
  } else if (cfg.type === 'bubbles') {
    // coral bubbles — quick frequency-dropping plop (like underwater)
    const count = 1 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      const offset = i * (0.08 + Math.random() * 0.12);
      const freq = cfg.freq * (0.7 + Math.random() * 0.6);
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + offset);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.3, t + offset + 0.08);
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, t + offset);
      env.gain.linearRampToValueAtTime(cfg.gain * 0.6, t + offset + 0.003);
      env.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.1);
      osc.connect(env);
      env.connect(biomeAmbientGain);
      osc.start(t + offset);
      osc.stop(t + offset + 0.15);
      autoCleanup(osc, env);
    }
  } else if (cfg.type === 'chimes') {
    // wind chimes — metallic sine tones with harmonics, like Ghibli temple bells
    const noteCount = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < noteCount; i++) {
      const offset = i * (0.3 + Math.random() * 0.5);
      const freq = cfg.freq * (0.8 + Math.random() * 0.4);
      // fundamental
      const osc1 = audioCtx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.value = freq;
      // first harmonic (slightly detuned for metallic quality)
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2.76; // non-integer partial = metallic
      const harmGain = audioCtx.createGain();
      harmGain.gain.value = 0.15; // quiet harmonic
      osc2.connect(harmGain);
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, t + offset);
      env.gain.linearRampToValueAtTime(cfg.gain, t + offset + 0.003);
      env.gain.exponentialRampToValueAtTime(cfg.gain * 0.2, t + offset + 0.5);
      env.gain.exponentialRampToValueAtTime(0.0001, t + offset + 2.5);
      osc1.connect(env);
      harmGain.connect(env);
      env.connect(biomeAmbientGain);
      env.connect(reverbNode); // chimes sound gorgeous with reverb
      osc1.start(t + offset);
      osc2.start(t + offset);
      osc1.stop(t + offset + 3);
      osc2.stop(t + offset + 3);
      autoCleanup(osc1, env, harmGain);
      osc2.onended = () => { osc2.disconnect(); };
    }
  } else if (cfg.type === 'ice') {
    // ice stress creak — low pitched noise sweep (like glaciers shifting)
    const noise = audioCtx.createBufferSource();
    noise.buffer = createWhiteNoise(audioCtx, 1);
    noise.loop = false;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(cfg.freq, t);
    filter.frequency.exponentialRampToValueAtTime(cfg.freq * 3, t + 0.3);
    filter.frequency.exponentialRampToValueAtTime(cfg.freq * 0.5, t + 0.8);
    filter.Q.value = 4;
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(cfg.gain, t + 0.05);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 1.0);
    noise.connect(filter);
    filter.connect(env);
    env.connect(biomeAmbientGain);
    noise.start(t);
    noise.stop(t + 1.2);
    noise.onended = () => { noise.disconnect(); filter.disconnect(); env.disconnect(); };
  }
}

// ── THUNDER ──────────────────────────
// Distant rumble for rainy biomes — low noise burst with long reverb tail
function playThunder() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // short burst of shaped noise = thunder crack
  const noise = audioCtx.createBufferSource();
  noise.buffer = createPinkNoise(audioCtx, 2);
  noise.loop = false;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(400, t);
  filter.frequency.exponentialRampToValueAtTime(80, t + 1.5);
  filter.Q.value = 0.5;
  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, t);
  // distant crack: quick swell then long rumble
  env.gain.linearRampToValueAtTime(0.06, t + 0.05);
  env.gain.exponentialRampToValueAtTime(0.03, t + 0.3);
  env.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
  noise.connect(filter);
  filter.connect(env);
  env.connect(ambientBus);
  env.connect(reverbNode); // heavy reverb for that rolling echo
  noise.start(t);
  noise.stop(t + 3);
  noise.onended = () => { noise.disconnect(); filter.disconnect(); env.disconnect(); };
}

// ── SURFACE-AWARE FOOTSTEPS ──────────────────────────
// Detect surface from terrain height and biome, play matching foley
function getSurfaceType(land) {
  if (!walkMode) return 'grass';
  const nx = walkPos.x / RADIUS;
  const nz = walkPos.z / RADIUS;
  const h = getTerrainHeight(nx, nz);
  const mh = land.mountainHeight;
  const terrainY = h * mh;

  // walking in water
  if (terrainY < tideOffset + 0.05) return 'water';
  // very low = sand/shore
  if (h < 0.15) return 'sand';
  // snow biomes at high altitude
  if (land.hasSnow && h > 0.55) return 'snow';
  // high elevation = rock
  if (h > 0.7) return 'rock';
  // medium-high = dirt
  if (h > 0.45) return 'dirt';
  // default = grass
  return 'grass';
}

function playFootstep(surface) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const s = SURFACE[surface] || SURFACE.grass;

  // tonal component — each surface has a characteristic pitch
  const osc = audioCtx.createOscillator();
  osc.type = surface === 'rock' ? 'triangle' : 'sine';
  const freq = s.baseFreq * (0.9 + Math.random() * 0.2);
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, t + s.decay);

  const env = audioCtx.createGain();
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(s.vol, t + 0.004);
  env.gain.exponentialRampToValueAtTime(0.0001, t + s.decay + 0.02);

  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = s.filterFreq;
  filt.Q.value = 0.5;

  osc.connect(filt);
  filt.connect(env);
  env.connect(sfxBus);
  osc.start(t);
  osc.stop(t + s.decay + 0.05);

  // noise component — crunch/rustle texture (grass, dirt, sand, snow, water)
  if (s.noise) {
    const noiseSrc = audioCtx.createBufferSource();
    noiseSrc.buffer = createWhiteNoise(audioCtx, 0.2);
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = surface === 'water' ? 'bandpass' : 'highpass';
    // water splash is broader, snow is very muffled, others moderate
    noiseFilter.frequency.value = surface === 'snow' ? 1000 :
      surface === 'water' ? 800 : surface === 'sand' ? 1500 : 2000;
    noiseFilter.Q.value = surface === 'water' ? 1.0 : 0.3;
    const noiseEnv = audioCtx.createGain();
    noiseEnv.gain.setValueAtTime(0, t);
    noiseEnv.gain.linearRampToValueAtTime(s.vol * 0.5, t + 0.002);
    noiseEnv.gain.exponentialRampToValueAtTime(0.0001, t + s.decay * 0.8);
    noiseSrc.connect(noiseFilter);
    noiseFilter.connect(noiseEnv);
    noiseEnv.connect(sfxBus);
    noiseSrc.start(t);
    noiseSrc.stop(t + s.decay + 0.02);
    noiseSrc.onended = () => { noiseSrc.disconnect(); noiseFilter.disconnect(); noiseEnv.disconnect(); };
  }

  // water splash gets extra high-frequency "splat"
  if (surface === 'water') {
    const splash = audioCtx.createOscillator();
    splash.type = 'sine';
    splash.frequency.setValueAtTime(400 + Math.random() * 200, t);
    splash.frequency.exponentialRampToValueAtTime(100, t + 0.12);
    const splashEnv = audioCtx.createGain();
    splashEnv.gain.setValueAtTime(0, t + 0.01);
    splashEnv.gain.linearRampToValueAtTime(0.04, t + 0.015);
    splashEnv.gain.exponentialRampToValueAtTime(0.0001, t + 0.15);
    splash.connect(splashEnv);
    splashEnv.connect(sfxBus);
    splash.start(t);
    splash.stop(t + 0.2);
    autoCleanup(splash, splashEnv);
  }

  autoCleanup(osc, filt, env);
}

// cricket chirp — rapid trill of short sine bursts
function playCricketChirp(cfg, nightness) {
  if (!audioCtx || !cricketGain || cfg.vol === 0) return;
  const t = audioCtx.currentTime;
  const trillCount = cfg.trills[0] + Math.floor(Math.random() * (cfg.trills[1] - cfg.trills[0] + 1));
  const baseFreq = cfg.freq * (0.9 + Math.random() * 0.2);
  // FIX: volume scales only here (bus gain handles nightness separately)
  const chirpVol = cfg.vol * 0.025;

  for (let i = 0; i < trillCount; i++) {
    const offset = i * 0.06;
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(baseFreq, t + offset);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.92, t + offset + 0.04);
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, t + offset);
    env.gain.linearRampToValueAtTime(chirpVol, t + offset + 0.003);
    env.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.04);
    osc.connect(env);
    env.connect(cricketGain);
    osc.start(t + offset);
    osc.stop(t + offset + 0.05);
    autoCleanup(osc, env);
  }
}

// birdsong — gentle melodic phrases, trills, or single calls
function playBirdCall(cfg, dawnness) {
  if (!audioCtx || !birdGain || cfg.vol === 0) return;
  const t = audioCtx.currentTime;
  const noteCount = cfg.notes[0] + Math.floor(Math.random() * (cfg.notes[1] - cfg.notes[0] + 1));
  const baseFreq = cfg.freq * (0.92 + Math.random() * 0.16);
  // FIX: volume scales only here (bus gain handles dawnness separately)
  const callVol = cfg.vol * 0.012;

  if (cfg.style === 'call') {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    const bendDir = Math.random() < 0.5 ? 1.08 : 0.94;
    osc.frequency.setValueAtTime(baseFreq, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * bendDir, t + 0.3);
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(callVol, t + 0.02);
    env.gain.setValueAtTime(callVol * 0.8, t + 0.15);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
    osc.connect(env);
    env.connect(birdGain);
    osc.start(t);
    osc.stop(t + 0.4);
    autoCleanup(osc, env);
  } else if (cfg.style === 'trill') {
    for (let i = 0; i < noteCount; i++) {
      const offset = i * 0.08;
      const freq = baseFreq * Math.pow(0.94, i);
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + offset);
      const vib = audioCtx.createOscillator();
      vib.frequency.value = 6;
      const vibGain = audioCtx.createGain();
      vibGain.gain.value = freq * 0.02;
      vib.connect(vibGain);
      vibGain.connect(osc.frequency);
      vib.start(t + offset);
      vib.stop(t + offset + 0.07);
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, t + offset);
      env.gain.linearRampToValueAtTime(callVol, t + offset + 0.005);
      env.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.06);
      osc.connect(env);
      env.connect(birdGain);
      osc.start(t + offset);
      osc.stop(t + offset + 0.07);
      autoCleanup(osc, env, vib, vibGain);
    }
  } else {
    // 'song' — melodic phrase
    const intervals = [1, 1.125, 1.2, 1.33, 1.5];
    for (let i = 0; i < noteCount; i++) {
      const offset = i * (0.15 + Math.random() * 0.1);
      const intv = intervals[Math.floor(Math.random() * intervals.length)];
      const freq = baseFreq * (i === 0 ? 1 : intv) * (0.95 + Math.random() * 0.1);
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + offset);
      const vib = audioCtx.createOscillator();
      vib.frequency.value = 5;
      const vibGain = audioCtx.createGain();
      vibGain.gain.value = freq * 0.015;
      vib.connect(vibGain);
      vibGain.connect(osc.frequency);
      vib.start(t + offset);
      vib.stop(t + offset + 0.12);
      const env = audioCtx.createGain();
      env.gain.setValueAtTime(0, t + offset);
      env.gain.linearRampToValueAtTime(callVol, t + offset + 0.008);
      env.gain.setValueAtTime(callVol * 0.7, t + offset + 0.06);
      env.gain.exponentialRampToValueAtTime(0.0001, t + offset + 0.12);
      osc.connect(env);
      env.connect(birdGain);
      osc.start(t + offset);
      osc.stop(t + offset + 0.13);
      autoCleanup(osc, env, vib, vibGain);
    }
  }
}

// biome switch chime — descending arpeggio (richer than before)
function playBiomeChime() {
  if (!audioCtx) return;
  const scale = BIOME_SCALES[currentLandIndex] || BIOME_SCALES[0];
  const root = scale[Math.floor(Math.random() * 3)];
  playNote(root + 12, 0.55, 0);
  playNote(root + 7, 0.35, 0.35);
  playNote(root, 0.2, 0.8); // add a low third note for depth
  // rebuild biome ambient sounds
  if (audioInitialized) initBiomeAmbient(currentLandIndex);
}

// ── UPDATE AUDIO — called every frame ──────────────────────────
function updateAudio(elapsed, dt) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const land = LANDS[currentLandIndex];
  const scale = BIOME_SCALES[currentLandIndex] || BIOME_SCALES[0];

  const dayT = dayTime % 1;
  const nightness = dayT > 0.7 ? Math.min(1, (dayT - 0.7) / 0.1)
    : dayT < 0.15 ? Math.min(1, (0.15 - dayT) / 0.1) : 0;
  const dawnness = dayT >= 0.13 && dayT <= 0.25 ? 1 :
    dayT > 0.25 && dayT <= 0.55 ? 0.3 :
    dayT > 0.55 && dayT <= 0.65 ? 0.5 : 0;

  // ── THROTTLED CONTINUOUS PARAMS (~4x/sec) ──
  audioThrottleAccum += dt;
  if (audioThrottleAccum > 0.25) {
    audioThrottleAccum = 0;

    // pad: louder at night, tracks biome key
    const padTarget = 0.02 + nightness * 0.04;
    padGain.gain.linearRampToValueAtTime(padTarget, t + 0.5);
    padOsc1.frequency.linearRampToValueAtTime(midiToFreq(scale[0] - 12), t + 2);
    padOsc2.frequency.linearRampToValueAtTime(midiToFreq(scale[4] - 12), t + 2);
    padOsc3.frequency.linearRampToValueAtTime(midiToFreq(scale[0] - 24), t + 2);
    // pad filter opens at night for warmer tone
    padFilterNode.frequency.linearRampToValueAtTime(280 + nightness * 180, t + 1);

    // wind: scales with wind strength, goes silent at calm
    const ws = wind.strength;
    windMasterGain.gain.linearRampToValueAtTime(ws * 1.0, t + 0.5);
    for (const wl of windLayers) {
      wl.layerGain.gain.linearRampToValueAtTime(wl.baseGain * (0.3 + ws * 0.9), t + 0.5);
      wl.lfoGain.gain.linearRampToValueAtTime(wl.baseLfoDepth * (0.3 + ws * 1.2), t + 0.5);
    }

    // water: dual-layer with proximity-based filter opening
    let waterTarget = 0.012;
    let waterLapTarget = 0.005;
    let waterFilterTarget = 250;
    if (walkMode) {
      const distToEdge = Math.sqrt(walkPos.x * walkPos.x + walkPos.z * walkPos.z) / RADIUS;
      const proximity = Math.max(0, distToEdge - 0.4) / 0.5; // 0 at center, 1 at edge
      waterTarget = 0.008 + proximity * 0.06;
      waterLapTarget = 0.003 + proximity * 0.025;
      waterFilterTarget = 250 + proximity * 500; // filter opens near shore
    }
    waterGain.gain.linearRampToValueAtTime(waterTarget, t + 0.3);
    waterFilter.frequency.linearRampToValueAtTime(waterFilterTarget, t + 0.5);
    waterLapGain.gain.linearRampToValueAtTime(waterLapTarget, t + 0.3);

    // rain: 3-layer, fades with weather state
    if (rainMasterGain) {
      const rainTarget = weatherType === 'rain' ? weatherFade * weatherIntensity * 0.1 : 0;
      rainMasterGain.gain.linearRampToValueAtTime(rainTarget, t + 0.5);
    }

    // crickets: bus gain tracks nightness (not doubled with per-chirp scaling)
    if (cricketGain) {
      const cricketTarget = nightness > 0.1 ? nightness * 0.8 : 0;
      cricketGain.gain.linearRampToValueAtTime(cricketTarget, t + 0.5);
    }

    // birds: bus gain tracks dawnness
    if (birdGain) {
      birdGain.gain.linearRampToValueAtTime(dawnness * 0.8, t + 0.5);
    }
  }

  // ── SPARSE NOTES — the Minecraft / Skyrim magic ──
  if (t > nextNoteTime) {
    const velocity = 0.3 + Math.random() * 0.4;
    const noteIdx = Math.floor(Math.random() * scale.length);
    playNote(scale[noteIdx], velocity, 0);

    // call and response (35% chance)
    if (Math.random() < 0.35) {
      const note2Idx = (noteIdx + 2 + Math.floor(Math.random() * 3)) % scale.length;
      playNote(scale[note2Idx], velocity * 0.6, 1.5 + Math.random() * 2.5);
    }

    // occasional 3-note arpeggio for musical moments (10% chance)
    if (Math.random() < 0.1) {
      const arp1 = (noteIdx + 2) % scale.length;
      const arp2 = (noteIdx + 4) % scale.length;
      playNote(scale[arp1], velocity * 0.45, 0.4 + Math.random() * 0.3);
      playNote(scale[arp2], velocity * 0.3, 0.9 + Math.random() * 0.4);
    }

    nextNoteTime = t + 5 + Math.random() * 13;
    if (nightness > 0.5) nextNoteTime -= 3;
  }

  // ── CRICKET CHIRPS ──
  if (t > nextCricketTime && nightness > 0.1) {
    const cfg = CRICKET_CONFIGS[currentLandIndex];
    if (cfg && cfg.vol > 0) {
      playCricketChirp(cfg, nightness);
      if (Math.random() < 0.4) {
        const cfg2 = { ...cfg, freq: cfg.freq * (1.05 + Math.random() * 0.1) };
        setTimeout(() => playCricketChirp(cfg2, nightness), 200 + Math.random() * 600);
      }
      const minI = cfg.interval[0], maxI = cfg.interval[1];
      nextCricketTime = t + minI + Math.random() * (maxI - minI);
      if (nightness > 0.7) nextCricketTime -= (maxI - minI) * 0.3;
    } else {
      nextCricketTime = t + 2;
    }
  }

  // ── BIRDSONG ──
  if (t > nextBirdTime && dawnness > 0) {
    const bcfg = BIRD_CONFIGS[currentLandIndex];
    if (bcfg && bcfg.vol > 0) {
      playBirdCall(bcfg, dawnness);
      if (Math.random() < 0.25) {
        const bcfg2 = { ...bcfg, freq: bcfg.freq * (1.1 + Math.random() * 0.15) };
        setTimeout(() => playBirdCall(bcfg2, dawnness), 800 + Math.random() * 2000);
      }
      const minI = bcfg.interval[0], maxI = bcfg.interval[1];
      nextBirdTime = t + minI + Math.random() * (maxI - minI);
      if (dawnness >= 1) nextBirdTime -= (maxI - minI) * 0.4;
    } else {
      nextBirdTime = t + 3;
    }
  }

  // ── DAWN/DUSK CHORD ──
  if (t > nextChordTime) {
    const chordRoot = scale[0];
    const chordFifth = scale[3] || scale[2];
    playChord(chordRoot, chordFifth, 0.35 + nightness * 0.2);
    nextChordTime = t + 25 + Math.random() * 35;
  }

  // ── BIOME AMBIENT EVENTS (drips, crystal pings, wind chimes, ice creaks) ──
  if (t > nextBiomeEventTime) {
    playBiomeEvent();
    const cfg = BIOME_AMBIENT[currentLandIndex];
    if (cfg && cfg.interval) {
      const minI = cfg.interval[0], maxI = cfg.interval[1];
      nextBiomeEventTime = t + minI + Math.random() * (maxI - minI);
    } else {
      nextBiomeEventTime = t + 10; // no events for continuous-only biomes
    }
  }

  // ── DISTANT THUNDER — for rain biomes, rare and atmospheric ──
  if (t > nextThunderTime && weatherType === 'rain' && weatherFade > 0.5) {
    if (weatherIntensity > 0.3) {
      playThunder();
    }
    // long random gap: 40-120 seconds
    nextThunderTime = t + 40 + Math.random() * 80;
  }

  // ── WALK MODE FOOTSTEPS — surface-aware ──
  if (walkMode && walkBobPhase > 0) {
    const phase = Math.sin(walkBobPhase);
    if (phase < 0 && lastFootstepPhase >= 0) {
      const surface = getSurfaceType(land);
      playFootstep(surface);
      // ripple on water when walking near shore
      const feetY = getTerrainHeight(walkPos.x / RADIUS, walkPos.z / RADIUS) * land.mountainHeight;
      if (feetY < tideOffset + 0.08 && cachedWaterMesh && cachedWaterMesh.userData.uniforms && cachedWaterMesh.userData.uniforms.uRipples) {
        const rip = cachedWaterMesh.userData.uniforms.uRipples.value[rippleIndex % 5];
        rip.x = walkPos.x; rip.y = walkPos.z; rip.z = 0.5; rip.w = cachedWaterMesh.userData.uniforms.uTime.value;
        rippleIndex++;
      }
    }
    lastFootstepPhase = phase;
  }
}

// init audio on first user interaction (browser autoplay policy)
['mousedown', 'touchstart', 'keydown'].forEach(evt => {
  window.addEventListener(evt, () => initAudio(), { once: true, passive: true });
});

// ── ANIMATION LOOP ──────────────────────────────
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const realElapsed = clock.getElapsedTime();
  const dt = realElapsed - lastTime;
  lastTime = realElapsed;

  // photo mode time freeze — world uses frozen time, camera still moves
  const elapsed = photoTimeFrozen ? frozenElapsed : realElapsed;
  const worldDt = photoTimeFrozen ? 0 : dt;

  // ── AUDIO UPDATE ──
  updateAudio(elapsed, worldDt);

  // ── WIND UPDATE ──
  updateWind(elapsed);

  // ── TIDE UPDATE ──
  updateTide(elapsed);

  // ── DAY/NIGHT CYCLE UPDATE ──
  if (todOverride >= 0) {
    dayTime = todOverride; // manual override from settings slider
  } else {
    dayTime = (dayTime + CYCLE_SPEED * cycleSpeedMul * worldDt) % 1;
  }
  const tod = getTOD(dayTime);
  updateDayNight(tod);

  // night factor (0 = day, 1 = full night)
  const t = dayTime % 1;
  const nightFactor = t > 0.72 && t < 0.95 ? 1 : (t >= 0.63 && t <= 0.72 ? (t - 0.63) / 0.09 : (t >= 0.95 || t < 0.12 ? (t >= 0.95 ? 1 - (t - 0.95) / 0.05 : 1 - t / 0.12) : 0));

  // stars visibility (starGroup has 1 child — the Points mesh)
  {
    const stars = starGroup.children[0];
    if (stars && stars.material) {
      stars.material.opacity = nightFactor * 0.8;
      stars.rotation.y = elapsed * 0.003;
    }
  }

  // fireflies — glow and drift at night (flat group, no nested children)
  for (let i = 0; i < fireflyGroup.children.length; i++) {
    const child = fireflyGroup.children[i];
    const p = child.userData.phase;
    const spd = child.userData.speed;
    child.position.x = child.userData.baseX + Math.sin(elapsed * spd * 0.7 + p) * child.userData.radius;
    child.position.y = child.userData.baseY + Math.sin(elapsed * spd * 1.2 + p) * 0.15;
    child.position.z = child.userData.baseZ + Math.cos(elapsed * spd * 0.5 + p * 1.3) * child.userData.radius;
    const blink = Math.sin(elapsed * 2.5 + p) * 0.5 + 0.5;
    child.material.opacity = nightFactor * blink * 0.9;
    child.scale.setScalar(1 + blink * 0.4);
  }

  // gentle breathing (disabled in walk mode — would cause motion sickness)
  if (!transitioning && !walkMode) {
    islandGroup.position.y = Math.sin(elapsed * 0.35) * 0.05;
    islandGroup.rotation.y = Math.sin(elapsed * 0.1) * 0.025;
  } else if (walkMode) {
    islandGroup.position.y = 0;
    islandGroup.rotation.y = 0;
  }

  // ── WATER — GPU-computed Gerstner (just update uniforms, GPU does the rest) ──
  if (cachedWaterMesh) {
    const uniforms = cachedWaterMesh.userData.uniforms;
    uniforms.uTime.value = elapsed;
    uniforms.uSunDir.value.copy(sunLight.position).normalize();
    uniforms.uSunColor.value.copy(sunLight.color);
    uniforms.uWindDir.value.copy(wind.dir);
    uniforms.uWindStrength.value = wind.strength;
    uniforms.uTideOffset.value = tideOffset;
    uniforms.uWaveIntensity.value = waveIntensityMul;
    uniforms.uMoonDir.value.copy(moonLight.position).normalize();
    uniforms.uMoonColor.value.set(0xc8c8e8);
    uniforms.uMoonIntensity.value = moonOpacity;
  }

  // ── CAMERA ORBIT MOMENTUM — track angular velocity for vegetation reaction ──
  {
    const azimuth = controls.getAzimuthalAngle();
    let delta = azimuth - _prevAzimuth;
    // handle wrap-around
    if (delta > Math.PI) delta -= Math.PI * 2;
    if (delta < -Math.PI) delta += Math.PI * 2;
    _orbitAngularVelocity = _orbitAngularVelocity * _orbitDecay + delta * (1 - _orbitDecay) * 8;
    _prevAzimuth = azimuth;
  }

  // ── VEGETATION WIND (cached arrays — no traverse) ──
  for (let i = 0; i < _cachedFlowers.length; i++) {
    const child = _cachedFlowers[i];
    child.position.y = child.userData.baseY + Math.sin(elapsed * 2 + child.userData.phase) * 0.004;
    const wf = getWindAt(child.position.x, child.position.z, elapsed);
    const flex = child.userData.windFlex || 0;
    let frx = (child.userData.baseRotX || 0) + wind.dir.y * wf * flex;
    let frz = (child.userData.baseRotZ || 0) - wind.dir.x * wf * flex;
    if (walkMode) {
      const push = getVegetationPush(child.position.x, child.position.z, 0.35, 0.5);
      if (push) { frx += push.rx; frz += push.rz; }
    }
    child.rotation.x = frx;
    child.rotation.z = frz;
  }
  for (let i = 0; i < _cachedGrass.length; i++) {
    const child = _cachedGrass[i];
    const wf = getWindAt(child.position.x, child.position.z, elapsed);
    let rx = child.userData.baseRotX + wind.dir.y * wf * child.userData.windFlex;
    let rz = child.userData.baseRotZ - wind.dir.x * wf * child.userData.windFlex;
    if (walkMode) {
      const push = getVegetationPush(child.position.x, child.position.z, 0.4, 0.6);
      if (push) { rx += push.rx; rz += push.rz; }
    }
    child.rotation.x = rx;
    child.rotation.z = rz;
  }
  // orbit momentum — trees and bushes react to fast camera orbiting
  const orbitPush = _orbitAngularVelocity * 2.5; // scale for visible effect
  for (let i = 0; i < _cachedTrees.length; i++) {
    const child = _cachedTrees[i];
    const wf = getWindAt(child.position.x, child.position.z, elapsed);
    const sway = wf * child.userData.windFlex;
    const secondary = Math.sin(elapsed * 1.8 + child.userData.windPhase) * 0.008 * wind.strength;
    // orbit momentum adds a delayed bounce via the tree's phase offset
    const orbitBounce = orbitPush * child.userData.windFlex * Math.cos(elapsed * 4 + child.userData.windPhase);
    child.rotation.x = child.userData.baseRotX + wind.dir.y * (sway + secondary) + orbitBounce * 0.6;
    child.rotation.z = child.userData.baseRotZ - wind.dir.x * (sway + secondary) + orbitBounce;
  }
  for (let i = 0; i < _cachedBushes.length; i++) {
    const child = _cachedBushes[i];
    const wf = getWindAt(child.position.x, child.position.z, elapsed);
    let brx = child.userData.baseRotX + wind.dir.y * wf * child.userData.windFlex;
    let brz = child.userData.baseRotZ - wind.dir.x * wf * child.userData.windFlex;
    // bushes react more to orbit momentum (lower, more springy)
    const bushBounce = orbitPush * (child.userData.windFlex || 0.1) * 1.5 * Math.cos(elapsed * 5 + (child.userData.windPhase || 0));
    brx += bushBounce * 0.5;
    brz += bushBounce;
    if (walkMode) {
      const push = getVegetationPush(child.position.x, child.position.z, 0.5, 0.35);
      if (push) { brx += push.rx; brz += push.rz; }
    }
    child.rotation.x = brx;
    child.rotation.z = brz;
  }
  for (let i = 0; i < _cachedGlow.length; i++) {
    const child = _cachedGlow[i];
    child.material.opacity = 0.45 + Math.sin(elapsed * 1.6 + child.userData.phase) * 0.3;
    const s = 1 + Math.sin(elapsed * 2 + child.userData.phase) * 0.18;
    child.scale.setScalar(s);
  }
  for (let i = 0; i < _cachedLeaves.length; i++) {
    const child = _cachedLeaves[i];
    const windPush = wind.strength * 0.15;
    child.position.y = child.userData.baseY + Math.sin(elapsed * child.userData.speed + child.userData.phase) * 0.12 - elapsed * 0.008;
    child.position.x = child.userData.baseX + Math.sin(elapsed * 0.35 + child.userData.phase) * 0.25 + wind.dir.x * windPush * Math.sin(elapsed * 0.5 + child.userData.phase);
    child.position.z += wind.dir.y * windPush * 0.002;
    child.rotation.x += 0.006 + wind.strength * 0.003;
    child.rotation.z += 0.004 + wind.strength * 0.002;
    if (child.position.y < 0) child.position.y = child.userData.baseY + 2.5;
  }
  for (let i = 0; i < _cachedLava.length; i++) {
    const child = _cachedLava[i];
    child.material.opacity = 0.35 + Math.sin(elapsed * 3.5 + child.userData.phase) * 0.3;
  }

  // butterflies — wind pushes their orbit (flat group of butterfly Groups)
  for (let bi = 0; bi < particleGroup.children.length; bi++) {
    const child = particleGroup.children[bi];
    if (!child.userData.isButterfly) continue;
    const t = elapsed * child.userData.speed + child.userData.phase;
    const windDrift = wind.strength * 0.12;
    child.position.x = child.userData.centerX + Math.sin(t * 0.7) * child.userData.radius + wind.dir.x * windDrift * Math.sin(elapsed * 0.3 + child.userData.phase);
    child.position.z = child.userData.centerZ + Math.cos(t * 0.5) * child.userData.radius + wind.dir.y * windDrift * Math.sin(elapsed * 0.4 + child.userData.phase);
    child.position.y = child.userData.baseY + Math.sin(t * 1.5) * 0.2;
    const wingFlap = Math.sin(elapsed * 8 + child.userData.phase) * 0.6;
    if (child.children[0]) child.children[0].rotation.y = wingFlap;
    if (child.children[1]) child.children[1].rotation.y = -wingFlap;
    child.lookAt(
      child.position.x + Math.cos(t * 0.7) * 0.5,
      child.position.y,
      child.position.z - Math.sin(t * 0.5) * 0.5,
    );
  }

  // drift clouds — wind-driven
  cloudGroup.children.forEach(cloud => {
    const cloudSpeed = cloud.userData.speed * (0.6 + wind.strength * 0.8);
    cloud.position.x = cloud.userData.baseX + Math.sin(elapsed * cloud.userData.speed * 0.4) * 1.5 + elapsed * cloudSpeed * wind.dir.x;
    cloud.position.z += wind.dir.y * cloudSpeed * dt * 0.3;
    cloud.position.y += Math.sin(elapsed * 0.25 + cloud.position.z) * 0.00015;
    if (cloud.position.x > 18) cloud.position.x = -18;
    if (cloud.position.x < -18) cloud.position.x = 18;
  });

  // ── FOG BANKS UPDATE ──
  updateFogBanks(elapsed, dt);

  // ── WEATHER UPDATE ──
  updateWeather(dt);

  // ── 3D SUN + GOD RAY UPDATE ──
  {
    // position sun group (no allocation — copy + multiply in place)
    sunGroup.position.copy(sunLight.position).multiplyScalar(3);
    // face the sun toward the camera
    sunGroup.quaternion.copy(camera.quaternion);

    // project sun to screen space
    const sunNDC = _cinTargetPos.copy(sunLight.position).project(camera);
    const sunScreenX = sunNDC.x * 0.5 + 0.5;
    const sunScreenY = sunNDC.y * 0.5 + 0.5;
    godRayPass.uniforms.uSunScreenPos.value.set(sunScreenX, sunScreenY);
    // intensity based on time of day — strongest at dawn and sunset
    const tt = dayTime % 1;
    let godRayIntensity = 0;
    // dawn window
    if (tt > 0.14 && tt < 0.24) {
      const mid = 0.19;
      const w = 0.05;
      godRayIntensity = Math.max(0, 1 - Math.abs(tt - mid) / w);
    }
    // sunset window
    if (tt > 0.56 && tt < 0.70) {
      const mid = 0.63;
      const w = 0.07;
      godRayIntensity = Math.max(godRayIntensity, Math.max(0, 1 - Math.abs(tt - mid) / w));
    }
    // zero if sun is behind camera
    if (sunNDC.z > 1) godRayIntensity = 0;
    // fade when sun is far off screen
    const offScreen = Math.max(Math.abs(sunScreenX - 0.5), Math.abs(sunScreenY - 0.5));
    if (offScreen > 0.6) godRayIntensity *= Math.max(0, 1 - (offScreen - 0.6) / 0.4);
    godRayPass.uniforms.uIntensity.value = godRayIntensity * 0.8;
    godRayPass.uniforms.uSunColor.value.set(sunLight.color.r, sunLight.color.g, sunLight.color.b);

    // sun shader uniforms
    const sunAboveHorizon = sunLight.position.y > 0 ? 1.0 : 0.0;
    // smooth opacity — ease in/out near horizon
    const horizonT = Math.max(0, Math.min(1, sunLight.position.y / 3));
    sunOpacity = horizonT * (0.7 + godRayIntensity * 0.3);

    // update core opacity
    sunCoreMat.opacity = sunOpacity;

    // update glow layers — each fades with sunOpacity, pulsing slightly offset
    for (let g = 0; g < sunGlowLayers.length; g++) {
      const layer = sunGlowLayers[g];
      const layerPulse = 1 + Math.sin(elapsed * (1.2 + g * 0.3) + g * 1.5) * 0.08;
      layer.material.opacity = layer.userData.baseOpacity * sunOpacity * layerPulse;
      layer.material.color.copy(sunLight.color);
      // outer layers more golden
      if (g > 1) {
        layer.material.color.r = Math.min(1, layer.material.color.r * 1.05);
        layer.material.color.g *= 0.92;
      }
      // gentle independent rotation for shimmer
      layer.rotation.y = elapsed * (0.02 + g * 0.01);
      layer.rotation.x = Math.sin(elapsed * 0.15 + g) * 0.05;
    }

    // animate ray spikes — layered rotation + per-ray pulsing
    const pulse = 1 + Math.sin(elapsed * 1.5) * 0.06;
    for (const pivot of sunRays) {
      const ud = pivot.userData;
      const ba = ud.baseAngle;
      pivot.rotation.z = ba + elapsed * ud.rotSpeed;

      const ray = pivot.children[0];
      const lenPulse = ud.isTertiary
        ? 0.7 + Math.sin(elapsed * ud.pulseFreq + ba * 7) * ud.pulseAmp
        : pulse + Math.sin(elapsed * ud.pulseFreq + ba * 3) * ud.pulseAmp;
      ray.scale.y = lenPulse;
      ray.scale.x = 1 + Math.sin(elapsed * 1.8 + ba * 2) * 0.1;
      ray.material.opacity = sunOpacity * ud.baseAlpha * (0.8 + lenPulse * 0.2);
    }

    // sparkle particles — orbit and twinkle
    sparkleGroup.children.forEach(sparkle => {
      const ud = sparkle.userData;
      ud.orbitAngle += ud.orbitSpeed * dt;
      sparkle.position.x = Math.cos(ud.orbitAngle) * ud.orbitRadius;
      sparkle.position.y = Math.sin(ud.orbitAngle) * ud.orbitRadius;
      // twinkle
      const twinkle = Math.sin(elapsed * 4 + ud.twinklePhase) * 0.5 + 0.5;
      sparkle.material.opacity = sunOpacity * twinkle * 0.7;
      const s = 0.6 + twinkle * 0.6;
      sparkle.scale.setScalar(s);
    });

    // gentle core rotation for liveliness
    sunCore.rotation.y += dt * 0.12;
    sunCore.rotation.x = Math.sin(elapsed * 0.25) * 0.08;

    // breathing scale — whole sun
    const breathe = 1 + Math.sin(elapsed * 1.0) * 0.035 + Math.sin(elapsed * 2.3) * 0.015;
    sunGroup.scale.setScalar(1.8 * breathe);
  }

  // ── MOON UPDATE — visible at night, opposite the sun ──
  {
    // position moon opposite the sun
    moonGroup.position.copy(moonLight.position).multiplyScalar(2.5);
    moonGroup.quaternion.copy(camera.quaternion); // billboard toward camera

    // fade in during night
    const moonAbove = moonLight.position.y > 0 ? 1.0 : 0.0;
    const moonHorizonT = Math.max(0, Math.min(1, moonLight.position.y / 4));
    moonOpacity = nightFactor * moonHorizonT * 0.9;

    moonGroup.userData.coreMat.opacity = moonOpacity;
    moonGroup.userData.glowMat.opacity = moonOpacity * 0.35;
    moonGroup.userData.hazeMat.opacity = moonOpacity * 0.15;

    // gentle color shift — warmer near horizon, cooler high up
    const moonHue = moonHorizonT > 0.5 ? 0xd8d8f0 : 0xf0d8c0;
    moonGroup.userData.glowMat.color.set(moonHue);

    // subtle breathing
    const moonBreathe = 1 + Math.sin(elapsed * 0.6) * 0.02;
    moonGroup.scale.setScalar(1.2 * moonBreathe);

    // slow rotation for texture movement
    moonGroup.children[0].rotation.y += dt * 0.02;
  }

  // ── WALK MODE UPDATE ──
  if (walkMode) {
    updateWalkMode(elapsed, dt);
  }

  // ── UNDERWATER CHECK (orbit mode fallback) ──
  if (!walkMode) {
    const camWaterY = getWaterHeightAt(camera.position.x, camera.position.z, elapsed);
    if (camera.position.y < camWaterY) {
      isUnderwater = true;
      const rawDepth = (camWaterY - camera.position.y) / 0.3;
      underwaterDepth += (Math.min(rawDepth, 1.0) - underwaterDepth) * Math.min(1, dt * 6);
    } else {
      isUnderwater = false;
      underwaterDepth += (0 - underwaterDepth) * Math.min(1, dt * 6);
    }
    underwaterPass.uniforms.uSubmergeDepth.value = underwaterDepth;
    underwaterPass.uniforms.uTime.value = elapsed;
    if (underwaterDepth > 0.01) {
      const land = LANDS[currentLandIndex];
      underwaterPass.uniforms.uWaterColor.value.set(land.colors.waterDeep);
      underwaterPass.uniforms.uCausticColor.value.set(land.colors.waterShallow);
      if (scene.fog) {
        scene.fog.density = THREE.MathUtils.lerp(0.015, 0.12, underwaterDepth);
      }
    } else if (scene.fog && scene.fog.density > 0.016) {
      scene.fog.density = 0.015; // restore
    }
  }

  // ── ACHIEVEMENTS ──
  updateAchievements(elapsed, worldDt);

  // ── CINEMATIC CAMERA UPDATE ──
  if (!transitioning && !walkMode) {
    updateCinematicCamera(elapsed, dt);
  }

  if (!walkMode) controls.update();

  // ── DEPTH OF FIELD — dynamic focal distance based on camera target ──
  {
    const target = walkMode
      ? camera.position.clone().add(_walkLookDir.clone().normalize().multiplyScalar(3))
      : controls.target;
    const focalDist = camera.position.distanceTo(target);
    // convert world distance to linear depth (0-1 range)
    const linearFocal = (focalDist - 0.1) / (250 - 0.1);
    const targetFocal = Math.max(0.01, Math.min(0.5, linearFocal));
    // smooth focal tracking — don't snap, ease into new focus distance
    const currentFocal = dofPass.uniforms.uFocalDepth.value;
    dofPass.uniforms.uFocalDepth.value += (targetFocal - currentFocal) * Math.min(1, dt * 3);
    // wider focal range in walk mode (sharper nearby vision), tighter in cinematic
    const isCinematic = typeof cinematicMode !== 'undefined' && cinematicMode;
    dofPass.uniforms.uFocalRange.value = walkMode ? 0.15 : (isCinematic ? 0.05 : 0.08);
    // subtler in walk mode, dreamier in cinematic
    dofPass.uniforms.uMaxBlur.value = walkMode ? 1.0 : (isCinematic ? 3.5 : 2.5);
  }

  // render depth pass for SSAO + DoF (render scene to depth target)
  renderer.setRenderTarget(depthTarget);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);

  composer.render();
}

function unlockAchievement(id) {
  if (achState.unlocked.has(id)) return;
  achState.unlocked.add(id);
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return;

function showNextAchToast() {
  if (achToastQueue.length === 0) { achToastActive = false; return; }
  // defer toasts while UI is hidden in photo mode
  if (photoUIHidden) { setTimeout(showNextAchToast, 1000); return; }
  achToastActive = true;
  const ach = achToastQueue.shift();
  achIcon.textContent = ach.icon;
  achTitle.textContent = ach.title;
  achDesc.textContent = ach.desc;

  achProgressBar.style.width = pct + '%';
  achToast.classList.add('visible');
  setTimeout(() => {

    setTimeout(showNextAchToast, 500);
  }, 3500);

function updateAchievements(elapsed, dt) {
  // track total time always
  achState.totalTime += dt;
  achState.biomeTime += dt;

  if (achState.totalTime > 600) unlockAchievement('the_long_stay');
  if (achState.biomeTime > 300) unlockAchievement('island_resident');

  if (!walkMode) return;

  // walk distance tracking
  if (achState.lastWalkPos) {
    const dx = walkPos.x - achState.lastWalkPos.x;
    const dz = walkPos.z - achState.lastWalkPos.z;
    const stepDist = Math.sqrt(dx * dx + dz * dz);
    if (stepDist > 0.001) {
      achState.walkDist += stepDist;
      achState.walkStillTime = 0;
    } else {
      achState.walkStillTime += dt;
    }
    achState.lastWalkPos.set(walkPos.x, walkPos.y, walkPos.z);
  } else {
    achState.lastWalkPos = walkPos.clone();
  }

  // contemplator — stand still 30s in walk mode
  if (achState.walkStillTime > 30) unlockAchievement('contemplator');

  // marathon — walk 8 units total (island diameter is ~5.6)
  if (achState.walkDist > 8) unlockAchievement('marathon');

  // throttle spatial checks to ~2x/sec
  achState._spatialAcc = (achState._spatialAcc || 0) + dt;
  if (achState._spatialAcc < 0.5) return;
  achState._spatialAcc = 0;

  // edge walker — near cliff edge
  const wd = Math.sqrt(walkPos.x * walkPos.x + walkPos.z * walkPos.z) / RADIUS;
  if (wd > 0.85) unlockAchievement('edge_walker');

  // peak climber — at highest terrain point
  const land = LANDS[currentLandIndex];
  const terrainH = getTerrainHeight(walkPos.x, walkPos.z, land);
  if (terrainH > land.mountainHeight * 0.85) unlockAchievement('peak_climber');

  // night owl — walking at night
  const t = dayTime % 1;
  const isNight = t > 0.72 || t < 0.12;
  if (isNight) unlockAchievement('night_owl');

  // golden hour / sunrise / sunset detection
  if (t >= 0.55 && t <= 0.68) unlockAchievement('golden_hour');
  if (t >= 0.15 && t <= 0.22) unlockAchievement('early_riser');

  // rain/snow walker
  if (land.weather === 'rain' && land.weatherIntensity > 0) unlockAchievement('rain_dancer');
  if (land.weather === 'snow' && land.weatherIntensity > 0) unlockAchievement('snow_treader');

  // fog walker — check if near any fog bank
  if (fogBankGroup.children.length > 0) {
    for (const fb of fogBankGroup.children) {
      const fdx = walkPos.x - fb.position.x;
      const fdz = walkPos.z - fb.position.z;
      if (Math.sqrt(fdx * fdx + fdz * fdz) < 1.5) {
        unlockAchievement('fog_walker');
        break;
      }
    }
  }
}
